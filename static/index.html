                            closeModal();
                        }
                    }
                });
                document.body.appendChild(overlay);
                return overlay;
            }

            // --- Confirm Modal ---------------------------------------
            function showConfirmModal(message, onConfirm) {
                const content = el('div', { className: 'modal' },
                    el('p', { style: { color: 'var(--text-primary)', fontSize: '14px', marginBottom: '16px' } }, message),
                    el('div', { className: 'modal-actions' },
                        el('button', { className: 'btn btn-secondary', onclick: () => closeModal() }, 'Cancel'),
                        el('button', { className: 'btn btn-danger', onclick: () => { closeModal(); onConfirm(); } }, 'Discard'),
                    ),
                );
                showModalOverlay(content);
            }

            // Global references for admin WS updates (set by admin panel tabs)
            let _adminUsersLoader = null;
            let _adminLogsLoader = null;
            let _adminTokensLoader = null;
            let adminWS = null;
            let wsAdminReconnectTimer = null;
            let adminPollTimer = null;

            // --- Admin Panel ---------------------------------------
            function openAdminPanel() {
                _adminUsersLoader = refreshData;
                _adminTokensLoader = refreshTokens;
                _adminLogsLoader = refreshLogs;
                if (typeof connectAdminWS === 'function') connectAdminWS();
                let activeTab = 'users';
                let users = [];
                let tokens = [];
                let settings = { lockout_threshold: 5, lockout_duration_minutes: 30, jwt_expiry_days: 30, session_only: false, admins_can_create_users: true, admins_can_delete_users: true, admins_can_see_user_ids: false, admins_can_see_device_info: false, admins_can_see_stats: false, admins_can_edit_users: false, admins_can_see_logs: false, admins_can_see_tokens: false, admins_can_delete_ai_chats: false, admins_can_delete_global_chat: false, admins_can_manage_ai: false, allow_admins_update: false };
                let loading = true;
                let tokensLoading = true;
                let loadError = '';
                let saveSuccess = '';
                let saveError = '';
                let saving = false;
                let logs = [];
                let logsAllActions = [];
                let logsLoading = false;
                let logsError = '';
                let logsPage = 1;
                let logsTotal = 0;
                let logsFilterAction = '';
                let updateCheckResult = null;
                let updateLogs = [];
                let updateChecking = false;
                let updateApplying = false;

                function loadData() {
                    console.log('[Admin] loadData called, loading=', loading);
                    loading = true;
                    tokensLoading = true;
                    loadError = '';
                    renderModal(); // Show loading state immediately
                    Promise.all([
                        apiGet('/api/admin/users'),
                        apiGet('/api/admin/settings'),
                        apiGet('/api/admin/tokens').catch(() => []),
                    ])
                        .then(([usersData, settingsData, tokensData]) => {
                            console.log('[Admin] loadData completed, users count=', usersData ? usersData.length : 0);
                            users = usersData;
                            settings = settingsData;
                            tokens = tokensData;
                            loading = false;
                            tokensLoading = false;
                            renderModal();
                        })
                        .catch(err => {
                            console.log('[Admin] loadData error:', err.message);
                            loading = false;
                            tokensLoading = false;
                            loadError = err.message;
                            renderModal();
                        });
                }
                function refreshData() {
                    // Same as loadData but without setting loading=true (no UI flash)
                    Promise.all([
                        apiGet('/api/admin/users'),
                        apiGet('/api/admin/settings'),
                        apiGet('/api/admin/tokens').catch(() => []),
                    ])
                        .then(([usersData, settingsData, tokensData]) => {
                            users = usersData;
                            settings = settingsData;
                            tokens = tokensData;
                            renderModal();
                        })
                        .catch(err => {
                            loadError = err.message;
                            renderModal();
                        });
                }
                function loadLogs(page, actionFilter) {
                    logsLoading = true;
                    logsPage = page || 1;
                    if (actionFilter !== undefined) logsFilterAction = actionFilter;
                    renderModal();
                    let url = '/api/admin/logs?page=' + logsPage + '&per_page=50';
                    if (logsFilterAction) url += '&action=' + encodeURIComponent(logsFilterAction);
                    apiGet(url)
                        .then(data => {
                            logs = data.logs;
                            logsTotal = data.total;
                            logsAllActions = data.actions || [];
                            logsLoading = false;
                            renderModal();
                        })
                        .catch(err => {
                            logsLoading = false;
                            logsError = err.message;
                            renderModal();
                        });
                }
                function refreshLogs(page, actionFilter) {
                    let url = '/api/admin/logs?page=' + (page || logsPage || 1) + '&per_page=50';
                    if (actionFilter || logsFilterAction) url += '&action=' + encodeURIComponent(actionFilter || logsFilterAction);
                    apiGet(url)
                        .then(data => {
                            logs = data.logs;
                            logsTotal = data.total;
                            logsAllActions = data.actions || [];
                            renderModal();
                        })
                        .catch(err => {
                            logsError = err.message;
                            renderModal();
                        });
                }
                function refreshTokens() {
                    apiGet('/api/admin/tokens')
                        .then(data => {
                            tokens = data.tokens || data || [];
                            renderModal();
                        })
                        .catch(err => console.error('[Admin] Failed to refresh tokens:', err));
                }
                function handleToggleLock(userId) {
                    apiPatch('/api/admin/users/' + userId + '/lock', {})
                        .then(() => loadData())
                        .catch(err => {
                            loadError = err.message;
                            renderModal();
                        });
                }

                function handleChangeRole(userId, currentRole) {
                    const newRole = currentRole === 'admin' ? 'user' : 'admin';
                    apiPatch('/api/admin/users/' + userId + '/role', { role: newRole })
                        .then(() => loadData())
                        .catch(err => {
                            loadError = err.message;
                            renderModal();
                        });
                }

                function showInlineConfirm(message, onConfirm) {
                    const confirmContent = el('div', { className: 'modal' },
                        el('p', { style: { color: 'var(--text-primary)', fontSize: '14px', marginBottom: '16px' } }, message),
                        el('div', { className: 'modal-actions' },
                            el('button', { className: 'btn btn-secondary', onclick: closeModal }, 'Cancel'),
                            el('button', { className: 'btn btn-danger', onclick: () => { closeModal(); onConfirm(); } }, 'Confirm'),
                        ),
                    );
                    // Also close modal on Confirm to dismiss the confirmation
                    const existingOverlay = document.querySelector('.modal-overlay');
                    if (existingOverlay) {
                        existingOverlay.innerHTML = '';
                        existingOverlay.appendChild(confirmContent);
                    } else {
                        showModalOverlay(confirmContent);
                    }
                }

                function handleDeleteUser(userId, username) {
                    const msg = 'Are you sure you want to delete user "' + username + '"? All their data (projects, chapters, wiki entries) will be permanently deleted.';
                    showInlineConfirm(msg, () => {
                        apiDelete('/api/admin/users/' + userId)
                            .then(() => {
                                loadData();
                                // Show success toast
                                saveSuccess = 'User "' + username + '" deleted successfully.';
                                saveError = '';
                                renderModal();
                            })
                            .catch(err => {
                                loadError = err.message;
                                renderModal();
                            });
                    });
                }

                function handleSaveSettings() {
                    saving = true;
                    saveError = '';
                    saveSuccess = '';

                    const thresholdInput = document.getElementById('lockout-threshold');
                    const durationInput = document.getElementById('lockout-duration');
                    const jwtExpiryInput = document.getElementById('jwt-expiry');
                    const sessionCheckbox = document.getElementById('session-only');
                    const adminsCreateInput = document.getElementById('admins-can-create-users');
                    const adminsDeleteInput = document.getElementById('admins-can-delete-users');
                    const userIdsInput = document.getElementById('admins-can-see-user-ids');
                    const deviceInfoInput = document.getElementById('admins-can-see-device-info');
                    const statsInput = document.getElementById('admins-can-see-stats');
                    const editUsersInput = document.getElementById('admins-can-edit-users');
                    const seeLogsInput = document.getElementById('admins-can-see-logs');
                    const seeTokensInput = document.getElementById('admins-can-see-tokens');
                    const adminsCanDeleteAiChats = document.getElementById('admins-can-delete-ai-chats');
                    const adminsCanDeleteGlobalChat = document.getElementById('admins-can-delete-global-chat');
                    const adminsCanManageAi = document.getElementById('admins-can-manage-ai');
                    const allowAdminsUpdateInput = document.getElementById('allow-admins-update');
                    const body = {};
                    if (thresholdInput) body.lockout_threshold = parseInt(thresholdInput.value);
                    if (durationInput) body.lockout_duration_minutes = parseInt(durationInput.value);
                    if (jwtExpiryInput) body.jwt_expiry_days = parseInt(jwtExpiryInput.value);
                    if (sessionCheckbox) body.session_only = sessionCheckbox.checked;
                    if (adminsCreateInput) body.admins_can_create_users = adminsCreateInput.checked;
                    if (adminsDeleteInput) body.admins_can_delete_users = adminsDeleteInput.checked;
                    if (userIdsInput) body.admins_can_see_user_ids = userIdsInput.checked;
                    if (deviceInfoInput) body.admins_can_see_device_info = deviceInfoInput.checked;
                    if (statsInput) body.admins_can_see_stats = statsInput.checked;
                    if (editUsersInput) body.admins_can_edit_users = editUsersInput.checked;
                    if (seeLogsInput) body.admins_can_see_logs = seeLogsInput.checked;
                    if (seeTokensInput) body.admins_can_see_tokens = seeTokensInput.checked;
                    if (adminsCanDeleteAiChats) body.admins_can_delete_ai_chats = adminsCanDeleteAiChats.checked;
                    if (adminsCanDeleteGlobalChat) body.admins_can_delete_global_chat = adminsCanDeleteGlobalChat.checked;
                    if (adminsCanManageAi) body.admins_can_manage_ai = adminsCanManageAi.checked;
                    if (allowAdminsUpdateInput) body.allow_admins_update = allowAdminsUpdateInput.checked;

                    apiPatch('/api/admin/settings', body)
                        .then(data => {
                            settings = data;
                            saving = false;
                            saveSuccess = 'Settings saved successfully.';
                            renderModal();
                        })
                        .catch(err => {
                            saving = false;
                            saveError = err.message;
                            renderModal();
                        });
                }

                function renderModal() {
                    // Save scroll position if admin modal exists
                    const prevModal = document.querySelector('.admin-modal');
                    const savedScrollTop = prevModal ? prevModal.scrollTop : 0;
                    var tabContent;
                    if (activeTab === 'users') tabContent = renderUsersTab();
                    else if (activeTab === 'tokens') tabContent = renderTokensTab();
                    else if (activeTab === 'logs') tabContent = renderLogsTab();
                    else if (activeTab === 'ai') tabContent = renderAITab();
                    else if (activeTab === 'storage') tabContent = renderStorageTab();
                    else if (activeTab === 'update') tabContent = renderUpdateTab();
                    else tabContent = renderSettingsTab();

                    const content = el('div', { className: 'modal admin-modal', style: { position: 'relative' } },
                        el('button', {
                            style: { position: 'absolute', top: '12px', right: '12px', background: 'none', border: 'none', color: 'var(--error)', fontSize: '20px', cursor: 'pointer', padding: '4px 8px', borderRadius: '4px', lineHeight: '1' },
                            onmouseenter: function(e) { e.target.style.background = 'rgba(239, 83, 80, 0.15)'; },
                            onmouseleave: function(e) { e.target.style.background = 'none'; },
                            onclick: closeModal,
                        }, '\u00D7'),
                        el('h2', null, 'Admin Panel'),
                        el('div', { className: 'admin-tabs' },
                            el('button', {
                                className: 'admin-tab' + (activeTab === 'users' ? ' active' : ''),
                                onclick: () => {
                                    clearAIUsageInterval();
                                    activeTab = 'users'; renderModal();
                                },
                            }, 'Users'),
                            (getUserRole() === 'owner')
                                ? el('button', {
                                    className: 'admin-tab' + (activeTab === 'settings' ? ' active' : ''),
                                    onclick: () => {
                                        clearAIUsageInterval();
                                        activeTab = 'settings'; renderModal();
                                    },
                                }, 'Settings')
                                : null,
                            (getUserRole() === 'owner' || (getUserRole() === 'admin' && settings.admins_can_see_tokens))
                                ? el('button', {
                                    className: 'admin-tab' + (activeTab === 'tokens' ? ' active' : ''),
                                    onclick: () => {
                                        clearAIUsageInterval();
                                        activeTab = 'tokens'; renderModal();
                                    },
                                }, 'Tokens')
                                : null,
                            (getUserRole() === 'owner' || settings.admins_can_see_logs)
                                ? el('button', {
                                    className: 'admin-tab' + (activeTab === 'logs' ? ' active' : ''),
                                    onclick: () => {
                                        clearAIUsageInterval();
                                        activeTab = 'logs'; loadLogs(1); renderModal();
                                    },
                                }, 'Logs')
                                : null,
                            (getUserRole() === 'owner' || (getUserRole() === 'admin' && settings.admins_can_manage_ai))
                                ? el('button', {
                                    className: 'admin-tab' + (activeTab === 'ai' ? ' active' : ''),
                                    onclick: () => { activeTab = 'ai'; loadAITabData(); renderModal(); },
                                }, 'AI')
                                : null,
                            (getUserRole() === 'owner' || (getUserRole() === 'admin' && settings.admins_can_see_stats))
                                ? el('button', {
                                    className: 'admin-tab' + (activeTab === 'storage' ? ' active' : ''),
                                    onclick: () => {
                                        clearAIUsageInterval();
                                        activeTab = 'storage'; loadStorageTabData(); renderModal();
                                    },
                                }, 'Storage')
                                : null,
                            (getUserRole() === 'owner' || (getUserRole() === 'admin' && settings.allow_admins_update))
                                ? el('button', {
                                    className: 'admin-tab' + (activeTab === 'update' ? ' active' : ''),
                                    onclick: () => {
                                        clearAIUsageInterval();
                                        activeTab = 'update'; renderModal();
                                    },
                                }, 'Update')
                                : null,
                        ),
                        loadError ? el('div', { className: 'error-banner' }, loadError) : null,
                        saveSuccess ? el('div', { style: { color: 'var(--success)', fontSize: '13px', marginBottom: '12px' } }, saveSuccess) : null,
                        saveError ? el('div', { className: 'error-banner' }, saveError) : null,
                        tabContent,
                        el('div', { className: 'modal-actions' }),
                    );

                    // Replace modal content
                    const existingOverlay = document.querySelector('.modal-overlay');
                    if (existingOverlay) {
                        existingOverlay.innerHTML = '';
                        existingOverlay.appendChild(content);
                    } else {
                        showModalOverlay(content);

                    // Auto-scroll update log panel
                    if (activeTab === 'update' && updateLogs.length > 0) {
                        setTimeout(function() {
                            var panel = document.getElementById('update-log-panel');
                            if (panel) panel.scrollTop = panel.scrollHeight;
                        }, 0);
                    }
                    // Restore scroll position for non-Update tabs
                    if (activeTab !== 'update' && savedScrollTop > 0) {
                        const newOverlay = document.querySelector('.admin-modal');
                        if (newOverlay) {
                            setTimeout(() => { newOverlay.scrollTop = savedScrollTop; }, 0);
                        }
                    }
                }

                function renderUsersTab() {
                    if (loading) {
                        return el('p', { style: { color: 'var(--text-muted)', fontSize: '14px' } }, 'Loading users...');
                    }

                    const currentUserRole = getUserRole();

                    return el('div', null,
                        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                            el('div', null,
                                (currentUserRole === 'owner' || settings.admins_can_create_users !== false)
                                    ? el('button', { className: 'btn btn-secondary btn-sm', onclick: showCreateUserModal }, '+ Create User')
                                    : null,
                            ),
                        ),
                        renderUsersTable(),
                    );
                }

                function renderUsersTable() {
                    const decoded = decodeToken(getToken());
                    const currentUsername = decoded ? decoded.username : null;
                    const currentUserRole = getUserRole();
                    const showIdColumn = currentUserRole === 'owner' || settings.admins_can_see_user_ids;
                    const showDeviceInfo = currentUserRole === 'owner' || settings.admins_can_see_device_info;
                    const showStats = currentUserRole === 'owner' || settings.admins_can_see_stats;

                    const rows = users.map(u => {
                        const isOwner = u.role === 'owner';
                        const isLocked = !!u.locked_until;
                        const isSelf = u.username === currentUsername;
                        // Hierarchy: admins can only act on users below them
                        let isHigherRank = false;
                        if (currentUserRole !== 'owner') {
                            const currentUserObj = users.find(uu => uu.username === currentUsername);
                            if (currentUserObj && u.position !== undefined && currentUserObj.position !== undefined) {
                                isHigherRank = currentUserObj.position > u.position;
                            }
                        }
                        const canModify = !isOwner && !isSelf && !isHigherRank;
                        const isAdminViewingOwner = currentUserRole === 'admin' && isOwner;

                        const roleBadge = el('span', { className: 'admin-badge ' + u.role }, u.role);
                        const lockBadge = el('span', { className: 'admin-badge ' + (isLocked ? 'locked' : 'unlocked') },
                            isLocked ? 'Locked' : 'Unlocked'
                        );

                        const isOwnerRow = u.role === 'owner';
                        const isAdminViewing = currentUserRole === 'admin';

                        let lockBtn = null;
                        let roleBtn = null;
                        let deleteBtn = null;
                        let editBtn = null;

                        if (isAdminViewing && isOwnerRow) {
                            // Placeholder — no buttons shown, but row stays consistent
                        } else {
                            lockBtn = el('button', {
                                className: 'admin-btn-small' + (isLocked ? '' : ' danger'),
                                disabled: !canModify ? 'disabled' : null,
                                title: isSelf ? 'Cannot modify yourself' : (isOwner ? 'Cannot modify owner' : (isLocked ? 'Unlock user' : 'Lock user')),
                                onclick: () => { if (canModify) handleToggleLock(u.id); },
                            }, isLocked ? 'Unlock' : 'Lock');

                            roleBtn = null;
                            if (currentUserRole === 'owner') {
                                roleBtn = el('button', {
                                    className: 'admin-btn-small',
                                    disabled: !canModify ? 'disabled' : null,
                                    title: isSelf ? 'Cannot modify yourself' : (isOwner ? 'Cannot modify owner' : (u.role === 'admin' ? 'Demote to user' : 'Promote to admin')),
                                    onclick: () => { if (canModify) handleChangeRole(u.id, u.role); },
                                }, u.role === 'admin' ? 'Demote' : 'Promote');
                            }

                            if ((currentUserRole === 'owner' || settings.admins_can_delete_users !== false) && !isSelf && !isHigherRank) {
                                deleteBtn = el('button', {
                                    className: 'admin-btn-small danger',
                                    disabled: !canModify ? 'disabled' : null,
                                    title: isHigherRank ? 'Cannot manage users above you in hierarchy' : 'Delete user',
                                    onclick: () => handleDeleteUser(u.id, u.username),
                                }, 'Delete');
                            }

                            if (currentUserRole === 'owner' || (currentUserRole === 'admin' && settings.admins_can_edit_users)) {
                                editBtn = el('button', {
                                    className: 'admin-btn-small',
                                    disabled: !canModify ? 'disabled' : null,
                                    title: isHigherRank ? 'Cannot manage users above you in hierarchy' : 'Edit user',
                                    onclick: () => { if (canModify) showEditUserModal(u); },
                                }, '\u270E');
                            }
                        }

                        const row = el('tr', { 'data-user-id': String(u.id) },
                            showIdColumn ? el('td', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, String(u.id)) : null,
                            el('td', null, u.role === 'owner' ? 'Owner' : u.username),
                            el('td', null, u.display_name || '\u2014'),
                            el('td', null, roleBadge),
                            el('td', null, lockBadge),
                            el('td', { style: { fontSize: '11px' } },
                                el('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '4px' }, title: (getUserStatus(u.last_active_at, u.last_logout_at).tooltip || u.last_active_at || 'Never active') },
                                    el('span', { className: 'status-dot ' + getUserStatus(u.last_active_at, u.last_logout_at).cls }),
                                    getUserStatus(u.last_active_at, u.last_logout_at).label,
                                ),
                            ),
                            el('td', { style: { fontSize: '12px', color: 'var(--text-secondary)' } },
                                formatLocalDateTime(u.last_login_at)
                            ),
                            showDeviceInfo ? el('td', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, u.last_ip || '') : null,
                            showDeviceInfo ? el('td', { style: { fontSize: '12px', color: 'var(--text-muted)' }, title: u.last_user_agent || '' }, parseUserAgent(u.last_user_agent)) : null,
                            showStats ? el('td', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, (u.total_words || 0).toLocaleString()) : null,
                            showStats ? el('td', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, (u.total_tokens || 0).toLocaleString()) : null,
                            showStats ? el('td', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, ((u.total_chars || 0) / 1024).toFixed(1) + ' KB') : null,
                            el('td', { style: { whiteSpace: 'nowrap', verticalAlign: 'middle' } },
                                (isAdminViewing && isOwnerRow) ? el('span', { style: { color: 'var(--text-muted)', fontSize: '13px', padding: '4px 10px', display: 'inline-block' } }, '\u2014') : null,
                                lockBtn,
                                roleBtn,
                                editBtn,
                                deleteBtn,
                            ),
                        );
                        if (currentUserRole === 'owner' && !isSelf) {
                            row.setAttribute('draggable', 'true');
                        }
                        return row;
                    });

                    const tableId = 'admin-users-table';
                    const isOwner = currentUserRole === 'owner';

                    const table = el('table', { className: 'admin-users-table', id: tableId },
                        el('thead', null,
                            el('tr', null,
                                showIdColumn ? el('th', null, 'ID') : null,
                                el('th', null, 'Username'),
                                el('th', null, 'Display Name'),
                                el('th', null, 'Role'),
                                el('th', null, 'Access'),
                                el('th', null, 'Activity'),
                                el('th', null, 'Last Login'),
                                showDeviceInfo ? el('th', null, 'Last IP') : null,
                                showDeviceInfo ? el('th', null, 'Device') : null,
                                showStats ? el('th', null, 'Words') : null,
                                showStats ? el('th', null, 'Tokens') : null,
                                showStats ? el('th', null, 'Size') : null,
                                el('th', null, 'Actions'),
                            ),
                        ),
                        el('tbody', null, ...rows),
                    );

                    // Add drag-and-drop for owner
                    if (isOwner) {
                        let draggedRowId = null;
                        const tbody = table.querySelector('tbody');

                        tbody.addEventListener('dragstart', (e) => {
                            const row = e.target.closest('tr');
                            if (row) {
                                draggedRowId = row.dataset.userId;
                                e.dataTransfer.setData('text/plain', draggedRowId);
                                row.classList.add('drag-source');
                                // Create clean drag image
                                const clone = document.createElement('div');
                                clone.className = 'admin-drag-clone';
                                const usernameCell = row.querySelector('td:nth-child(2)');
                                clone.textContent = usernameCell ? usernameCell.textContent.trim() : (row.dataset.userId || '');
                                document.body.appendChild(clone);
                                e.dataTransfer.setDragImage(clone, 0, 0);
                                setTimeout(() => { if (clone.parentNode) clone.parentNode.removeChild(clone); }, 0);
                            }
                        });

                        tbody.addEventListener('dragover', (e) => {
                            e.preventDefault();
                            const targetRow = e.target.closest('tr');
                            if (!targetRow) return;
                            if (targetRow.dataset.userId === String(draggedRowId)) return;
                            // Clear existing indicators
                            tbody.querySelectorAll('tr.insert-before').forEach(el => {
                                el.classList.remove('insert-before');
                            });
                            tbody.querySelectorAll('tr.insert-after').forEach(el => {
                                el.classList.remove('insert-after');
                            });
                            // Show insertion line based on cursor position
                            const rect = targetRow.getBoundingClientRect();
                            const midY = rect.top + rect.height / 2;
                            const insertBefore = e.clientY < midY;

                            // Skip the insertion line if dropping here would not change the order
                            const targetIndex = users.findIndex(u => u.id === parseInt(targetRow.dataset.userId));
                            const draggedIndex = users.findIndex(u => u.id === parseInt(draggedRowId));
                            if (targetIndex !== -1 && draggedIndex !== -1) {
                                const resultIndex = insertBefore ? targetIndex : targetIndex + 1;
                                if (draggedIndex < targetIndex) {
                                    // Dragged is above target — removing it shifts target down by 1
                                    const adjustedResult = insertBefore ? (targetIndex - 1) : targetIndex;
                                    if (adjustedResult === draggedIndex) return;
                                } else {
                                    // Dragged is below target — removing it doesn't shift target
                                    if (resultIndex === draggedIndex) return;
                                }
                            }

                            if (insertBefore) {
                                targetRow.classList.add('insert-before');
                            } else {
                                targetRow.classList.add('insert-after');
                            }
                        });

                        tbody.addEventListener('dragleave', (e) => {
                            const targetRow = e.target.closest('tr');
                            if (targetRow) {
                                targetRow.classList.remove('insert-before');
                                targetRow.classList.remove('insert-after');
                            }
                        });

                        tbody.addEventListener('drop', (e) => {
                            e.preventDefault();
                            const targetRow = e.target.closest('tr');
                            if (!targetRow || targetRow.dataset.userId === draggedRowId) return;

                            // Remove visual indicators
                            tbody.querySelectorAll('tr.drag-source').forEach(el => {
                                el.classList.remove('drag-source');
                            });
                            tbody.querySelectorAll('tr.insert-before').forEach(el => {
                                el.classList.remove('insert-before');
                            });
                            tbody.querySelectorAll('tr.insert-after').forEach(el => {
                                el.classList.remove('insert-after');
                            });

                            // Collect current DOM order
                            const rowsArr = [...tbody.querySelectorAll('tr')];
                            const draggedRow = tbody.querySelector(`tr[data-user-id="${draggedRowId}"]`);
                            if (!draggedRow) return;

                            // Move the dragged row before/after the target
                            const targetRect = targetRow.getBoundingClientRect();
                            const mouseY = e.clientY;
                            const insertBefore = mouseY < targetRect.top + targetRect.height / 2;

                            if (insertBefore) {
                                tbody.insertBefore(draggedRow, targetRow);
                            } else {
                                tbody.insertBefore(draggedRow, targetRow.nextSibling);
                            }

                            // Build new order from DOM
                            const newOrder = [...tbody.querySelectorAll('tr')].map(tr => parseInt(tr.dataset.userId));

                            // Ensure owner is always first in the order
                            const ownerUser = users.find(u => u.role === 'owner');
                            let orderToSend = newOrder;
                            if (ownerUser) {
                                orderToSend = [ownerUser.id, ...newOrder.filter(id => id !== ownerUser.id)];
                                // If the order changed, re-sort the DOM
                                if (orderToSend[0] !== newOrder[0]) {
                                    // Move owner row to top in DOM
                                    const ownerRow = tbody.querySelector(`tr[data-user-id="${ownerUser.id}"]`);
                                    if (ownerRow) {
                                        tbody.insertBefore(ownerRow, tbody.firstChild);
                                    }
                                }
                            }

                            // Send to backend
                            apiPut('/api/admin/users/reorder', { order: orderToSend })
                                .then(() => loadData())
                                .catch(err => {
                                    loadError = err.message;
                                    renderModal();
                                });
                        });

                        tbody.addEventListener('dragend', () => {
                            tbody.querySelectorAll('tr.drag-source').forEach(el => {
                                el.classList.remove('drag-source');
                            });
                            tbody.querySelectorAll('tr.insert-before').forEach(el => {
                                el.classList.remove('insert-before');
                            });
                            tbody.querySelectorAll('tr.insert-after').forEach(el => {
                                el.classList.remove('insert-after');
                            });
                            draggedRowId = null;
                        });
                    }

                    return el('div', { style: { overflowX: 'auto' } }, table);
                }

                function showEditUserModal(user) {

                    function onSubmit() {

                        if (Object.keys(body).length === 0) {

                function clearAIUsageInterval() {
                    if (window._aiUsageInterval) {
                        clearInterval(window._aiUsageInterval);
                        window._aiUsageInterval = null;
                    }
                }

                // --- AI Tab data ---
                let aiEndpoints = [];
                let aiEndpointsLoading = false;
                let aiEndpointsError = '';
                let aiUsageData = null;
                let aiUsageLoading = false;
                let aiUsagePeriod = 'daily';
                let aiTabSubTab = 'endpoints';

                function loadAITabData() {
                    aiEndpointsLoading = true;
                    aiEndpointsError = '';
                    apiGet('/api/ai/admin/endpoints')
                        .then(data => {
                            aiEndpoints = data || [];
                            aiEndpointsLoading = false;
                            if (activeTab === 'ai') renderModal();
                        })
                        .catch(err => {
                            aiEndpointsLoading = false;
                            aiEndpointsError = err.message;
                            if (activeTab === 'ai') renderModal();
                        });
                }

                function loadAIUsageData(period) {
                    aiUsagePeriod = period || 'daily';
                    aiUsageLoading = true;
                    if (activeTab === 'ai') renderModal();

                    // Reset interval so it starts fresh with the new period
                    clearAIUsageInterval();

                    Promise.all([
                        apiGet('/api/ai/admin/usage?period=' + aiUsagePeriod),
                        apiGet('/api/ai/admin/endpoints')
                    ])
                    .then(([usageData, endpointsData]) => {
                        const records = usageData.records || [];

                        // Build a lookup map: endpoint_id+user_id -> assignment details
                        const limitMap = {};
                        (endpointsData || []).forEach(ep => {
                            (ep.assigned_users || []).forEach(ass => {
                                const key = ep.id + '-' + ass.user_id;
                                limitMap[key] = {
                                    endpoint_name: ep.name,
                                    limit_type: ass.limit_type,
                                    limit_value_requests: ass.limit_value_requests,
                                    limit_value_tokens: ass.limit_value_tokens,
                                    reset_schedule: ass.reset_schedule,
                                    reset_time: ass.reset_time
                                };
                            });
                        });

                        // Enrich usage records with limit info
                        aiUsageData = records.map(record => {
                            const key = record.endpoint_id + '-' + record.user_id;
                            const limitInfo = limitMap[key] || {};
                            return {
                                ...record,
                                limit_value: limitInfo.limit_type === 'tokens'
                                    ? limitInfo.limit_value_tokens
                                    : limitInfo.limit_value_requests,
                                limit_value_requests: limitInfo.limit_value_requests,
                                limit_value_tokens: limitInfo.limit_value_tokens,
                                limit_type: limitInfo.limit_type,
                                reset_schedule: limitInfo.reset_schedule,
                                reset_time: limitInfo.reset_time,
                            };
                        });

                        aiUsageLoading = false;
                        if (activeTab === 'ai') renderModal();

                        // Start auto-refresh interval (60s) for live tracking
                        window._aiUsageInterval = setInterval(() => {
                            loadAIUsageData(aiUsagePeriod);
                        }, 60000);
                    })
                    .catch(err => {
                        aiUsageLoading = false;
                        aiUsageData = null;
                        if (activeTab === 'ai') renderModal();
                    });
                }

                function renderAITab() {
                    if (aiEndpointsLoading) {

                    }
                    if (aiEndpointsError) {

                    // Sub-tabs
                    const subTabs = el('div', { style: { display: 'flex', gap: '0', borderBottom: '1px solid var(--border-light)', marginBottom: '16px', marginTop: '4px' } },

                            onclick: () => {

                function showAdminEndpointDetail(ep) {
                    let detailTab = 'models';
                    let detailModels = [];
                    let detailUsers = [];
                    let detailLoading = false;
                    let detailError = '';
                    let detailFetching = false;
                    let detailConfigs = [];
                    let detailConfigsLoading = false;
                    let detailConfigsError = '';

                    // New state for hierarchical configuration-first workflow
                    let detailViewState = 'config_list';  // 'config_list' | 'config_editor'
                    let selectedConfig = null;
                    let configModels = [];
                    let configUsers = [];
                    let configModelsLoading = false;
                    let configUsersLoading = false;
                    let configModelsError = '';
                    let configUsersError = '';
                    let unsavedChanges = false;

                    function closeDetail() { closeModal(); }

                    function loadDetailModels() {
                        detailLoading = true; detailError = ''; renderDetail();
                        apiGet('/api/ai/admin/endpoints/' + ep.id + '/models')
                            .then(data => { detailModels = Array.isArray(data) ? data : (data.models || data.fetched_models || []); detailLoading = false; renderDetail(); })
                            .catch(err => { detailLoading = false; detailError = err.message; renderDetail(); });
                    }

                    function loadDetailUsers() {
                        detailLoading = true; detailError = ''; renderDetail();
                        apiGet('/api/ai/admin/endpoints/' + ep.id + '/users')
                            .then(data => { detailUsers = data.users || data; detailLoading = false; renderDetail(); })
                            .catch(err => { detailLoading = false; detailError = err.message; renderDetail(); });
                    }

                    function loadDetailConfigs() {
                        detailConfigsLoading = true; detailConfigsError = ''; renderDetail();
                        apiGet('/api/ai/admin/endpoints/' + ep.id + '/configs')
                            .then(data => { detailConfigs = Array.isArray(data) ? data : []; detailConfigsLoading = false; renderDetail(); })
                            .catch(err => { detailConfigsLoading = false; detailConfigsError = err.message; renderDetail(); });
                    }

                    function loadConfigModels() {
                        configModelsLoading = true; configModelsError = ''; renderDetail();
                        apiGet('/api/ai/admin/endpoints/' + ep.id + '/models')
                            .then(data => { configModels = Array.isArray(data) ? data : (data.models || data.fetched_models || []); configModelsLoading = false; renderDetail(); })
                            .catch(err => { configModelsLoading = false; configModelsError = err.message; renderDetail(); });
                    }

                    function loadConfigUsers() {
                        configUsersLoading = true; configUsersError = ''; renderDetail();
                        apiGet('/api/ai/admin/endpoints/' + ep.id + '/users')
                            .then(data => { configUsers = data.users || data; configUsersLoading = false; renderDetail(); })
                            .catch(err => { configUsersLoading = false; configUsersError = err.message; renderDetail(); });
                    }

                    function handleFetchModels() {
                        detailFetching = true; detailError = ''; renderDetail();
                        apiPost('/api/ai/admin/endpoints/' + ep.id + '/fetch-models', {})
                            .then(data => {
                                detailFetching = false;
                                // Fetch-models only returns name strings; reload from models endpoint
                                // to get proper model objects with enabled/multiplier fields.
                                if (detailViewState === 'config_editor') {
                                    loadConfigModels();
                                } else {
                                    loadDetailModels();
                                }
                            })
                            .catch(err => { detailFetching = false; detailError = err.message; renderDetail(); });
                    }

                    function toggleModel(modelName, enabled) {
                        apiPut('/api/ai/admin/endpoints/' + ep.id + '/models/' + encodeURIComponent(modelName), { enabled: enabled })
                            .then(() => {
                                // Update local model data in-place — no full reload needed.
                                // Avoids calling loadConfigModels()/loadDetailModels() which
                                // trigger renderDetail() and reset scroll position.
                                const modelsArray = detailViewState === 'config_editor' ? configModels : detailModels;
                                const model = modelsArray.find(m => m.model_name === modelName);
                                if (model) model.enabled = enabled;
                            })
                            .catch(err => {
                                detailError = err.message;
                                // Re-render to show error and revert the toggle visually
                                renderDetail();
                            });
                    }

                    function navigateToConfig(config) {
                        selectedConfig = config;
                        detailViewState = 'config_editor';
                        detailTab = 'models';
                        unsavedChanges = false;
                        loadConfigModels();
                        renderDetail();
                    }

                    function navigateBackToConfigList() {
                        selectedConfig = null;
                        detailViewState = 'config_list';
                        detailTab = 'models';
                        configModels = [];
                        configUsers = [];
                        configModelsLoading = false;
                        configUsersLoading = false;
                        configModelsError = '';
                        configUsersError = '';
                        unsavedChanges = false;
                        renderDetail();
                    }

                    function renderDetail() {
                        // Remove only the topmost overlay (this detail view), preserving the admin panel underneath
                        const overlays = document.querySelectorAll('.modal-overlay');
                        if (overlays.length > 1) {
                            overlays[overlays.length - 1].remove();
                        }

                        let bodyContent;
                        let tabBar = null;

                        if (detailViewState === 'config_list') {
                            bodyContent = renderConfigListView();
                        } else if (detailViewState === 'config_editor') {
                            tabBar = el('div', { style: { display: 'flex', gap: '0', borderBottom: '1px solid var(--border-light)', marginBottom: '12px' } },
                                el('button', {
                                    style: { padding: '8px 16px', fontSize: '13px', fontWeight: '600', cursor: 'pointer', border: 'none', background: 'none', color: detailTab === 'models' ? 'var(--accent-primary)' : 'var(--text-muted)', borderBottom: detailTab === 'models' ? '2px solid var(--accent-primary)' : '2px solid transparent', fontFamily: 'inherit' },
                                    onclick: () => { detailTab = 'models'; loadConfigModels(); },
                                }, 'Models'),
                                el('button', {
                                    style: { padding: '8px 16px', fontSize: '13px', fontWeight: '600', cursor: 'pointer', border: 'none', background: 'none', color: detailTab === 'users' ? 'var(--accent-primary)' : 'var(--text-muted)', borderBottom: detailTab === 'users' ? '2px solid var(--accent-primary)' : '2px solid transparent', fontFamily: 'inherit' },
                                    onclick: () => { detailTab = 'users'; loadConfigUsers(); },
                                }, 'Users'),
                            );
                            bodyContent = renderConfigEditorView();
                        }

                        const content = el('div', { className: 'modal manage-modal' },
                            el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' } },
                                el('h2', { style: { margin: 0 } }, ep.name),
                                el('button', { style: { background: 'none', border: 'none', color: 'var(--error)', fontSize: '20px', cursor: 'pointer' }, onclick: closeDetail }, '\u00D7'),
                            ),
                            el('div', { style: { fontSize: '12px', color: 'var(--text-muted)', fontFamily: 'monospace', marginBottom: '12px' } }, ep.base_url),
                            tabBar,
                            bodyContent,
                        );
                        showModalOverlay(content, () => { closeDetail(); });
                    }

                    function renderConfigListView() {
                        if (detailConfigsLoading) {
                            return el('div', null,
                                el('p', { style: { color: 'var(--text-muted)', fontSize: '14px' } }, 'Loading...'),
                            );
                        }
                        if (detailConfigsError) {
                            return el('div', null,
                                el('p', { style: { color: 'var(--error)', fontSize: '14px' } }, detailConfigsError),
                            );
                        }
                        return el('div', null,
                            el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' } },
                                el('h3', { style: { margin: 0, fontSize: '15px', fontWeight: '600', color: 'var(--text-primary)' } }, 'Configurations'),
                                el('button', { className: 'btn btn-secondary btn-sm', onclick: () => showCreateConfigForm(ep, loadDetailConfigs) }, '+ Create Configuration'),
                            ),
                            detailConfigs.length === 0

                function formatNextReset(schedule, resetTime) {
                    if (!schedule) return '-';
                    const now = new Date();
                    if (schedule === 'daily') {
                        const hour = parseInt(resetTime || '0');
                        return 'Today ' + hour + ':00 UTC';
                    } else if (schedule === 'weekly') {
                        const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
                        const dayIdx = days.indexOf((resetTime || 'monday').toLowerCase());
                        const currentDay = now.getUTCDay();
                        let diff = dayIdx - currentDay;
                        if (diff <= 0) diff += 7;
                        return 'Next ' + (resetTime ? resetTime.charAt(0).toUpperCase() + resetTime.slice(1) : 'Monday');
                    } else if (schedule === 'monthly') {
                        return 'Next Day ' + (resetTime || '1');
                    }
                    return '-';
                }

                    );

                    if (!aiUsageData || !aiUsageData.length) {
                        return el('div', null, periodBtns, el('p', { style: { color: 'var(--text-muted)', fontSize: '13px' } }, 'No usage data available.'));
                    }

                    const rows = aiUsageData.map(row => {
                        // Determine remaining based on limit type
                        let remaining, limitValue;
                        if (row.limit_type === 'tokens') {
                            limitValue = row.limit_value_tokens || 0;
                            remaining = limitValue - (row.tokens || 0);
                        } else if (row.limit_type === 'both') {
                            const remReq = (row.limit_value_requests || 0) - (row.request_count || 0);
                            const remTok = (row.limit_value_tokens || 0) - (row.token_count || 0);
                            remaining = Math.min(remReq, remTok);
                            limitValue = Math.min(row.limit_value_requests || 0, row.limit_value_tokens || 0);
                        } else {
                            // requests-based (default)
                            limitValue = row.limit_value_requests || 0;
                            remaining = limitValue - (row.request_count || 0);
                        }

                        // Calculate remaining class for color coding
                        let remainingClass;
                        if (!row.limit_type || !limitValue) {
                            remainingClass = 'var(--text-muted)';
                        } else if (remaining <= 0) {
                            remainingClass = 'var(--error)';
                        } else if (remaining < limitValue * 0.2) {
                            remainingClass = 'var(--warning)';
                        } else if (remaining >= limitValue * 0.5) {
                            remainingClass = 'var(--success)';
                        } else {
                            remainingClass = 'var(--text-secondary)';
                        }

                        // Format limit type display
                        const limitTypeDisplay = row.limit_type
                            ? (row.limit_type.charAt(0).toUpperCase() + row.limit_type.slice(1))
                            : 'No limit';

                        // Format remaining display
                        const remainingDisplay = (!row.limit_type || !limitValue)

                            el('h2', null, 'Add AI Endpoint'),
                            formError ? el('p', { className: 'modal-error' }, formError) : null,
                            testResult ? el('p', { style: { color: testResult.startsWith('Success') ? 'var(--success)' : 'var(--error)', fontSize: '13px', marginBottom: '12px' } }, testResult) : null,
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'ep-name' }, 'Name'),
                                el('input', { id: 'ep-name', type: 'text', value: formName, oninput: (e) => { formName = e.target.value; updateBtnState(); }, placeholder: 'My OpenAI Endpoint' }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'ep-url' }, 'Base URL'),
                                el('input', { id: 'ep-url', type: 'text', value: formUrl, oninput: (e) => { formUrl = e.target.value; updateBtnState(); }, placeholder: 'https://api.openai.com/v1' }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'ep-key' }, 'API Key'),
                                el('input', { id: 'ep-key', type: 'password', value: formKey, oninput: (e) => { formKey = e.target.value; updateBtnState(); }, placeholder: 'sk-...' }),
                            ),
                            el('div', { className: 'modal-actions' },
                                el('button', { className: 'btn btn-secondary', onclick: closeAddModal }, 'Cancel'),
                                el('button', { id: 'ep-test-btn', className: 'btn btn-secondary', disabled: formSubmitting || !formUrl || !formKey ? 'disabled' : null, onclick: () => {
                                    testResult = 'Testing...';
                                    formError = '';
                                    renderForm();
                                    fetch(formUrl + '/models', {
                                        headers: { 'Authorization': 'Bearer ' + formKey, 'Content-Type': 'application/json' }
                                    })
                                    .then(res => {
                                        if (res.ok) {
                                            testResult = 'Success! Connection verified.';
                                        } else {
                                            testResult = 'Failed: HTTP ' + res.status;
                                        }
                                        renderForm();
                                    })
                                    .catch(err => {
                                        testResult = 'Failed: ' + err.message;
                                        renderForm();
                                    });
                                } }, 'Test Connection'),
                                el('button', { className: 'btn btn-primary', disabled: formSubmitting || !formName || !formUrl || !formKey ? 'disabled' : null, onclick: () => {
                                    formSubmitting = true;
                                    formError = '';

                                    apiPost('/api/ai/endpoints/mine', { name: formName, base_url: formUrl, api_key: formKey })
                                        .then(() => { closeAddModal(); loadEndpoints(); })
                                        .catch(err => { formSubmitting = false; formError = err.message; renderForm(); });
                                } }, formSubmitting ? 'Saving...' : 'Save Endpoint'),
                            ),
                        );

                        function updateBtnState() {
                            const saveBtn = document.querySelector('.modal-overlay .btn-primary');
                            const testBtn = document.getElementById('ep-test-btn');
                            if (saveBtn) saveBtn.disabled = formSubmitting || !formName || !formUrl || !formKey;
                            if (testBtn) testBtn.disabled = formSubmitting || !formUrl || !formKey;
                        }

                        showModalOverlay(content, () => { closeAddModal(); });

                    renderForm();
                }

                function openEndpointDetail(endpoint) {
                    selectedEndpoint = endpoint;
                    endpointDetailTab = 'models';
                    endpointModels = [];
                    endpointModelsError = '';
                    endpointUsers = [];
                    endpointUsersError = '';
                    endpointUsage = null;
                    endpointUsageError = '';
                    loadEndpointModels();
                    render();
                }

                function loadEndpointModels() {
                    if (!selectedEndpoint) return;
                    endpointModelsLoading = true;
                    endpointModelsError = '';
                    render();
                    apiGet('/api/ai/endpoints/mine/' + selectedEndpoint.id + '/models')
                        .then(data => {
                            endpointModels = Array.isArray(data) ? data : (data.models || data.fetched_models || []);
                            endpointModelsLoading = false;
                            render();
                        })
                        .catch(err => {
                            endpointModelsLoading = false;
                            endpointModelsError = err.message;
                            render();
                        });
                }

                function handleFetchModels() {
                    if (!selectedEndpoint) return;
                    fetchingModels = true;
                    endpointModelsError = '';
                    render();
                    apiPost('/api/ai/endpoints/mine/' + selectedEndpoint.id + '/fetch-models', {})
                        .then(data => {
                            fetchingModels = false;
                            endpointModels = Array.isArray(data) ? data : (data.models || data.fetched_models || []);
                            render();
                        })
                        .catch(err => {
                            fetchingModels = false;
                            endpointModelsError = err.message;
                            render();
                        });
                }

                function handleToggleModel(modelName, enabled) {
                    if (!selectedEndpoint) return;
                    apiPut('/api/ai/endpoints/mine/' + selectedEndpoint.id + '/models/' + encodeURIComponent(modelName), { enabled: enabled })
                        .then(() => loadEndpointModels())
                        .catch(err => { endpointModelsError = err.message; render(); });
                }

                function handleUpdateModel(modelName, updates) {
                    if (!selectedEndpoint) return;
                    apiPut('/api/ai/endpoints/mine/' + selectedEndpoint.id + '/models/' + encodeURIComponent(modelName), updates)
                        .then(() => loadEndpointModels())
                        .catch(err => { endpointModelsError = err.message; render(); });
                }

                function loadEndpointUsers() {
                    if (!selectedEndpoint) return;
                    endpointUsersLoading = true;
                    endpointUsersError = '';
                    render();
                    apiGet('/api/ai/endpoints/mine/' + selectedEndpoint.id + '/users')
                        .then(data => {
                            endpointUsers = data.users || data;
                            endpointUsersLoading = false;
                            render();
                        })
                        .catch(err => {
                            endpointUsersLoading = false;
                            endpointUsersError = err.message;
                            render();
                        });
                }

                function handleUnshareUser(targetUserId, targetUsername) {
                    if (!selectedEndpoint) return;
                    showConfirmModal('Remove sharing for "' + targetUsername + '"?', () => {
                        apiDelete('/api/ai/endpoints/mine/' + selectedEndpoint.id + '/users/' + targetUserId)
                            .then(() => loadEndpointUsers())
                            .catch(err => { endpointUsersError = err.message; render(); });
                    });
                }

                function showShareUserForm() {
                    let shareUsername = '';
                    let shareLimitRequests = '';
                    let shareLimitTokens = '';
                    let shareSchedule = 'daily';
                    let shareResetTime = '';
                    let sharePoolMode = 'individual';
                    let shareFormError = '';
                    let shareFormSubmitting = false;
                    function closeShareModal() {
                        closeModal();

                    function renderShareForm() {
                        const existingOverlay = document.querySelector('.modal-overlay');
                        if (existingOverlay) existingOverlay.remove();

                        const content = el('div', { className: 'modal' },
                            el('h2', null, 'Share Endpoint with User'),
                            shareFormError ? el('p', { className: 'modal-error' }, shareFormError) : null,
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'share-username' }, 'Username'),
                                el('input', { id: 'share-username', type: 'text', value: shareUsername, oninput: (e) => { shareUsername = e.target.value; }, placeholder: 'Enter username...' }),

                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'share-req-limit' }, 'Request Limit (blank = unlimited)'),
                                el('input', { id: 'share-req-limit', type: 'number', value: shareLimitRequests, oninput: (e) => { shareLimitRequests = e.target.value; }, placeholder: 'e.g. 1000', min: '0' }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'share-tok-limit' }, 'Token Limit (blank = unlimited)'),
                                el('input', { id: 'share-tok-limit', type: 'number', value: shareLimitTokens, oninput: (e) => { shareLimitTokens = e.target.value; }, placeholder: 'e.g. 100000', min: '0' }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'share-schedule' }, 'Reset Schedule'),
                                el('select', { id: 'share-schedule', onchange: (e) => { shareSchedule = e.target.value; } },
                                    el('option', { value: 'daily', selected: shareSchedule === 'daily' ? 'selected' : null }, 'Daily'),
                                    el('option', { value: 'weekly', selected: shareSchedule === 'weekly' ? 'selected' : null }, 'Weekly'),
                                    el('option', { value: 'monthly', selected: shareSchedule === 'monthly' ? 'selected' : null }, 'Monthly'),
                                ),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'share-reset-time' }, 'Reset Time (hour for daily, day name for weekly, day-of-month for monthly)'),
                                el('input', { id: 'share-reset-time', type: 'text', value: shareResetTime, oninput: (e) => { shareResetTime = e.target.value; }, placeholder: 'e.g. 0 or monday or 1' }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'share-pool-mode' }, 'Pool Mode'),
                                el('select', { id: 'share-pool-mode', onchange: (e) => { sharePoolMode = e.target.value; } },
                                    el('option', { value: 'individual', selected: sharePoolMode === 'individual' ? 'selected' : null }, 'Individual (each user has own limits)'),
                                    el('option', { value: 'pool', selected: sharePoolMode === 'pool' ? 'selected' : null }, 'Pool (shared limits among all assigned users)'),
                                ),
                            ),
                            el('div', { className: 'modal-actions' },
                                el('button', { className: 'btn btn-secondary', onclick: closeShareModal }, 'Cancel'),
                                el('button', { className: 'btn btn-primary', disabled: shareFormSubmitting || !shareUsername ? 'disabled' : null, onclick: () => {
                                    shareFormSubmitting = true;
                                    shareFormError = '';
                                    renderShareForm();
                                    const body = { username: shareUsername, limit_requests: shareLimitRequests ? parseInt(shareLimitRequests) : null, limit_tokens: shareLimitTokens ? parseInt(shareLimitTokens) : null, schedule: shareSchedule, reset_time: shareResetTime || null, pool_mode: sharePoolMode };
                                    apiPost('/api/ai/endpoints/mine/' + selectedEndpoint.id + '/users', body)
                                        .then(() => { closeShareModal(); loadEndpointUsers(); })
                                        .catch(err => { shareFormSubmitting = false; shareFormError = err.message; renderShareForm(); });
                                } }, shareFormSubmitting ? 'Sharing...' : 'Share'),
                            ),
                        );
                        showModalOverlay(content, () => { closeShareModal(); });
                    }
                    renderShareForm();
                }

                function loadEndpointUsage() {
                    if (!selectedEndpoint) return;
                    endpointUsageLoading = true;
                    endpointUsageError = '';
                    render();
                    apiGet('/api/ai/usage')
                        .then(data => {
                            endpointUsage = data;
                            endpointUsageLoading = false;
                            render();
                        })
                        .catch(err => {
                            endpointUsageLoading = false;
                            endpointUsageError = err.message;
                            render();
                        });
                }

                // --- Render helpers ---
                function renderProfileSection() {
                    if (profileLoading) {
                        return el('div', { className: 'account-section' },
                            el('p', { style: { color: 'var(--text-muted)' } }, 'Loading profile...'));
                    }
                    if (profileError && !profile) {
                        return el('div', { className: 'account-section' },
                            el('div', { className: 'error-banner' }, profileError));
                    }

                    return el('div', { className: 'account-section' },
                        el('div', { className: 'account-section-header' },
                            el('h3', null, 'Profile'),
                        ),
                        profileError ? el('div', { className: 'error-banner' }, profileError) : null,
                        profileSuccess ? el('div', { style: { color: 'var(--success)', fontSize: '13px', marginBottom: '12px' } }, profileSuccess) : null,
                        profile ? el('form', { className: 'auth-form', onsubmit: handleSaveProfile },
                            el('div', { className: 'form-group' },
                                el('label', null, 'Username'),
                                el('input', { type: 'text', value: profile.username || '', disabled: 'disabled' }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'acct-display-name' }, 'Display Name'),
                                el('input', { id: 'acct-display-name', type: 'text', value: displayName, oninput: (e) => { displayName = e.target.value; } }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'acct-new-password' }, 'New Password (leave blank to keep current)'),
                                el('input', { id: 'acct-new-password', type: 'password', value: newPassword, oninput: (e) => { newPassword = e.target.value; }, autocomplete: 'new-password' }),
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'acct-confirm-password' }, 'Confirm New Password'),
                                el('input', { id: 'acct-confirm-password', type: 'password', value: confirmPassword, oninput: (e) => { confirmPassword = e.target.value; }, autocomplete: 'new-password' }),
                            ),
                            el('div', { className: 'modal-actions' },
                                el('button', { type: 'submit', className: 'btn btn-primary', disabled: saving ? 'disabled' : null }, saving ? 'Saving...' : 'Update Profile'),
                            ),
                        ) : null,
                    );
