                    // --- Save / Cancel --------------------------------
                    formElements.push(
                        el('div', { className: 'modal-actions' },
                            el('button', { className: 'btn btn-secondary', onclick: () => { cleanupWikiEditors(); resetForm(); } }, 'Cancel'),
                            el('button', {
                                className: 'btn btn-primary',
                                onclick: handleSave,
                                disabled: formSaving ? 'disabled' : null,
                            }, formSaving ? 'Saving...' : 'Save'),
                        ),
                    );

                    const form = el('div', { className: 'wiki-form' },
                        el('h3', null, isNew ? 'Create New Entry' : 'Edit Entry: ' + (editingEntry.name || 'Untitled')),
                        ...formElements,
                    );

                    return form;
                }

                // --- Render: Landing Page ----------------------------
                function renderLanding() {
                    return el('div', { className: 'wiki-landing' },
                        el('h2', null, 'Welcome to the Wiki'),
                        el('p', null, 'Build and organize the world of your story. Create wiki entries for characters, locations, items, factions, and lore.'),
                        el('button', { className: 'btn btn-primary', onclick: startNewEntry }, 'Create New Entry'),
                    );
                }

                // --- Main Render -------------------------------------
                function render() {
                    if (loading) {
                        renderApp(
                            el('div', { className: 'wiki-page' },
                                el('div', { className: 'wiki-topbar' },
                                    el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                                    el('h1', null, 'Wiki'),
                                    el('span', { className: 'project-title-sm' }, 'Loading...'),
                                ),
                                el('div', { className: 'wiki-layout' },
                                    el('div', { style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)' } },
                                        'Loading wiki...'),
                                ),
                            )
                        );
                        return;
                    }

                    if (loadError) {
                        renderApp(
                            el('div', { className: 'wiki-page' },
                                el('div', { className: 'wiki-topbar' },
                                    el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                                    el('h1', null, 'Wiki'),
                                    el('span', { className: 'project-title-sm' }, project ? project.title : ''),
                                ),
                                el('div', { className: 'editor-error', style: { padding: '40px 24px' } },
                                    el('p', null, loadError),
                                    el('button', { className: 'btn btn-primary', onclick: goBack }, 'Back to Editor'),
                                ),
                            )
                        );
                        return;
                    }

                    if (!project) return;

                    const page = el('div', { className: 'wiki-page' },
                        el('div', { className: 'wiki-topbar' },
                            el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                            el('h1', null, 'Wiki'),
                            el('span', { className: 'project-title-sm' }, project.title || 'Untitled'),
                            el('button', { className: 'btn btn-secondary btn-sm', onclick: goToProjects }, 'All Projects'),
                        ),
                        el('div', { className: 'wiki-layout' },
                            el('div', {
                                className: 'wiki-sidebar',
                                ondragover: function(e) {
                                    if (!dragWikiEntryId) return;
                                    e.preventDefault();
                                    const targetEntry = e.target.closest('.wiki-entry-item');
                                    if (!targetEntry) return;
                                    const targetId = targetEntry.getAttribute('data-entry-id');
                                    if (targetId === String(dragWikiEntryId)) return;
                                    
                                    // Clear ALL indicators from ALL entries
                                    this.querySelectorAll('.wiki-entry-item').forEach(function(el) {
                                        el.classList.remove('insert-before', 'insert-after', 'left-half', 'right-half');
                                        el.style.boxShadow = '';
                                        el.title = '';
                                    });
                                    
                                    // Remove any legacy split-indicator spans
                                    document.querySelectorAll('.split-indicator-left, .split-indicator-right').forEach(function(el) { el.remove(); });
                                    
                                    // Determine zones
                                    const targetRect = targetEntry.getBoundingClientRect();
                                    const midY = targetRect.top + targetRect.height / 2;
                                    const midX = targetRect.left + targetRect.width / 2;
                                    const insertBefore = e.clientY < midY;
                                    const isLeftHalf = e.clientX < midX;
                                    
                                    // No-op check: skip insert-before/insert-after if position wouldn't change,
                                    // but ONLY if this is NOT a parent reassignment action
                                    const targetIndex = entries.findIndex(en => en.id === Number(targetId));
                                    const draggedIndex = entries.findIndex(en => en.id === dragWikiEntryId);
                                    var isNoopReorder = false;
                                    if (targetIndex !== -1 && draggedIndex !== -1) {
                                        const resultIndex = insertBefore ? targetIndex : targetIndex + 1;
                                        if (draggedIndex < targetIndex) {
                                            const adjustedResult = insertBefore ? (targetIndex - 1) : targetIndex;
                                            if (adjustedResult === draggedIndex) { isNoopReorder = true; }
                                        } else {
                                            if (resultIndex === draggedIndex) { isNoopReorder = true; }
                                        }
                                    }
                                    
                                    // Determine if parent reassignment is intended (mouse clearly in left or right third)
                                    // Use a 40% center dead zone where parent change is NOT assumed
                                    var isLeftAction = e.clientX < targetRect.left + targetRect.width * 0.35;
                                    var isRightAction = e.clientX > targetRect.left + targetRect.width * 0.65;
                                    
                                    if (isNoopReorder && !isLeftAction && !isRightAction) {
                                        // Pure no-op with no parent change intent — show nothing
                                        return;
                                    }
                                    
                                    // Apply insert-position class
                                    if (insertBefore) {
                                        targetEntry.classList.add('insert-before');
                                    } else {
                                        targetEntry.classList.add('insert-after');
                                    }
                                    
                                    // Apply split-half class for parent reassignment intent
                                    if (isLeftAction) {
                                        targetEntry.classList.add('left-half');
                                        targetEntry.title = 'Drop left: Detach all parents';
                                    } else if (isRightAction) {
                                        targetEntry.classList.add('right-half');
                                        targetEntry.title = 'Drop right: Adopt target\'s parent';
                                    }
                                    // Center zone (30%-70%): no parent change, just normal reorder — no split class
                                },
                                ondragleave: function(e) {
                                    const targetEntry = e.target.closest('.wiki-entry-item');
                                    if (targetEntry) {
                                        targetEntry.classList.remove('insert-before', 'insert-after', 'left-half', 'right-half');
                                        targetEntry.style.boxShadow = '';
                                        targetEntry.title = '';
                                    }
                                    // Clean up any legacy split-indicator spans
                                    document.querySelectorAll('.split-indicator-left, .split-indicator-right').forEach(function(el) { el.remove(); });
                                },
                                ondrop: async function(e) {
                                    e.preventDefault();
                                    const targetEntry = e.target.closest('.wiki-entry-item');
                                    if (!targetEntry) return;
                                    const targetId = targetEntry.getAttribute('data-entry-id');
                                    if (targetId === String(dragWikiEntryId)) return;
                                    if (!dragWikiEntryId) return;
                                    const draggedId = dragWikiEntryId;
                                    
                                    // Remove all drag indicators
                                    this.querySelectorAll('.wiki-entry-item').forEach(function(el) {
                                        el.classList.remove('drag-over', 'drag-source', 'insert-before', 'insert-after', 'left-half', 'right-half');
                                        el.style.boxShadow = '';
                                        el.title = '';
                                    });
                                    document.querySelectorAll('.split-indicator-left, .split-indicator-right').forEach(function(el) { el.remove(); });
                                    
                                    const draggedEntry = entries.find(en => en.id === draggedId);
                                    if (!draggedEntry) { dragWikiEntryId = null; return; }
                                    
                                    // Determine drop zones
                                    const targetRect = targetEntry.getBoundingClientRect();
                                    const mouseX = e.clientX;
                                    const mouseY = e.clientY;
                                    const midX = targetRect.left + targetRect.width / 2;
                                    const isLeftHalf = mouseX < midX;
                                    const insertBefore = mouseY < targetRect.top + targetRect.height / 2;
                                    
                                    // Parent reassignment: only trigger if mouse is in outer thirds
                                    var isLeftAction = mouseX < targetRect.left + targetRect.width * 0.35;
                                    var isRightAction = mouseX > targetRect.left + targetRect.width * 0.65;
                                    
                                    const targetData = entries.find(function(en) { return en.id === Number(targetId); });
                                    if (!targetData) { dragWikiEntryId = null; return; }
                                    
                                    // Determine new parents
                                    var draggedParents = (draggedEntry.parent_ids && draggedEntry.parent_ids.length > 0)
                                        ? draggedEntry.parent_ids.slice()
                                        : (draggedEntry.parent_id ? [draggedEntry.parent_id] : []);
                                    
                                    var newParents = null; // null = no parent change
                                    
                                    if (isLeftAction) {
                                        // LEFT third = fully detach
                                        newParents = [];
                                    } else if (isRightAction) {
                                        // RIGHT third = target entry BECOMES the parent of the dragged entry
                                        // The target's own ID becomes the primary parent (index 0)
                                        // Preserve existing secondary parents, removing duplicate of target's ID
                                        newParents = [targetData.id];
                                        for (var pi = 0; pi < draggedParents.length; pi++) {
                                            if (draggedParents[pi] !== targetData.id) {
                                                newParents.push(draggedParents[pi]);
                                            }
                                        }
                                    }
                                    // Center zone: newParents stays null, no parent change
                                    
                                    // Cycle prevention
                                    if (newParents !== null && newParents.length > 0) {
                                        var isCycle = false;
                                        var checkId = targetData.id;
                                        var visited = new Set();
                                        while (checkId && !visited.has(checkId)) {
                                            visited.add(checkId);
                                            if (checkId === draggedId) { isCycle = true; break; }
                                            var checkEntry = entries.find(function(en) { return en.id === checkId; });
                                            if (!checkEntry) break;
                                            var checkParents = (checkEntry.parent_ids && checkEntry.parent_ids.length > 0)
                                                ? checkEntry.parent_ids
                                                : (checkEntry.parent_id ? [checkEntry.parent_id] : []);
                                            checkId = checkParents.length > 0 ? checkParents[0] : null;
                                        }
                                        if (isCycle) { newParents = []; }
                                    }
                                    
                                    // Determine target category
                                    const targetCategory = targetEntry.getAttribute('data-entry-category') || 'Uncategorized';
                                    const oldCategory = draggedEntry.category || 'Uncategorized';
                                    const isCrossCategory = oldCategory !== targetCategory;
                                    
                                    // No-op reorder check
                                    var isNoopReorder = false;
                                    var targetIndexFi = entries.findIndex(function(en) { return en.id === Number(targetId); });
                                    var draggedIndexFi = entries.findIndex(function(en) { return en.id === draggedId; });
                                    if (targetIndexFi !== -1 && draggedIndexFi !== -1) {
                                        var resultIdx = insertBefore ? targetIndexFi : targetIndexFi + 1;
                                        if (draggedIndexFi < targetIndexFi) {
                                            var adj = insertBefore ? (targetIndexFi - 1) : targetIndexFi;
                                            if (adj === draggedIndexFi) { isNoopReorder = true; }
                                        } else {
                                            if (resultIdx === draggedIndexFi) { isNoopReorder = true; }
                                        }
                                    }
                                    
                                    try {
                                        // Category change
                                        if (isCrossCategory) {
                                            await apiPut('/api/wiki/' + draggedId, { category: targetCategory });
                                            draggedEntry.category = targetCategory;
                                        }
                                        // Parent change
                                        if (newParents !== null) {
                                            var parentUpdateBody = {
                                                parent_id: newParents.length > 0 ? newParents[0] : null,
                                                parents: newParents,
                                            };
                                            await apiPut('/api/wiki/' + draggedId, parentUpdateBody);
                                            draggedEntry.parent_ids = newParents.length > 0 ? newParents.slice() : [];
                                            draggedEntry.parent_id = newParents.length > 0 ? newParents[0] : null;
                                        }
                                        // Reorder (always unless pure no-op with no changes)
                                        if (!isNoopReorder || isCrossCategory || newParents !== null) {
                                            var reordered = entries.filter(function(en) { return en.id !== draggedId; });
                                            var targetIdNum = Number(targetId);
                                            var tIdx = reordered.findIndex(function(en) { return en.id === targetIdNum; });
                                            
                                            if (isNaN(targetIdNum)) {
                                                console.error('[DROP] Invalid targetId (NaN), pushing to end:', targetId);
                                                reordered.push(draggedEntry);
                                            } else if (tIdx !== -1) {
                                                var insIdx = insertBefore ? tIdx : tIdx + 1;
                                                reordered.splice(insIdx, 0, draggedEntry);
                                            } else {
                                                console.warn('[DROP] Target not in reordered, pushing to end. targetId=' + targetIdNum);
                                                reordered.push(draggedEntry);
                                            }
                                            
                                            await apiPut('/api/projects/' + projectId + '/wiki/reorder', { order: reordered.map(function(en) { return en.id; }) });
                                        }
                                    } catch (err) {
                                        if (err.status === 409) {
                                            showModalOverlay(
                                                el('div', { className: 'modal' },
                                                    el('p', { style: { color: 'var(--text-primary)', fontSize: '14px', marginBottom: '16px' } },
                                                        'An entry with this name already exists in that category. Please rename one of the entries before moving.'),
                                                    el('div', { className: 'modal-actions' },
                                                        el('button', { className: 'btn btn-primary', onclick: function() { closeModal(); } }, 'OK'),
                                                    ),
                                                ),
                                            );
                                        } else {
                                            recordApiError(err);
                                        }
                                        dragWikiEntryId = null;
                                        loadAll();
                                        return;
                                    }
                                    
                                    dragWikiEntryId = null;
                                    clearWikiCache(projectId);
                                    loadAll();
                                },
                            },
                                renderSidebarContent(),
                            ),
                            el('div', { className: 'wiki-main' },
                                editingEntry ? renderForm() :
                                creatingNew ? renderForm() :
                                selectedEntry ? renderDetailView(selectedEntry) :
                                renderLanding(),
                            ),
                        ),
                    );

                    renderApp(page);

                    // Fetch real token count for detail view (async)
                    (async () => {
                        if (selectedEntry && !editingEntry && !creatingNew) {
                            const detailCountsEl = document.getElementById('wiki-detail-counts');
                            if (detailCountsEl) {
                                const detailCounts = computeWikiEntryCounts(selectedEntry);
                                let text = (selectedEntry.name || '') + ' ' + (selectedEntry.content || '').replace(/<[^>]*>/g, ' ');
                                try {
                                    const meta = JSON.parse(selectedEntry.metadata_json || '{}');
                                    if (meta.ai_context_snippet) text += ' ' + meta.ai_context_snippet;
                                    if (meta.private_notepad) text += ' ' + meta.private_notepad.replace(/<[^>]*>/g, ' ');
                                    if (meta.subcategories) {
                                        for (const val of Object.values(meta.subcategories)) {
                                            if (val) text += ' ' + (typeof val === 'string' ? val : JSON.stringify(val)).replace(/<[^>]*>/g, ' ');
                                        }
                                    }
                                    if (meta.attributes) {
                                        for (const val of Object.values(meta.attributes)) {
                                            if (val) text += ' ' + val;
                                        }
                                    }
                                } catch(_) {}
                                try {
                                    const tokens = await fetchTokenCount(text.trim());
                                    detailCountsEl.textContent = 'Words: ' + detailCounts.wc.toLocaleString() + ' \u00B7 Tokens: ' + tokens.toLocaleString();
                                } catch(_) {
                                    detailCountsEl.textContent = 'Words: ' + detailCounts.wc.toLocaleString() + ' \u00B7 Tokens: ' + detailCounts.tc.toLocaleString();
                                }
                            }
                        }
                    })();

                    // Set form values after render
                    const nameInput = document.getElementById('wiki-form-name');
                    if (nameInput) nameInput.value = formName;

                    const contentTa = document.getElementById('wiki-form-content');
                    if (contentTa) contentTa.value = formContent;

                    const parentSel = document.getElementById('wiki-form-parent');
                    if (parentSel) parentSel.value = '';

                    const snippetTa = document.getElementById('wiki-ai-snippet');
                    if (snippetTa) snippetTa.value = formMetadata.ai_context_snippet || '';

                    // Initialize TipTap editors (after DOM is ready)
                    const showForm = !!(editingEntry || creatingNew);
                    if (showForm) {
                        // Initialize subcategory editors if category is selected
                        const dropdownCategories = (categories && categories.length > 0) ? categories : ['Characters', 'Locations', 'Items / Artefacts', 'Factions / Groups', 'Lore / History', 'Religions', 'Power System'];
                        let subcatNames = [];
                        if (formCategory && !_showCustomCategory && dropdownCategories.includes(formCategory)) {
                            subcatNames = getEffectiveSubcategories(formCategory);
                        }
                        const allSubcatNames = [...subcatNames];
                        for (const sc of customSubcats) {
                            if (!subcatNames.includes(sc.name)) {
                                allSubcatNames.push(sc);
                            }
                        }
                        // Include any subcategory content keys not already in the list
                        if (formMetadata.subcategories) {
                            for (const key of Object.keys(formMetadata.subcategories)) {
                                const alreadyInList = allSubcatNames.some(item => {
                                    if (typeof item === 'object') return item.key === key;
                                    return item === key;
                                });
                                if (!alreadyInList) {
                                    allSubcatNames.push(key);
                                }
                            }
                        }

                        for (const item of allSubcatNames) {
                            const isCustom = typeof item === 'object';
                            const key = isCustom ? item.key : item;
                            const divId = 'wiki-subcat-' + key.replace(/[^a-zA-Z0-9_-]/g, '_');
                            let content = (formMetadata.subcategories && formMetadata.subcategories[key]) || '';
                            // For custom subcats, stored value may be JSON { name, content } — extract just the content
                            if (isCustom && typeof content === 'string' && content.startsWith('{')) {
                                try {
                                    const parsed = JSON.parse(content);
                                    content = parsed.content || '';
                                } catch(_) {}
                            }
                            initWikiSubcategoryEditor(divId, content, (ed) => {
                                setSubcategoryContent(key, ed.getHTML());
                                wikiFormDirty = true;
                            });
                        }

                        // Schedule notepad init with progressive retries
                        setTimeout(initNotepadEditor, 50);
                        setTimeout(initNotepadEditor, 250);
                        setTimeout(initNotepadEditor, 700);
                        setTimeout(initNotepadEditor, 1500);

                        // Retry any uninitialized editors after a short delay
                        setTimeout(() => {
                            for (const item of allSubcatNames) {
                                const isCustom = typeof item === 'object';
                                const key = isCustom ? item.key : item;
                                const divId2 = 'wiki-subcat-' + key.replace(/[^a-zA-Z0-9_-]/g, '_');
                                const existing2 = wikiTiptapEditors.find(item => item.id === divId2);
                                if (!existing2) {
                                    let content2 = (formMetadata.subcategories && formMetadata.subcategories[key]) || '';
                                    // For custom subcats, extract content from JSON wrapper
                                    if (isCustom && typeof content2 === 'string' && content2.startsWith('{')) {
                                        try {
                                            const parsed = JSON.parse(content2);
                                            content2 = parsed.content || '';
                                        } catch(_) {}
                                    }
                                    initWikiSubcategoryEditor(divId2, content2, (ed) => {
                                        setSubcategoryContent(key, ed.getHTML());
                                        wikiFormDirty = true;
                                    });
                                }
                            }
                        }, 100);

                        // Final safety net: init any editors still missing after all retries
                        setTimeout(() => {
                            if (!showForm) return;
                            const allSubcatDivs = document.querySelectorAll('[id^="wiki-subcat-"]');
                            for (const div of allSubcatDivs) {
                                const existing = wikiTiptapEditors.find(item => item.id === div.id);
                                if (!existing) {
                                    const key = div.id.replace('wiki-subcat-', '');
                                    let content = (formMetadata.subcategories && formMetadata.subcategories[key]) || '';
                                    // Could be JSON-wrapped — extract content
                                    if (typeof content === 'string' && content.startsWith('{')) {
                                        try {
                                            const parsed = JSON.parse(content);
                                            content = parsed.content || '';
                                        } catch(_) {}
                                    }
                                    initWikiSubcategoryEditor(div.id, content, (ed) => {
                                        setSubcategoryContent(key, ed.getHTML());
                                        wikiFormDirty = true;
                                    });
                                }
                            }
                        }, 300);
                    }
                }

                // --- Initial load ------------------------------------
                loadAll();
            }

            // --- Bootstrap -------------------------------------------
            function init() {
                window.addEventListener('hashchange', router);
                router();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
