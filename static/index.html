<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicle Architect</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            /* Surfaces */
            --bg-surface: #1A1A1A;        /* Page background, main surface */
            --bg-elevated: #242424;       /* Cards, sidebars, panels */
            --bg-input: #2E2E2E;         /* All text editors (manuscript paper, wiki fields), input fields */
            --bg-hover: var(--bg-elevated); /* Compatibility alias for JS inline styles */

            /* Text */
            --text-primary: #E0E0E0;      /* Body text, headings – soft off-white */
            --text-secondary: #A0A0A0;    /* Labels, metadata, counts */
            --text-muted: #6B6B6B;        /* Placeholders, disabled text */

            /* Borders */
            --border-light: #3A3A3A;      /* Subtle dividers, card borders */
            --border-medium: #4A4A4A;     /* Active input borders, focused fields */

            /* Accent (Amber) – used for primary buttons, active states, status indicators */
            --accent-primary: #D4A017;           /* Primary amber – warm gold */
            --accent-primary-hover: #E8B832;     /* Lighter on hover */
            --accent-primary-soft: rgba(212, 160, 23, 0.15); /* Subtle highlight for selections */

            /* Semantic States */
            --success: #66BB6A;
            --warning: #FFA726;
            --error: #EF5350;
            --info: #4FC3F7;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg-surface);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.5;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- Auth Pages (register / login) ---------- */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 24px;
        }

        .auth-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }

        .auth-title {
            margin: 0 0 4px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .auth-subtitle {
            margin: 0 0 24px 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input {
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            border-color: var(--accent-primary);
        }

        .auth-hint {
            margin: 12px 0 0 0;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .auth-hint code {
            font-family: monospace;
            background: var(--bg-hover);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 12px;
        }

        .auth-error {
            color: var(--error);
            font-size: 13px;
            margin: 0 0 8px 0;
            min-height: 0;
        }

        .auth-link {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }

        .auth-link a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        /* ---------- Buttons ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            border: none;
            outline: none;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: var(--accent-primary-hover);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--accent-primary-soft);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
        }

        .btn-danger:hover {
            background: rgba(239, 83, 80, 0.15);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
        }

        .btn-xs {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 3px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ---------- Project List Page ---------- */
        .projects-page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 28px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-elevated);
        }

        .topbar h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .projects-content {
            flex: 1;
            padding: 24px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .projects-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .projects-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px 24px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }

        .project-card:hover {
            border-color: var(--accent-primary);
            background: var(--bg-elevated);
        }

        .project-card h3 {
            margin: 0 0 6px 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .project-card p {
            margin: 0;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .project-card .project-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .project-card .project-delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            line-height: 1;
            z-index: 2;
        }

        .project-card .project-delete-btn:hover {
            color: var(--error);
            background: rgba(239, 83, 80, 0.15);
        }

        .project-card .project-edit-btn {
            position: absolute;
            top: 12px;
            right: 40px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            line-height: 1;
            z-index: 2;
        }

        .project-card .project-edit-btn:hover {
            color: var(--accent-primary);
            background: var(--accent-primary-soft);
        }

        .empty-projects {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* ---------- Modal ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 28px;
            width: 100%;
            max-width: 440px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-wide {
            max-width: 560px;
        }

        .modal h2 {
            margin: 0 0 20px 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .modal .form-group {
            margin-bottom: 16px;
        }

        .modal .form-group label {
            font-size: 14px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 6px;
        }

        .modal .form-group input,
        .modal .form-group textarea,
        .modal .form-group select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: vertical;
        }

        .modal .form-group input:focus,
        .modal .form-group textarea:focus,
        .modal .form-group select:focus {
            border-color: var(--accent-primary);
        }

        .modal .form-group textarea {
            min-height: 80px;
        }

        .modal .form-group select {
            cursor: pointer;
        }

        .modal .form-group select option {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }

        .modal-error {
            color: var(--error);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .modal-detail {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
            margin: 0 0 4px 0;
        }

        .modal-detail strong {
            color: var(--text-primary);
        }

        .modal-content-block {
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 14px;
            margin-top: 12px;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        /* ---------- Editor Page ---------- */
        .editor-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-bottom: 28px;
        }

        .editor-topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-elevated);
            flex-shrink: 0;
        }

        .editor-topbar .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: inherit;
            display: flex;
            align-items: center;
        }

        .editor-topbar .back-btn:hover {
            color: var(--text-primary);
            background: var(--bg-elevated);
        }

        .editor-topbar .project-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .editor-topbar .save-indicator {
            font-size: 13px;
            font-weight: 500;
            min-width: 80px;
            text-align: right;
        }

        .editor-topbar .save-indicator.state-typing {
            color: var(--warning);
        }
        .editor-topbar .save-indicator.state-waiting {
            color: var(--warning);
        }
        .editor-topbar .save-indicator.state-saving {
            color: var(--warning);
        }
        .editor-topbar .save-indicator.state-saved {
            color: var(--success);
        }
        .editor-topbar .save-indicator.state-error {
            color: var(--error);
        }

        .editor-topbar .word-count {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ---------- Editor Layout (sidebar + main) ---------- */
        .editor-layout {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ---------- Sidebar ---------- */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background: var(--bg-elevated);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            width: 40px;
        }

        .sidebar-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            flex-shrink: 0;
            font-family: inherit;
            min-height: 36px;
        }

        .sidebar-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-elevated);
        }

        .sidebar-header {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar.collapsed .sidebar-header {
            display: none;
        }

        .sidebar-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }

        .sidebar.collapsed .sidebar-inner {
            display: none;
        }

        .sidebar-project-title {
            padding: 12px 16px 8px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            border-bottom: none;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-section-header {
            padding: 12px 16px 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chapter-list {
            flex: 1;
            overflow-y: auto;
        }

        .chapter-item {
            padding: 6px 8px 6px 20px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            border-left: 3px solid transparent;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chapter-item:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .chapter-item.active {
            background: var(--accent-primary-soft);
            color: var(--text-primary);
            border-left-color: var(--accent-primary);
        }

        .chapter-item .chapter-title-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .chapter-item .chapter-icon-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 5px;
            border-radius: 3px;
            line-height: 1;
            flex-shrink: 0;
        }

        .chapter-item:hover .chapter-icon-btn {
            display: inline-flex;
            align-items: center;
        }

        .chapter-item .chapter-icon-btn:hover {
            color: var(--accent-primary);
            background: var(--bg-elevated);
        }

        .chapter-item .chapter-icon-btn.delete-btn:hover {
            color: var(--error);
        }

        .chapter-item .chapter-edit-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--accent-primary);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            padding: 2px 6px;
            outline: none;
        }

        .sidebar-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-link {
            display: block;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
        }

        .sidebar-link:hover {
            color: var(--accent-primary);
        }

        /* ---------- Editor Main Area ---------- */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ---------- Wiki References Panel ---------- */
        .wiki-refs-panel {
            border-top: 1px solid var(--border-light);
            background: var(--bg-elevated);
            padding: 8px 16px;
            font-size: 13px;
            flex-shrink: 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .wiki-refs-panel.hidden {
            display: none;
        }

        .wiki-refs-header {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            margin: 0 0 4px 0;
            cursor: pointer;
            user-select: none;
        }

        .wiki-refs-header:hover {
            color: var(--text-secondary);
        }

        .wiki-refs-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .wiki-ref-item {
            display: inline-block;
            background: var(--accent-primary-soft);
            color: var(--accent-primary);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .wiki-ref-item:hover {
            background: var(--accent-primary-soft);
        }

        /* ---------- Error States ---------- */
        .editor-error {
            padding: 40px 24px;
            text-align: center;
            color: var(--error);
            font-size: 16px;
        }

        .editor-error p {
            margin: 0 0 16px 0;
        }

        .editor-loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ---------- Error Banner ---------- */
        .error-banner {
            background: rgba(239, 83, 80, 0.12);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        /* ---------- Status Bar ---------- */
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: var(--bg-elevated);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
            color: var(--text-muted);
            gap: 8px;
            z-index: 900;
            user-select: none;
        }

        #status-bar.hidden {
            display: none;
        }

        .status-bar-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-bar-dot.connected {
            background: var(--success);
        }

        .status-bar-dot.disconnected {
            background: var(--error);
        }

        .status-bar-sep {
            color: var(--text-muted);
        }

        .status-bar-error {
            color: var(--warning);
            cursor: help;
        }

        /* ---------- Wiki Page ---------- */
        .wiki-page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 28px;
        }

        .wiki-topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-elevated);
        }

        .wiki-topbar .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: inherit;
            display: flex;
            align-items: center;
        }

        .wiki-topbar .back-btn:hover {
            color: var(--text-primary);
            background: var(--bg-elevated);
        }

        .wiki-topbar h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .wiki-topbar .project-title-sm {
            margin: 0;
            font-size: 14px;
            color: var(--text-secondary);
            flex: 1;
        }

        .wiki-content {
            flex: 1;
            padding: 24px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .wiki-content h2 {
            margin: 0 0 16px 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .wiki-section {
            margin-bottom: 32px;
        }

        .wiki-category {
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            overflow: hidden;
        }

        .wiki-category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-elevated);
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .wiki-category-header:hover {
            background: var(--bg-elevated);
        }

        .wiki-category-arrow {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.15s;
            display: inline-block;
        }

        .wiki-category.collapsed .wiki-category-arrow {
            transform: rotate(-90deg);
        }

        .wiki-category.collapsed .wiki-category-body {
            display: none;
        }

        .wiki-category-body {
            position: relative;
            padding: 4px 0 4px 20px;
            margin-left: 20px;
        }

        .wiki-category-body::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 8px;
            width: 1px;
            background: var(--accent-primary);
        }

        .wiki-category-body::before { display: none; }

        .wiki-entry-item {
            padding: 8px 16px 8px 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            overflow: visible;
            display: flex;
            align-items: center;
        }

        /* Tree lines now rendered inline via <span> elements for multi-level depth support */
        .wiki-entry-item::after,
        .wiki-entry-item::before {
            display: none;
        }

        .wiki-entry-item.drag-image-clone::after,
        .wiki-entry-item.drag-image-clone::before {
            display: none !important;
        }

        .wiki-entry-item:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .wiki-empty {
            color: var(--text-muted);
            font-size: 14px;
            padding: 16px 0;
        }

        .wiki-form {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px;
        }

        .wiki-form h3 {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ---------- Editor Toolbar ---------- */
        .editor-toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-elevated);
            justify-content: center;
            flex-shrink: 0;
        }

        .editor-toolbar-inner {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            max-width: 800px;
            width: 100%;
            justify-content: flex-start;
        }

        .editor-toolbar button {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            padding: 5px 9px;
            border-radius: 4px;
            line-height: 1;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
            white-space: nowrap;
        }

        .editor-toolbar button:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .editor-toolbar button.active {
            background: var(--accent-primary-soft);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .editor-toolbar .toolbar-sep {
            width: 1px;
            height: 20px;
            background: var(--border-light);
            margin: 0 4px;
            flex-shrink: 0;
        }

        .editor-toolbar select {
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
            padding: 5px 8px;
            cursor: pointer;
            outline: none;
        }

        .editor-toolbar select:focus {
            border-color: var(--accent-primary);
        }

        .editor-toolbar select option {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ---------- Manuscript Paper ---------- */
        .editor-manuscript-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 24px 16px 48px 16px;
            background: var(--bg-surface);
        }

        .editor-paper {
            width: 100%;
            max-width: 800px;
            background: var(--bg-input);
            color: var(--text-primary);
            border-radius: 4px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border-light);
            min-height: max(100%, 1000px);
            display: flex;
            flex-direction: column;
        }

        .editor-paper .ProseMirror {
            flex: 1;
            padding: 48px 56px;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-primary);
            background: transparent;
            border: none;
            min-height: 400px;
            word-wrap: break-word;
        }

        .editor-paper .ProseMirror:focus {
            outline: none;
        }

        .editor-paper .ProseMirror h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 24px 0 12px 0;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .editor-paper .ProseMirror h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            line-height: 1.35;
            color: var(--text-primary);
        }

        .editor-paper .ProseMirror h3 {
            font-size: 17px;
            font-weight: 600;
            margin: 16px 0 8px 0;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .editor-paper .ProseMirror p {
            margin: 0 0 8px 0;
        }

        .editor-paper .ProseMirror blockquote {
            border-left: 3px solid var(--accent-primary);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .editor-paper .ProseMirror ul,
        .editor-paper .ProseMirror ol {
            padding-left: 24px;
            margin: 8px 0;
        }

        .editor-paper .ProseMirror li {
            margin-bottom: 4px;
        }

        .editor-paper .ProseMirror code {
            background: var(--bg-elevated);
            border-radius: 3px;
            padding: 1px 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }

        .editor-paper .ProseMirror pre {
            background: var(--bg-elevated);
            border-radius: 4px;
            padding: 12px 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: auto;
        }

        .editor-paper .ProseMirror pre code {
            background: none;
            padding: 0;
        }

        /* ---------- Volume & Chapter Tree in Sidebar ---------- */
        .sidebar-volume-header {
            padding: 6px 8px 6px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
            border-left: 3px solid transparent;
        }

        .sidebar-volume-header:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .sidebar-volume-header .volume-arrow {
            font-size: 10px;
            color: var(--text-muted);
            transition: transform 0.15s;
            display: inline-block;
            width: 12px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-volume-header .volume-title-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .sidebar-volume-header .volume-icon-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            padding: 2px 5px;
            border-radius: 3px;
            line-height: 1;
            flex-shrink: 0;
        }

        .sidebar-volume-header:hover .volume-icon-btn {
            display: inline-flex;
            align-items: center;
        }

        .sidebar-volume-header .volume-icon-btn:hover {
            color: var(--accent-primary);
            background: var(--bg-elevated);
        }

        .sidebar-volume-header .volume-icon-btn.delete-btn:hover {
            color: var(--error);
        }

        .sidebar-volume-chapters .chapter-item {
            padding-left: 32px;
        }

        .sidebar-chapter-move-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 3px;
            line-height: 1;
            flex-shrink: 0;
            margin-left: 2px;
        }

        .chapter-item:hover .sidebar-chapter-move-btn {
            display: inline-flex;
            align-items: center;
        }

        .sidebar-chapter-move-btn:hover {
            color: var(--accent-primary);
            background: var(--bg-elevated);
        }

        .sidebar-add-minute {
            padding: 3px 8px 3px 52px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .sidebar-add-minute:hover {
            color: var(--accent-primary);
        }

        .sidebar-add-volume-btn {
            padding: 6px 16px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            border-top: 1px solid var(--border-light);
        }

        .sidebar-add-volume-btn:hover {
            color: var(--accent-primary);
            background: var(--bg-elevated);
        }

        /* ---------- Help FAB ---------- */
        .help-fab {
            position: fixed;
            bottom: 36px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-primary);
            color: var(--bg-surface);
            border: none;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 800;
            transition: background 0.15s, transform 0.15s;
        }

        .help-fab:hover {
            background: var(--accent-primary-hover);
            transform: scale(1.1);
        }

        .help-fab.hidden {
            display: none;
        }

        /* ---------- Help Modal ---------- */
        .help-modal {
            max-width: 680px;
        }

        .help-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 20px;
        }

        .help-tab {
            padding: 10px 20px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: inherit;
        }

        .help-tab:hover {
            color: var(--text-primary);
        }

        .help-tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        .help-tab-content {
            min-height: 280px;
            max-height: 55vh;
            overflow-y: auto;
        }

        .help-tab-panel {
            display: none;
        }

        .help-tab-panel.active {
            display: block;
        }

        .help-tab-panel h2 {
            margin: 0 0 12px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .help-tab-panel p {
            margin: 0 0 12px 0;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .help-tab-panel p:last-child {
            margin-bottom: 0;
        }

        /* ---------- Drag and Drop ---------- */
        .chapter-item[draggable="true"] {
            cursor: grab;
        }

        .chapter-item[draggable="true"]:active {
            cursor: grabbing;
        }

        .chapter-item.drag-over-self {
            border-top: 2px solid var(--accent-primary);
        }

        .drag-over {
            background: var(--accent-primary-soft) !important;
        }

        .sidebar-volume-header.drag-over {
            background: var(--accent-primary-soft) !important;
        }

        /* Wiki entry drag and drop */
        .wiki-entry-item.drag-source {
            box-sizing: border-box;
            background: rgba(36, 36, 36, 0.3) !important;
            color: rgba(224, 224, 224, 0.35) !important;
        }
        .wiki-entry-item.drag-source .wiki-entry-counts {
            color: rgba(160, 160, 160, 0.35) !important;
        }
        .wiki-entry-item.insert-before {
            box-sizing: border-box;
            border-top: 2px solid var(--accent-primary) !important;
        }
        .wiki-entry-item.insert-after {
            box-sizing: border-box;
            border-bottom: 2px solid var(--accent-primary) !important;
        }

        .wiki-entry-item.drag-image-clone {
            position: fixed;
            top: -9999px;
            left: -9999px;
            display: block;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--text-secondary);
            background: var(--bg-elevated);
            border: 2px solid var(--accent-primary);
            border-radius: 0;
            z-index: -1;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0.9;
        }
        /* ---------- Wiki Two-Column Layout ---------- */
        .wiki-layout { display: flex; gap: 0; min-height: 0; flex: 1; }
        .wiki-sidebar { width: 320px; min-width: 260px; flex-shrink: 0; border-right: 1px solid var(--border-light); overflow-y: auto; background: var(--bg-elevated); }
        .wiki-main { flex: 1; overflow-y: auto; padding: 24px; min-width: 0; }
        @media (max-width: 768px) { .wiki-layout { flex-direction: column; } .wiki-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-light); max-height: 300px; } }

        /* ---------- Wiki Landing Page ---------- */
        .wiki-landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            text-align: center;
            padding: 40px;
        }
        .wiki-landing h2 {
            margin: 0 0 12px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .wiki-landing p {
            margin: 0 0 24px 0;
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
        }

        /* ---------- Wiki Entry List ---------- */
        .wiki-entry-item {
            padding: 8px 16px 8px 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
        }

        .wiki-entry-item:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }
        .wiki-entry-item.active {
            background: var(--accent-primary-soft);
            color: var(--accent-primary);
        }
        .wiki-entry-counts {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 8px;
        }
        .wiki-category-totals {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* ---------- Wiki Detail View ---------- */
        .wiki-detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .wiki-detail-header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .wiki-category-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            background: var(--accent-primary-soft);
            color: var(--accent-primary);
            font-size: 12px;
            font-weight: 600;
        }
        .wiki-parent-link {
            font-size: 13px;
            color: var(--text-muted);
        }
        .wiki-parent-link a {
            color: var(--accent-primary);
            cursor: pointer;
        }
        .wiki-parent-link a:hover {
            text-decoration: underline;
        }
        .wiki-detail-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .wiki-detail-content {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
            margin-bottom: 32px;
        }
        .wiki-subcategory-section {
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            overflow: hidden;
        }
        .wiki-subcategory-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-elevated);
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .wiki-subcategory-header:hover {
            background: var(--bg-elevated);
        }
        .wiki-subcategory-arrow {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.15s;
            display: inline-block;
        }
        .wiki-subcategory-section.collapsed .wiki-subcategory-arrow {
            transform: rotate(-90deg);
        }
        .wiki-subcategory-section.collapsed .wiki-subcategory-body {
            display: none;
        }
        .wiki-subcategory-body {
            padding: 16px;
        }
        .wiki-attr-list {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .wiki-attr-label {
            color: var(--text-secondary);
            font-weight: 600;
        }
        .wiki-attr-value {
            color: var(--text-primary);
        }
        .wiki-snippet-box {
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            white-space: pre-wrap;
        }

        /* ---------- Wiki Editor / Form ---------- */
        .wiki-editor {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            min-height: 100px;
            padding: 12px;
        }
        .wiki-editor .ProseMirror {
            outline: none;
            min-height: 80px;
            font-family: 'Literata', Georgia, serif;
            font-size: 14px;
            line-height: 1.7;
        }
        .wiki-editor .ProseMirror p { margin: 0; }
        .wiki-editor .ProseMirror blockquote {
            border-left: 3px solid var(--accent-primary);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .wiki-editor .ProseMirror-wiki-editor-prosemirror {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .wiki-editor-placeholder {
            color: var(--text-muted);
        }

        /* Dark theme overrides for wiki form inputs */
        .wiki-form .form-group select,
        .wiki-form .form-group input[type="text"],
        .wiki-form .form-group textarea,
        #wiki-form-category,
        #wiki-form-parent,
        #wiki-form-content,
        #wiki-form-name {
            background-color: var(--bg-input) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-medium) !important;
        }

        .wiki-form .form-group select:focus,
        .wiki-form .form-group input[type="text"]:focus,
        .wiki-form .form-group textarea:focus,
        #wiki-form-category:focus,
        #wiki-form-parent:focus,
        #wiki-form-content:focus,
        #wiki-form-name:focus {
            border-color: var(--accent-primary) !important;
        }

        /* TipTap editor dark background */
        .wiki-editor .ProseMirror {
            background-color: var(--bg-input) !important;
            color: var(--text-primary) !important;
        }

        /* Select dropdown options */
        .wiki-form .form-group select option {
            background-color: var(--bg-elevated) !important;
            color: var(--text-primary) !important;
        }

        /* Wiki form sections */
        .wiki-form-section {
            margin-bottom: 24px;
        }
        .wiki-form-section h4 {
            margin: 0 0 12px 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .wiki-subcat-editor-wrap {
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            overflow: hidden;
        }
        .wiki-subcat-editor-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-elevated);
            cursor: pointer;
            user-select: none;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .wiki-subcat-editor-header:hover {
            background: var(--bg-elevated);
        }
        .wiki-subcat-editor-body {
            padding: 0;
        }
        .wiki-subcat-editor-body .wiki-editor {
            border: none;
            border-radius: 0;
            border-top: 1px solid var(--border-light);
        }
        .wiki-subcat-editor-body.collapsed {
            display: none;
        }
        .wiki-subcat-delete-btn {
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0.6;
        }
        .wiki-subcat-delete-btn:hover {
            opacity: 1;
            background: rgba(239, 83, 80, 0.1);
        }
        .wiki-subcat-rename-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0.6;
        }
        .wiki-subcat-rename-btn:hover {
            opacity: 1;
            color: var(--accent-primary);
            background: var(--accent-primary-soft);
        }
        .wiki-add-subcat-btn {
            font-size: 13px;
            padding: 6px 14px;
            margin-top: 4px;
        }

        /* Attribute inputs */
        .wiki-attr-input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
        }
        .wiki-attr-input-group label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .wiki-attr-input-group input {
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
        }
        .wiki-attr-input-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* AI Context Snippet textarea */
        .wiki-snippet-textarea {
            width: 100%;
            min-height: 80px;
            padding: 10px 12px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
        }
        .wiki-snippet-textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .wiki-snippet-count {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
        }

        /* Live word/token count */
        .wiki-live-counts {
            font-size: 12px;
            color: var(--text-muted);
            padding: 8px 0;
            border-top: 1px solid var(--border-light);
            margin-top: 16px;
        }

        /* Wiki editor toolbar */
        .wiki-editor-toolbar {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-light);
            border-radius: 4px 4px 0 0;
        }
        .wiki-editor-toolbar + .wiki-editor {
            border-top: none;
            border-radius: 0 0 4px 4px;
        }

        /* Template buttons */
        .wiki-template-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;

        /* Wiki sidebar parent reassignment split-line indicator */
        /* Pseudo-elements act as masks that cover half the border.
           Default (center zone): both masks hidden ? full border visible.
           .left-half: right mask visible ? only left half of border shows (detach signal).
           .right-half: left mask visible ? only right half of border shows (adopt signal). */

        /* Left-half mask (::before) — covers left 50% of the border */
        .wiki-entry-item.insert-before::before,
        .wiki-entry-item.insert-after::before {
            content: '';
            display: block !important;
            left: 0;
            position: absolute;
            width: 50%;
            pointer-events: none;
            z-index: 2;
            transition: opacity 0.15s ease;
            opacity: 0;
            background: var(--bg-elevated);
        }
        /* Position above entry for insert-before */
        .wiki-entry-item.insert-before::before {
            top: -2px;
            height: 4px;
        }
        /* Position below entry for insert-after */
        .wiki-entry-item.insert-after::before {
            bottom: -2px;
            height: 4px;
        }

        /* Right-half mask (::after) — covers right 50% of the border */
        .wiki-entry-item.insert-before::after,
        .wiki-entry-item.insert-after::after {
            content: '';
            display: block !important;
            left: 50%;
            position: absolute;
            width: 50%;
            pointer-events: none;
            z-index: 2;
            transition: opacity 0.15s ease;
            opacity: 0;
            background: var(--bg-elevated);
        }
        .wiki-entry-item.insert-before::after {
            top: -2px;
            height: 4px;
        }
        .wiki-entry-item.insert-after::after {
            bottom: -2px;
            height: 4px;
        }

        /* .left-half: show right mask ? only left half of border visible */
        .wiki-entry-item.insert-before.left-half::after,
        .wiki-entry-item.insert-after.left-half::after {
            opacity: 1;
        }

        /* .right-half: show left mask ? only right half of border visible */
        .wiki-entry-item.insert-before.right-half::before,
        .wiki-entry-item.insert-after.right-half::before {
            opacity: 1;
        }

    <!-- TipTap ESM module: creates window.__tiptapCreate for the main IIFE -->
    <script type="module">
        import { Editor } from 'https://esm.sh/@tiptap/core@2.9.1';
        import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.9.1';
        import Underline from 'https://esm.sh/@tiptap/extension-underline@2.9.1';
        import TextStyle from 'https://esm.sh/@tiptap/extension-text-style@2.9.1';
        import Color from 'https://esm.sh/@tiptap/extension-color@2.9.1';
        import FontFamily from 'https://esm.sh/@tiptap/extension-font-family@2.9.1';
        import TextAlign from 'https://esm.sh/@tiptap/extension-text-align@2.9.1';

        window.__tiptapCreate = function(options) {
            const { element, content, onUpdate } = options;
            const editor = new Editor({
                element: element,
                content: content || '',
                extensions: [
                    StarterKit,
                    Underline,
                    TextStyle,
                    Color,
                    FontFamily.configure({
                        types: ['textStyle'],
                    }),
                    TextAlign.configure({ types: ['heading', 'paragraph'] }),
                ],
                editorProps: {
                    attributes: {
                        class: 'ProseMirror',
                    },
                },
                onUpdate: ({ editor: ed }) => {
                    if (onUpdate) onUpdate(ed);
                },
            });
            return editor;
        };

        window.__tiptapCreateMini = function(options) {
            const { element, content, onUpdate, toolbarElement } = options;
            const editor = new Editor({
                element: element,
                content: content || '',
                extensions: [
                    StarterKit,
                    Underline,
                ],
                editorProps: {
                    attributes: { class: 'ProseMirror wiki-editor-prosemirror' },
                },
                onUpdate: ({ editor: ed }) => {
                    if (onUpdate) onUpdate(ed);
                },
            });

            // Build toolbar if a container element is provided
            if (toolbarElement) {
                function wikiBtn(label, title, action) {
                    const b = document.createElement('button');
                    b.type = 'button';
                    b.title = title;
                    b.textContent = label;
                    b.style.cssText = 'background:transparent;border:1px solid transparent;color:var(--text-secondary);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;padding:3px 7px;border-radius:3px;line-height:1;transition:background 0.12s,color 0.12s;white-space:nowrap;';
                    b.addEventListener('mousedown', (e) => { e.preventDefault(); action(); updateState(); });
                    b.addEventListener('mouseenter', () => { b.style.background = 'var(--bg-hover)'; b.style.color = 'var(--text-primary)'; });
                    b.addEventListener('mouseleave', () => { if (!b.classList.contains('active')) { b.style.background = ''; b.style.color = ''; } });
                    return b;
                }
                function sep() { const s = document.createElement('span'); s.style.cssText = 'width:1px;height:16px;background:var(--border-light);margin:0 3px;flex-shrink:0;display:inline-block;'; return s; }
                function updateState() {
                    const allBtns = toolbarElement.querySelectorAll('button');
                    const checks = [
                        () => editor.isActive('bold'),
                        () => editor.isActive('italic'),
                        () => editor.isActive('underline'),
                        () => editor.isActive('bulletList'),
                        () => editor.isActive('orderedList'),
                        () => editor.isActive('blockquote'),
                    ];
                    allBtns.forEach((btn, i) => {
                        if (i < checks.length) {
                            const active = checks[i]();
                            btn.classList.toggle('active', active);
                            if (active) { btn.style.background = 'var(--accent-primary-soft)'; btn.style.color = 'var(--accent-primary)'; btn.style.borderColor = 'var(--accent-primary)'; }
                            else { btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = 'transparent'; }
                        }
                    });
                }
                toolbarElement.innerHTML = '';
                const inner = document.createElement('div');
                inner.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;gap:2px;';
                
                inner.appendChild(wikiBtn('B', 'Bold', () => editor.chain().focus().toggleBold().run()));
                inner.appendChild(wikiBtn('I', 'Italic', () => editor.chain().focus().toggleItalic().run()));
                inner.appendChild(wikiBtn('U\u0332', 'Underline', () => editor.chain().focus().toggleUnderline().run()));
                inner.appendChild(sep());
                inner.appendChild(wikiBtn('\u2022', 'Bullet List', () => editor.chain().focus().toggleBulletList().run()));
                inner.appendChild(wikiBtn('1.', 'Ordered List', () => editor.chain().focus().toggleOrderedList().run()));
                inner.appendChild(wikiBtn('\u201C', 'Blockquote', () => editor.chain().focus().toggleBlockquote().run()));
                
                toolbarElement.appendChild(inner);
                toolbarElement._updateState = updateState;
                
                // Initial state
                setTimeout(updateState, 0);
            }

            return editor;
        };
    </script>

<body>
    <div id="app"></div>
    <script>
        (function() {
            'use strict';

            // --- State -----------------------------------------------
            let currentCleanup = null;
            let statusBarEl = null;
            let statusBarHealthInterval = null;
            let lastSaveTime = null;
            let lastErrorMsg = '';
            let lastErrorTime = 0;
            let appVersion = '';
            let wikiEntriesCache = {};       // { projectId: [entry, ...] }
            let lastEditorChapterId = {};    // { projectId: chapterId } — remember last chapter per project
            let updateAvailableVersion = null;
            let updateCheckInProgress = false;
            let helpFabEl = null;
            let _editorInitLock = false;

            // --- Helpers ---------------------------------------------
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);
            const el = (tag, attrs = {}, ...children) => {
                attrs = attrs || {};
                const elem = document.createElement(tag);
                let deferredSelectValue = null;
                for (const [k, v] of Object.entries(attrs)) {
                    if (k === 'className') {
                        elem.className = v;
                    } else if (k === 'style' && typeof v === 'object') {
                        Object.assign(elem.style, v);
                    } else if (k.startsWith('on') && typeof v === 'function') {
                        elem.addEventListener(k.slice(2).toLowerCase(), v);
                    } else if (k === 'innerHTML') {
                        elem.innerHTML = v;
                    } else if (k === 'htmlFor') {
                        elem.setAttribute('for', v);
                    } else if (v == null || v === false) {
                        // Remove the attribute if value is null/undefined/false (boolean "unset")
                        elem.removeAttribute(k);
                    } else if (k === 'value' && tag === 'select') {
                        // For <select> elements, value must be set as a property AFTER
                        // all <option> children are appended, otherwise the assignment
                        // is silently ignored because no matching option exists yet.
                        deferredSelectValue = v;
                    } else {
                        elem.setAttribute(k, v);
                    }
                }
                for (const child of children) {
                    if (child == null || child === false || child === true) continue;
                    if (typeof child === 'string' || typeof child === 'number') {
                        elem.appendChild(document.createTextNode(String(child)));
                    } else {
                        elem.appendChild(child);
                    }
                }
                // Set deferred value after children are in the DOM so the select
                // properly reflects the selected option.
                if (deferredSelectValue !== null) {
                    elem.value = deferredSelectValue;
                }
                return elem;
            };

            function parseUserAgent(ua) {
                if (!ua) return 'Unknown';
                let result = '';
                // Browser
                if (ua.includes('Chrome/') && !ua.includes('Edg/')) {
                    const match = ua.match(/Chrome\/(\d+)/);
                    result = 'Chrome ' + (match ? match[1] : '?');
                } else if (ua.includes('Firefox/')) {
                    const match = ua.match(/Firefox\/(\d+)/);
                    result = 'Firefox ' + (match ? match[1] : '?');
                } else if (ua.includes('Edg/')) {
                    const match = ua.match(/Edg\/(\d+)/);
                    result = 'Edge ' + (match ? match[1] : '?');
                } else if (ua.includes('Safari/') && !ua.includes('Chrome')) {
                    const match = ua.match(/Version\/(\d+)/);
                    result = 'Safari ' + (match ? match[1] : '?');
                } else {
                    result = ua.substring(0, 20);
                }
                // OS
                if (ua.includes('Windows NT 10')) result += ' on Windows 10';
                else if (ua.includes('Windows NT 11')) result += ' on Windows 11';
                else if (ua.includes('Windows NT')) result += ' on Windows';
                else if (ua.includes('Mac OS X')) result += ' on macOS';
                else if (ua.includes('Linux') && !ua.includes('Android')) result += ' on Linux';
                else if (ua.includes('Android')) result += ' on Android';
                else if (ua.includes('iPhone') || ua.includes('iPad')) result += ' on iOS';
                return result;
            }

            function getUserStatus(lastActiveAt, lastLogoutAt) {
                // Never logged in
                if (!lastActiveAt && !lastLogoutAt) return { label: 'Never active', cls: '' };

                // Logged out: last_logout_at is more recent than last_active_at, or no active_at
                if (lastLogoutAt) {
                    const logoutTime = new Date(lastLogoutAt).getTime();
                    if (!isNaN(logoutTime)) {
                        const activeTime = lastActiveAt ? new Date(lastActiveAt).getTime() : 0;
                        if (logoutTime > activeTime) {
                            return {
                                label: 'Offline',
                                cls: 'offline',
                                tooltip: lastActiveAt ? 'Last active: ' + lastActiveAt : ''
                            };
                        }
                    }
                }

                // Has activity: compute active/idle/offline
                if (!lastActiveAt) return { label: 'Unknown', cls: 'offline' };
                const now = Date.now();
                const then = new Date(lastActiveAt).getTime();
                if (isNaN(then)) return { label: 'Unknown', cls: 'offline' };
                const diffMinutes = (now - then) / 60000;
                if (diffMinutes < 5) return { label: 'Online', cls: 'active' };
                if (diffMinutes < 30) return { label: 'Idle', cls: 'idle' };
                return {
                    label: 'Offline',
                    cls: 'offline',
                    tooltip: 'Last active: ' + lastActiveAt
                };
            }

            function getToken() {
                return sessionStorage.getItem('token') || localStorage.getItem('token');
            }

            function setToken(token, sessionOnly) {
                if (sessionOnly) {
                    sessionStorage.setItem('token', token);
                    localStorage.removeItem('token');
                } else {
                    localStorage.setItem('token', token);
                    sessionStorage.removeItem('token');
                }
            }

            function clearToken() {
                localStorage.removeItem('token');
                sessionStorage.removeItem('token');
            }

            function decodeToken(token) {
                try {
                    const payload = token.split('.')[1];
                    // Convert base64url to base64
                    let base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
                    // Pad with = characters if needed
                    while (base64.length % 4 !== 0) base64 += '=';
                    return JSON.parse(atob(base64));
                } catch (_) {
                    return null;
                }
            }

            function getUserRole() {
                const token = getToken();
                if (!token) return null;
                const decoded = decodeToken(token);
                return decoded ? decoded.role : null;
            }

            function apiHeaders() {
                const headers = { 'Content-Type': 'application/json' };
                const token = getToken();
                if (token) {
                    headers['Authorization'] = 'Bearer ' + token;
                }
                return headers;
            }

            async function apiGet(path) {
                const res = await fetch(path, { headers: apiHeaders() });
                if (!res.ok) {
                    let detail = res.statusText;
                    try {
                        const err = await res.json();
                        if (err.detail) detail = err.detail;
                    } catch (_) {}
                    const error = new Error(detail);
                    error.status = res.status;
                    throw error;
                }
                return res.json();
            }

            async function apiPost(path, body) {
                const res = await fetch(path, {
                    method: 'POST',
                    headers: apiHeaders(),
                    body: JSON.stringify(body),
                });
                if (!res.ok) {
                    let detail = res.statusText;
                    try {
                        const err = await res.json();
                        if (err.detail) detail = err.detail;
                    } catch (_) {}
                    const error = new Error(detail);
                    error.status = res.status;
                    throw error;
                }
                return res.json();
            }

            async function apiPut(path, body) {
                const res = await fetch(path, {
                    method: 'PUT',
                    headers: apiHeaders(),
                    body: JSON.stringify(body),
                });
                if (!res.ok) {
                    let detail = res.statusText;
                    try {
                        const err = await res.json();
                        if (err.detail) detail = err.detail;
                    } catch (_) {}
                    const error = new Error(detail);
                    error.status = res.status;
                    throw error;
                }
                return res.json();
            }

            async function apiDelete(path) {
                const res = await fetch(path, { method: 'DELETE', headers: apiHeaders() });
                if (!res.ok) {
                    let detail = res.statusText;
                    try { const err = await res.json(); if (err.detail) detail = err.detail; } catch (_) {}
                    const error = new Error(detail);
                    error.status = res.status;
                    throw error;
                }
            }

            async function apiPatch(path, body) {
                const res = await fetch(path, {
                    method: 'PATCH',
                    headers: apiHeaders(),
                    body: JSON.stringify(body),
                });
                if (!res.ok) {
                    let detail = res.statusText;
                    try { const err = await res.json(); if (err.detail) detail = err.detail; } catch (_) {}
                    const error = new Error(detail);
                    error.status = res.status;
                    throw error;
                }
                return res.json();
            }

            function closeModal() {
                const overlays = document.querySelectorAll('.modal-overlay');
                // Only remove the topmost (last) overlay so sub‑modals
                // can be dismissed without collapsing the admin panel underneath.
                if (overlays.length > 0) {
                    overlays[overlays.length - 1].remove();
                }
                // When the last overlay is removed (admin panel closed), stop AI usage polling
                if (overlays.length <= 1 && window._aiUsageInterval) {
                    clearInterval(window._aiUsageInterval);
                    window._aiUsageInterval = null;
                }
            }

            function showModalOverlay(content, onClose) {
                const overlay = el('div', { className: 'modal-overlay' }, content);
                overlay.addEventListener('mousedown', (e) => {
                    if (e.target === overlay) {
                        if (onClose) {
                            onClose();
