                // --- Helper: Compute word/token counts for an entry --
                function computeWikiEntryCounts(entry) {
                    let text = (entry.name || '') + ' ' + (entry.content || '');
                    let meta = {};
                    try { meta = JSON.parse(entry.metadata_json || '{}'); } catch (_) {}
                    if (meta.ai_context_snippet) text += ' ' + meta.ai_context_snippet;
                    if (meta.private_notepad) text += ' ' + meta.private_notepad.replace(/<[^>]*>/g, ' ');
                    if (meta.subcategories) {
                        for (const val of Object.values(meta.subcategories)) {
                            if (val) text += ' ' + val.replace(/<[^>]*>/g, ' ');
                        }
                    }
                    if (meta.attributes) {
                        for (const val of Object.values(meta.attributes)) {
                            if (val) text += ' ' + val;
                        }
                    }
                    const wc = countWords(text);
                    return { wc, tc: Math.round(wc * 1.3) };
                }

                // --- Helper: Compute live form counts ---------------
                function computeWikiFormCounts() {
                    let text = formName + ' ' + (formContent || '').replace(/<[^>]*>/g, ' ');
                    if (formMetadata.ai_context_snippet) text += ' ' + formMetadata.ai_context_snippet;
                    if (formMetadata.private_notepad) text += ' ' + formMetadata.private_notepad.replace(/<[^>]*>/g, ' ');
                    if (formMetadata.subcategories) {
                        for (const val of Object.values(formMetadata.subcategories)) {
                            if (val) text += ' ' + val.replace(/<[^>]*>/g, ' ');
                        }
                    }
                    if (formMetadata.attributes) {
                        for (const val of Object.values(formMetadata.attributes)) {
                            if (val) text += ' ' + val;
                        }
                    }
                    const wc = countWords(text);
                    return { wc, tc: Math.round(wc * 1.3) };
                }

                // --- Helper: Debounced token fetch ------------------
                function scheduleTokenFetch() {
                    if (_tokenFetchTimer) clearTimeout(_tokenFetchTimer);
                    _tokenFetchTimer = setTimeout(async () => {
                        _tokenFetchTimer = null;
                        const counts = computeWikiFormCounts();
                        liveCounts.words = counts.wc;
                        try {
                            let text = '';
                            if (formMetadata.ai_context_snippet) text += formMetadata.ai_context_snippet + ' ';
                            if (formContent) text += formContent.replace(/<[^>]*>/g, ' ') + ' ';
                            if (formMetadata.subcategories) {
                                for (const val of Object.values(formMetadata.subcategories)) {
                                    if (val) text += val.replace(/<[^>]*>/g, ' ') + ' ';
                                }
                            }
                            if (formMetadata.private_notepad) text += formMetadata.private_notepad.replace(/<[^>]*>/g, ' ') + ' ';
                            const tokens = await fetchTokenCount(text.trim());
                            liveCounts.tokens = tokens;
                        } catch (_) {
                            liveCounts.tokens = counts.tc;
                        }
                        const el = document.getElementById('wiki-live-counts');
                        if (el) el.textContent = 'Words: ' + liveCounts.words + ' \u00B7 Tokens: ' + liveCounts.tokens;
                    }, 500);
                }

                // --- Edit Entry --------------------------------------
                function editEntry(entry) {
                    cleanupWikiEditors();
                    editingEntry = entry;
                    selectedEntry = entry;
                    formName = entry.name || '';
                    formCategory = entry.category || '';
                    formParentId = entry.parent_id != null ? String(entry.parent_id) : '';
                    formParentIds = entry.parent_ids || (entry.parent_id ? [entry.parent_id] : []);
                    formContent = entry.content || '';
                    try {
                        formMetadata = JSON.parse(entry.metadata_json || '{}');
                    } catch (_) {
                        formMetadata = {};
                    }
                    if (!formMetadata.subcategories) formMetadata.subcategories = {};
                    if (!formMetadata.attributes) formMetadata.attributes = {};
                    if (!formMetadata.ai_context_snippet) formMetadata.ai_context_snippet = '';
                    if (!formMetadata.private_notepad) formMetadata.private_notepad = '';
                    customSubcats = [];
                    // Identify custom subcategories
                    const presetNames = getPresetSubcategories(formCategory);
                    for (const key of Object.keys(formMetadata.subcategories)) {
                        if (!presetNames.includes(key)) {
                            let displayName = key;
                            const val = formMetadata.subcategories[key];
                            // Check if value is JSON with a name property (new format for custom subcats)
                            if (typeof val === 'string' && val.startsWith('{')) {
                                try {
                                    const parsed = JSON.parse(val);
                                    if (parsed.name) {
                                        displayName = parsed.name;
                                        // Keep the JSON wrapper intact so the display name persists.
                                        // The TipTap editor init in the render function extracts content from
                                        // the JSON wrapper at render time, so no stripping is needed here.
                                    }
                                } catch(_) {}
                            }
                            customSubcats.push({ key: key, name: displayName });
                        }
                    }
                    formError = '';
                    formSaving = false;
                    creatingNew = false;
                    collapsedSubcategories = {};
                    // Set custom category flag if entry category is not a preset
                    var catPresetsEdit = ['Characters', 'Locations', 'Items / Artefacts', 'Factions / Groups', 'Lore / History', 'Religions', 'Power System'];
                    _showCustomCategory = formCategory && !catPresetsEdit.includes(formCategory);
                    wikiFormDirty = false;
                    render();
                }

                // --- View Entry --------------------------------------
                function viewEntry(entry) {
                    if (wikiFormDirty) {
                        showConfirmModal('You have unsaved changes. Are you sure you want to leave? All unsaved data will be lost.', () => {
                            cleanupWikiEditors();
                            selectedEntry = entry;
                            editingEntry = null;
                            creatingNew = false;
                            wikiFormDirty = false;
                            render();
                        });
                    } else {
                        cleanupWikiEditors();
                        selectedEntry = entry;
                        editingEntry = null;
                        creatingNew = false;
                        render();
                    }
                }

                // --- Save --------------------------------------------
                async function handleSave() {
                    formError = '';
                    if (!formName.trim()) {
                        formError = 'Name is required.';
                        // Show error inline without re-rendering form (preserving TipTap editors)
                        const existingError = document.getElementById('wiki-form-save-error');
                        if (existingError) {
                            existingError.textContent = formError;
                        } else {
                            const errorEl = document.createElement('p');
                            errorEl.id = 'wiki-form-save-error';
                            errorEl.className = 'modal-error';
                            errorEl.textContent = formError;
                            const form = document.querySelector('.wiki-form');
                            if (form && form.firstChild) {
                                form.insertBefore(errorEl, form.firstChild);
                            }
                        }
                        return;
                    }

                    // Store values before saving (used after resetForm for re-selection)
                    const savedEntryId = editingEntry ? editingEntry.id : null;
                    const savedName = formName.trim();
                    const savedCat = formCategory.trim();

                    formSaving = true;
                    // Update save button state without re-rendering
                    const saveBtn = document.querySelector('.wiki-form .btn-primary');
                    if (saveBtn) {
                        saveBtn.disabled = true;
                        saveBtn.textContent = 'Saving...';
                    }

                    // Gather metadata from TipTap editors
                    for (const item of wikiTiptapEditors) {
                        if (item.id === 'private-notepad') {
                            formMetadata.private_notepad = item.editor.getHTML();
                        } else if (item.id.startsWith('wiki-subcat-')) {
                            const keyFromId = item.id.slice('wiki-subcat-'.length);
                            // Try exact key match first, then try reverse-encoding
                            if (formMetadata.subcategories.hasOwnProperty(keyFromId)) {
                                setSubcategoryContent(keyFromId, item.editor.getHTML());
                            } else {
                                // Fallback: try matching by encoded name (for backward compat with preset subcats)
                                for (const name of Object.keys(formMetadata.subcategories)) {
                                    const expectedId = 'wiki-subcat-' + name.replace(/[^a-zA-Z0-9_-]/g, '_');
                                    if (expectedId === item.id) {
                                        formMetadata.subcategories[name] = item.editor.getHTML();
                                        break;
                                    }
                                }
                            }
                        }
                    }

                    const metadata = {
                        ai_context_snippet: formMetadata.ai_context_snippet || '',
                        private_notepad: formMetadata.private_notepad || '',
                        subcategories: formMetadata.subcategories || {},
                        attributes: formMetadata.attributes || {},
                    };

                    // Cycle prevention: before saving, check if new parents would create a cycle
                    if (formParentIds.length > 0 && editingEntry) {
                        var isCycle = false;
                        for (var pi = 0; pi < formParentIds.length; pi++) {
                            var checkId = formParentIds[pi];
                            var visited = new Set();
                            while (checkId && !visited.has(checkId)) {
                                visited.add(checkId);
                                if (checkId === editingEntry.id) { isCycle = true; break; }
                                var checkEntry = entries.find(function(en) { return en.id === checkId; });
                                if (!checkEntry) break;
                                var checkParents = (checkEntry.parent_ids && checkEntry.parent_ids.length > 0)
                                    ? checkEntry.parent_ids
                                    : (checkEntry.parent_id ? [checkEntry.parent_id] : []);
                                checkId = checkParents.length > 0 ? checkParents[0] : null;
                            }
                            if (isCycle) break;
                        }
                        if (isCycle) {
                            formError = 'Cannot set that parent — it would create a circular reference.';
                            formSaving = false;
                            const saveBtn2 = document.querySelector('.wiki-form .btn-primary');
                            if (saveBtn2) { saveBtn2.disabled = false; saveBtn2.textContent = 'Save'; }
                            render();
                            return;
                        }
                    }

                    const body = {
                        name: formName.trim(),
                        category: formCategory.trim(),
                        parent_id: formParentIds.length > 0 ? formParentIds[0] : null,
                        content: formContent,
                        metadata_json: JSON.stringify(metadata),
                        parents: formParentIds,
                    };

                    try {
                        if (editingEntry) {
                            await apiPut('/api/wiki/' + editingEntry.id, body);
                        } else {
                            await apiPost('/api/projects/' + projectId + '/wiki', body);
                        }
                        clearWikiCache(projectId);
                        formSaving = false;
                        wikiFormDirty = false;
                        resetForm();
                        await loadAll();
                        // Re-select the saved entry if it exists
                        if (savedEntryId) {
                            const found = entries.find(e => e.id === savedEntryId);
                            if (found) {
                                viewEntry(found);
                            }
                        } else {
                            // For new entries, try to find by name+category
                            const found = entries.find(e => e.name === savedName && e.category === savedCat);
                            if (found) {
                                viewEntry(found);
                            }
                        }
                    } catch (err) {
                        formError = err.message || 'Failed to save';
                        if (err.status === 409) {
                            formError = 'An entry with this name already exists in this category. Please choose a different name.';
                        }
                        formSaving = false;
                        recordApiError(err);
                        // Show error inline without re-rendering form (preserving TipTap editors)
                        const existingError = document.getElementById('wiki-form-save-error');
                        if (existingError) {
                            existingError.textContent = formError;
                        } else {
                            const errorEl = document.createElement('p');
                            errorEl.id = 'wiki-form-save-error';
                            errorEl.className = 'modal-error';
                            errorEl.textContent = formError;
                            const form = document.querySelector('.wiki-form');
                            if (form && form.firstChild) {
                                form.insertBefore(errorEl, form.firstChild);
                            }
                        }
                        // Update save button
                        const saveBtn2 = document.querySelector('.wiki-form .btn-primary');
                        if (saveBtn2) {
                            saveBtn2.disabled = false;
                            saveBtn2.textContent = 'Save';
                        }
                    }
                }

                // --- Delete ------------------------------------------
                async function handleDelete(entryId) {
                    showConfirmModal('Delete this wiki entry? This cannot be undone.', async () => {
                        try {
                            await apiDelete('/api/wiki/' + entryId);
                            clearWikiCache(projectId);
                            closeModal();
                            if (selectedEntry && selectedEntry.id === entryId) {
                                selectedEntry = null;
                            }
                            loadAll();
                        } catch (err) {
                            alert('Failed to delete: ' + err.message);
                            recordApiError(err);
                        }
                    });
                }

                // --- Category Change Handler -------------------------
                function onCategoryChange(newCat) {
                    const oldCat = formCategory;
                    formCategory = newCat;
                    // If category changed, reinitialize subcategories/attributes
                    if (newCat !== oldCat) {
                        cleanupWikiEditors();
                        const subcatNames = getEffectiveSubcategories(newCat);
                        const newSubcats = {};
                        for (const name of subcatNames) {
                            newSubcats[name] = (formMetadata.subcategories && formMetadata.subcategories[name]) || '';
                        }
                        formMetadata.subcategories = newSubcats;

                        const attrNames = getEffectiveAttributes(newCat);
                        const newAttrs = {};
                        for (const name of attrNames) {
                            newAttrs[name] = (formMetadata.attributes && formMetadata.attributes[name]) || '';
                        }
                        formMetadata.attributes = newAttrs;
                        customSubcats = [];
                        _showCustomCategory = false;
                    }
                    render();
                }

                // --- Add Custom Subcategory --------------------------
                function addCustomSubcategory() {
                    let inputValue = '';
                    const input = el('input', {
                        type: 'text',
                        placeholder: 'Enter subcategory name...',
                        style: { width: '100%', padding: '10px 12px', marginBottom: '16px', background: 'var(--bg-input)', border: '1px solid var(--border-medium)', borderRadius: '6px', color: 'var(--text-primary)', fontSize: '14px', fontFamily: 'inherit', outline: 'none' },
                        oninput: (e) => { inputValue = e.target.value; },
                        onkeydown: (e) => { if (e.key === 'Enter') { confirm(); } },
                    });
                    let errorEl = null;

                    function confirm() {
                        const trimmed = (inputValue || '').trim();
                        if (!trimmed) {
                            if (!errorEl) {
                                errorEl = el('p', { style: { color: 'var(--error)', fontSize: '13px', marginBottom: '12px' } }, 'Subcategory name cannot be empty.');
                                input.parentNode.insertBefore(errorEl, input.nextSibling);
                            }
                            return;
                        }

                        // Check for duplicates against all subcategory names (case-insensitive)
                        const effectiveNames = formCategory ? getEffectiveSubcategories(formCategory) : [];
                        const existingNames = [...effectiveNames];
                        for (const sc of customSubcats) {
                            existingNames.push(sc.name);
                        }
                        const isDuplicate = existingNames.some(n => n.toLowerCase() === trimmed.toLowerCase());
                        if (isDuplicate) {
                            if (!errorEl) {
                                errorEl = el('p', { style: { color: 'var(--error)', fontSize: '13px', marginBottom: '12px' } }, 'A subcategory with this name already exists.');
                                input.parentNode.insertBefore(errorEl, input.nextSibling);
                            }
                            return;
                        }

                        // Generate unique key
                        const key = '_custom_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
                        formMetadata.subcategories[key] = JSON.stringify({ name: trimmed, content: '' });
                        customSubcats.push({ key: key, name: trimmed });
                        wikiFormDirty = true;
                        closeModal();
                        cleanupWikiEditors();
                        render();
                    }

                    const modalContent = el('div', { className: 'modal' },
                        el('h2', null, 'Add Subcategory'),
                        errorEl,
                        input,
                        el('div', { className: 'modal-actions' },
                            el('button', { className: 'btn btn-secondary', onclick: closeModal }, 'Cancel'),
                            el('button', { className: 'btn btn-primary', onclick: confirm }, 'Confirm'),
                        ),
                    );
                    showModalOverlay(modalContent, closeModal);
                    // Focus input after modal is rendered
                    setTimeout(() => { const inp = modalContent.querySelector('input'); if (inp) inp.focus(); }, 50);
                }

                // --- Rename Custom Subcategory -----------------------
                function renameCustomSubcategory(key, currentName) {
                    let inputValue = currentName;
                    const input = el('input', {
                        type: 'text',
                        value: currentName,
                        placeholder: 'Enter new subcategory name...',
                        style: { width: '100%', padding: '10px 12px', marginBottom: '16px', background: 'var(--bg-input)', border: '1px solid var(--border-medium)', borderRadius: '6px', color: 'var(--text-primary)', fontSize: '14px', fontFamily: 'inherit', outline: 'none' },
                        oninput: (e) => { inputValue = e.target.value; },
                        onkeydown: (e) => { if (e.key === 'Enter') { confirm(); } },
                    });
                    let errorEl = null;

                    function confirm() {
                        const trimmed = (inputValue || '').trim();
                        if (!trimmed) return;

                        // Check for duplicates
                        const effectiveNames = formCategory ? getEffectiveSubcategories(formCategory) : [];
                        const existingNames = [...effectiveNames];
                        for (const sc of customSubcats) {
                            if (sc.key !== key) {
                                existingNames.push(sc.name);
                            }
                        }
                        if (existingNames.some(n => n.toLowerCase() === trimmed.toLowerCase())) {

                            }

                        }

                        // Update the name
                        const scEntry = customSubcats.find(c => c.key === key);
                        if (scEntry) scEntry.name = trimmed;

                        // Update the JSON wrapper with the new name
                        const currentVal = formMetadata.subcategories[key] || '';
                        let content = '';
                        if (typeof currentVal === 'string' && currentVal.startsWith('{')) {
                            try {
                                const parsed = JSON.parse(currentVal);
                                content = parsed.content || '';
                            } catch(_) {}
                        }
                        formMetadata.subcategories[key] = JSON.stringify({ name: trimmed, content: content });

                        wikiFormDirty = true;
                        closeModal();
                        cleanupWikiEditors();
                        render();
                    }

                    const modalContent = el('div', { className: 'modal' },
                        el('h2', null, 'Rename Subcategory'),
                        input,
                        el('div', { className: 'modal-actions' },
                            el('button', { className: 'btn btn-secondary', onclick: closeModal }, 'Cancel'),
                            el('button', { className: 'btn btn-primary', onclick: confirm }, 'Rename'),
                        ),
                    );
                    showModalOverlay(modalContent, closeModal);
                    setTimeout(() => { const inp = modalContent.querySelector('input'); if (inp) { inp.focus(); inp.select(); } }, 50);
                }

                // --- Remove Custom Subcategory -----------------------
                function removeCustomSubcategory(key) {
                    function doDelete() {
                        // Destroy any editor for this subcategory first
                        for (const item of wikiTiptapEditors) {
                            if (item.id === 'wiki-subcat-' + key.replace(/[^a-zA-Z0-9_-]/g, '_')) {
                                try { item.editor.destroy(); } catch(_) {}
                            }
                        }
                        wikiTiptapEditors = wikiTiptapEditors.filter(item => item.id !== 'wiki-subcat-' + key.replace(/[^a-zA-Z0-9_-]/g, '_'));
                        delete formMetadata.subcategories[key];
                        customSubcats = customSubcats.filter(c => c.key !== key);
                        wikiFormDirty = true;
                        cleanupWikiEditors();
                        render();
                    }

                    const sc = customSubcats.find(c => c.key === key);
                    const raw = formMetadata.subcategories[key] || '';
                    let plainText = '';
                    if (typeof raw === 'string' && raw.startsWith('{')) {
                        try {
                            const parsed = JSON.parse(raw);
                            plainText = (parsed.content || '').replace(/<[^>]*>/g, '').trim();
                        } catch(_) {
                            plainText = raw.replace(/<[^>]*>/g, '').trim();
                        }
                    } else {
                        plainText = raw.replace(/<[^>]*>/g, '').trim();
                    }
                    const hasContent = plainText.length > 0;

                    if (hasContent) {
                        showConfirmModal('Delete this subcategory?', doDelete);
                    } else {
                        doDelete();
                    }
                }

                // --- Save Template -----------------------------------
                function saveTemplate() {
                    const cat = formCategory.trim();
                    if (!cat) return;
                    // Sync all TipTap editor content into formMetadata.subcategories
                    for (const item of wikiTiptapEditors) {
                        if (item.id.startsWith('wiki-subcat-')) {
                            const keyFromId = item.id.slice('wiki-subcat-'.length);
                            if (formMetadata.subcategories.hasOwnProperty(keyFromId)) {
                                setSubcategoryContent(keyFromId, item.editor.getHTML());
                            } else {
                                for (const name of Object.keys(formMetadata.subcategories)) {
                                    const expectedId = 'wiki-subcat-' + name.replace(/[^a-zA-Z0-9_-]/g, '_');
                                    if (expectedId === item.id) {
                                        formMetadata.subcategories[name] = item.editor.getHTML();
                                        break;
                                    }
                                }
                            }
                        }
                    }
                    // Collect custom names BEFORE clearing — these will be saved to the template
                    const customNames = customSubcats.map(sc => sc.name);
                    // Migrate custom subcat content from unique keys to display names
                    for (const sc of customSubcats) {
                        if (sc.key === sc.name) {
                            // Key is already the display name — content is stored correctly, skip
                            continue;
                        }
                        const raw = formMetadata.subcategories[sc.key];
                        if (raw) {
                            let content = raw;
                            if (typeof raw === 'string' && raw.startsWith('{')) {
                                try {
                                    const parsed = JSON.parse(raw);
                                    content = parsed.content || '';
                                } catch(_) {}
                            }
                            formMetadata.subcategories[sc.name] = content;
                        }
                        delete formMetadata.subcategories[sc.key];
                    }
                    customSubcats = [];
                    // Save template: preset names + migrated custom subcat names
                    const presetSubs = getPresetSubcategories(cat);
                    const allSubs = [...presetSubs, ...customNames];
                    const attrNames = getEffectiveAttributes(cat);
                    const data = JSON.stringify({ subcategories: allSubs, attributes: attrNames });
                    localStorage.setItem('wiki_template_' + cat, data);
                    showToast('Template saved for ' + cat);
                    cleanupWikiEditors();
                    render();
                }

                function resetTemplate() {
                    const cat = formCategory.trim();
                    if (!cat) return;
                    localStorage.removeItem('wiki_template_' + cat);
                    showToast('Template reset for ' + cat);
                    // Rebuild customSubcats: any subcategory key that is NOT a preset name
                    // is a custom subcategory. Use getPresetSubcategories for the hardcoded list.
                    const presetNames = getPresetSubcategories(cat);
                    customSubcats = [];
                    if (formMetadata.subcategories) {
                        for (const key of Object.keys(formMetadata.subcategories)) {
                            if (!presetNames.includes(key)) {
                                let displayName = key;
                                const val = formMetadata.subcategories[key];
                                if (typeof val === 'string' && val.startsWith('{')) {
                                    try {
                                        const parsed = JSON.parse(val);
                                        if (parsed.name) displayName = parsed.name;
                                    } catch(_) {}
                                }
                                customSubcats.push({ key: key, name: displayName });
                            }
                        }
                    }
                    cleanupWikiEditors();
                    render();
                }

                // --- Wiki Tree Helpers -----------------------------------
                function buildWikiTree(catEntries, allEntries, catName) {
                    const childrenMap = {};
                    const topLevel = [];
                    // Build a lookup set of valid parent IDs that exist in THIS category
                    var validParentIds = new Set();
                    for (var i = 0; i < catEntries.length; i++) {
                        validParentIds.add(catEntries[i].id);
                    }
                    for (var i = 0; i < catEntries.length; i++) {
                        var entry = catEntries[i];
                        var parentIds = entry.parent_ids || (entry.parent_id ? [entry.parent_id] : []);
                        var primaryParentId = parentIds.length > 0 ? parentIds[0] : null;
                        // Cycle detection: walk parent chain, break if cycle found
                        var cycleIds = new Set();
                        var walkId = primaryParentId;
                        var hasCycle = false;
                        while (walkId && !cycleIds.has(walkId)) {
                            cycleIds.add(walkId);
                            if (walkId === entry.id) { hasCycle = true; break; }
                            var walkEntry = allEntries.find(function(e) { return e.id === walkId; });
                            if (!walkEntry) break;
                            var walkParents = (walkEntry.parent_ids && walkEntry.parent_ids.length > 0)
                                ? walkEntry.parent_ids : (walkEntry.parent_id ? [walkEntry.parent_id] : []);
                            walkId = walkParents.length > 0 ? walkParents[0] : null;
                        }
                        // Only nest if the parent actually exists in this category and no cycle
                        if (primaryParentId && validParentIds.has(primaryParentId) && !hasCycle) {
                            var primaryParent = allEntries.find(function(e) { return e.id === primaryParentId; });
                            // Double-check: parent must be in same category
                            if (primaryParent && (primaryParent.category || 'Uncategorized') === catName) {
                                if (!childrenMap[primaryParentId]) childrenMap[primaryParentId] = [];
                                childrenMap[primaryParentId].push(entry);
                                continue;
                            }
                        }
                        // Fallback: top-level
                        topLevel.push(entry);
                    }
                    return { topLevel: topLevel, childrenMap: childrenMap };
                }

                function renderWikiTreeLevel(entriesLevel, childrenMap, allEntries, depth, parentContinuations) {
                    var items = [];
                    var len = entriesLevel.length;
                    for (var i = 0; i < len; i++) {
                        (function(entry, idx) {
                            var isLast = idx === len - 1;
                            var hasChildren = childrenMap[entry.id] && childrenMap[entry.id].length > 0;
                            var counts = computeWikiEntryCounts(entry);
                            var isActive = selectedEntry && selectedEntry.id === entry.id;

                            var treeSpans = [];

                            // 1) Pass-through vertical lines for continuing depths
                            var contSorted = Array.from(parentContinuations).sort(function(a,b){return a-b;});
                            for (var pi = 0; pi < contSorted.length; pi++) {
                                var pd = contSorted[pi];
                                var pLeft = pd * 20 + 4;
                                treeSpans.push(el('span', { style: {
                                    position: 'absolute', left: pLeft + 'px',
                                    top: '0', bottom: '0', width: '1px',
                                    background: 'var(--accent-primary)', pointerEvents: 'none',
                                } }));
                            }

                            // 2) This entry's own connector
                            var connPos = depth * 20 + 4;
                            // Horizontal branch
                            treeSpans.push(el('span', { style: {
                                position: 'absolute', left: connPos + 'px',
                                top: '50%', width: '12px', height: '1px',
                                background: 'var(--accent-primary)', pointerEvents: 'none',
                            } }));
                            // Vertical: T-junction (full) or L-cap (half)
                            treeSpans.push(el('span', { style: {
                                position: 'absolute', left: connPos + 'px',
                                top: '0', height: isLast ? '50%' : '100%', width: '1px',
                                background: 'var(--accent-primary)', pointerEvents: 'none',
                            } }));

                            // 3) Build continuation set for children
                            var itemContinuations = new Set(parentContinuations);
                            if (!isLast) {
                                itemContinuations.add(depth);
                            }

                            var itemStyle = {};
                            if (depth === 0) {
                                itemStyle.paddingLeft = '24px';
                            } else {
                                itemStyle.paddingLeft = (16 + depth * 20 + 8) + 'px';
                            }

                            var childrenArr = [
                                entry.name || 'Untitled',
                                el('span', { className: 'wiki-entry-counts' },
                                    counts.wc + ' wc \u00B7 ' + counts.tc + ' tc'),
                                ...treeSpans,
                            ];

                            var item = el('div', {
                                className: 'wiki-entry-item' + (isActive ? ' active' : ''),
                                style: itemStyle,
                                'data-entry-id': String(entry.id),
                                'data-entry-category': String(entry.category || 'Uncategorized'),
                                'data-depth': String(depth),
                                'data-is-last': isLast ? 'true' : 'false',
                                'data-has-children': hasChildren ? 'true' : 'false',
                                draggable: 'true',
                                ondragstart: function(e) {
                                    e.stopPropagation();
                                    dragWikiEntryId = entry.id;
                                    e.dataTransfer.effectAllowed = 'move';
                                    e.target.classList.add('drag-source');
                                    var clone = e.target.cloneNode(true);
                                    clone.classList.add('drag-image-clone');
                                    clone.classList.remove('active');
                                    document.body.appendChild(clone);
                                    e.dataTransfer.setDragImage(clone, 0, 0);
                                    setTimeout(function() { if (clone.parentNode) clone.parentNode.removeChild(clone); }, 0);
                                },
                                ondragend: function(e) {
                                    e.target.classList.remove('drag-source');
                                    dragWikiEntryId = null;
                                    document.querySelectorAll('.wiki-entry-item').forEach(function(el) {
                                        el.classList.remove('drag-over', 'drag-source', 'insert-before', 'insert-after', 'left-half', 'right-half');
                                        el.style.boxShadow = ''; el.title = '';
                                    });
                                    document.querySelectorAll('.split-indicator-left, .split-indicator-right').forEach(function(el) { el.remove(); });
                                },
                                onclick: function() { viewEntry(entry); },
                            }, ...childrenArr);

                            items.push(item);

                            if (hasChildren) {
                                var childItems = renderWikiTreeLevel(
                                    childrenMap[entry.id], childrenMap, allEntries,
                                    depth + 1, new Set(itemContinuations)
                                );
                                for (var ci = 0; ci < childItems.length; ci++) {
                                    items.push(childItems[ci]);
                                }
                            }
                        })(entriesLevel[i], i);
                    }
                    return items;
                }

                // --- Render: Sidebar (Entry List) --------------------
                function renderSidebarContent() {
                    var grouped = {};
                    for (var ei = 0; ei < entries.length; ei++) {
                        var entry = entries[ei];
                        var cat = entry.category || 'Uncategorized';
                        if (!grouped[cat]) grouped[cat] = [];
                        grouped[cat].push(entry);
                    }
                    var catNames = Object.keys(grouped).sort();

                    var createBtn = el('div', { style: { padding: '12px 16px', borderBottom: '1px solid var(--border-light)' } },
                        el('button', {
                            className: 'btn btn-primary btn-sm',
                            style: { width: '100%' },
                            onclick: startNewEntry,
                        }, '+ Create New Entry'),
                    );

                    if (catNames.length === 0) {
                        return el('div', null,
                            createBtn,
                            el('p', { className: 'wiki-empty', style: { padding: '16px' } }, 'No wiki entries yet.'),
                        );
                    }

                    var sections = catNames.map(function(catName) {
                        var entryList = grouped[catName];
                        var totalWc = 0;
                        var totalTc = 0;
                        for (var e = 0; e < entryList.length; e++) {
                            var ec = computeWikiEntryCounts(entryList[e]);
                            totalWc += ec.wc;
                            totalTc += ec.tc;
                        }
                        var catPresets = ['Characters', 'Locations', 'Items / Artefacts', 'Factions / Groups', 'Lore / History', 'Religions', 'Power System'];
                        var isCustomCat = !catPresets.includes(catName);
                        var headerChildren = [
                            el('span', { className: 'wiki-category-arrow' }, '\u25BC'),
                            catName,
                            el('span', { className: 'wiki-category-totals' },
                                entryList.length + ' entries \u00B7 ' + totalWc + ' wc \u00B7 ' + totalTc + ' tc'),
                        ];
                        if (isCustomCat) {
                            headerChildren.push(
                                el('button', {
                                    style: { background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '14px', padding: '2px 5px', borderRadius: '3px', marginLeft: 'auto' },
                                    title: 'Rename category',
                                    onclick: function(e) { e.stopPropagation(); renameWikiCategory(catName); },
                                }, '\u270E'),
                                el('button', {
                                    style: { background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '14px', padding: '2px 5px', borderRadius: '3px', marginLeft: '4px' },
                                    title: 'Delete category',
                                    onclick: function(e) { e.stopPropagation(); showDeleteCategoryModal(catName); },
                                }, '\uD83D\uDDD1'),
                            );
                        }

                        // Build tree for this category
                        var tree = buildWikiTree(entryList, entries, catName);
                        var treeItems = renderWikiTreeLevel(tree.topLevel, tree.childrenMap, entries, 0, new Set());

                        var catDiv = el('div', { className: 'wiki-category' },
                            el('div', {
                                className: 'wiki-category-header',
                                onclick: function(e) {
                                    var parent = e.currentTarget.parentElement;
                                    parent.classList.toggle('collapsed');
                                },
                                ondragover: function(e) {
                                    e.preventDefault();
                                    e.stopPropagation();
                                    e.currentTarget.classList.add('drag-over');
                                },
                                ondragleave: function(e) {
                                    e.stopPropagation();
                                    e.currentTarget.classList.remove('drag-over');
                                },
                                ondrop: async function(e) {
                                    e.preventDefault();
                                    e.stopPropagation();
                                    e.currentTarget.classList.remove('drag-over');
                                    if (!dragWikiEntryId) return;
                                    const draggedId = dragWikiEntryId;
                                    var sourceEntry = entries.find(function(en) { return en.id === draggedId; });
                                    if (!sourceEntry) { dragWikiEntryId = null; return; }
                                    var oldCategory = sourceEntry.category || 'Uncategorized';
                                    if (oldCategory === catName) { dragWikiEntryId = null; return; }
                                    sourceEntry.category = catName || null;
                                    render();
                                    try {
                                        await apiPut('/api/wiki/' + draggedId, { category: catName });
                                        clearWikiCache(projectId);
                                        dragWikiEntryId = null;
                                        loadAll();
                                    } catch (err) {
                                        sourceEntry.category = oldCategory;
                                        if (err.status === 409) {
                                            showModalOverlay(
                                                el('div', { className: 'modal' },
                                                    el('p', { style: { color: 'var(--text-primary)', fontSize: '14px', marginBottom: '16px' } },
                                                        'An entry with this name already exists in that category. Please rename one of the entries before moving.'),
                                                    el('div', { className: 'modal-actions' },
                                                        el('button', { className: 'btn btn-primary', onclick: function() { closeModal(); } }, 'OK'),
                                                    ),
                                                ),
                                            );
                                        } else {
                                            recordApiError(err);
                                        }
                                        dragWikiEntryId = null;
                                        loadAll();
                                    }
                                },
                            }, ...headerChildren),
                            treeItems.length > 0
                                ? el('div', { className: 'wiki-category-body' }, ...treeItems)
                                : el('div', { className: 'wiki-category-body' },
                                    el('p', { className: 'wiki-empty' }, 'No entries in this category.')),
                        );
                        return catDiv;
                    });

                    return el('div', null,
                        createBtn,
                        ...sections,
                    );
                }

                // --- Render: Detail View -----------------------------
                function renderDetailView(entry) {
                    const parentIds = entry.parent_ids || (entry.parent_id ? [entry.parent_id] : []);
                    const parentNames = entry.parent_names || [];

                    let meta = {};
                    try { meta = JSON.parse(entry.metadata_json || '{}'); } catch (_) {}
                    if (!meta.subcategories) meta.subcategories = {};
                    if (!meta.attributes) meta.attributes = {};
                    if (!meta.ai_context_snippet) meta.ai_context_snippet = '';
                    if (!meta.private_notepad) meta.private_notepad = '';

                    // Main content
                    const mainContent = entry.content
                        ? el('div', { className: 'wiki-detail-content' }, entry.content)
                        : el('p', { style: { color: 'var(--text-muted)', fontSize: '13px' } }, 'No content.');

                    // Attributes
                    const attrKeys = Object.keys(meta.attributes);
                    let attrEl = null;
                    if (attrKeys.length > 0) {
                        const attrRows = [];
                        for (const key of attrKeys) {
                            attrRows.push(
                                el('span', { className: 'wiki-attr-label' }, key),
                                el('span', { className: 'wiki-attr-value' }, meta.attributes[key] || '\u2014'),
                            );
                        }
                        attrEl = el('div', { style: { marginBottom: '24px' } },
                            el('h4', { style: { margin: '0 0 8px 0', fontSize: '14px', fontWeight: 600, color: 'var(--text-secondary)' } }, 'Attributes'),
                            el('div', { className: 'wiki-attr-list' }, ...attrRows),
                        );
                    }

                    // Subcategories
                    const subcatNames = Object.keys(meta.subcategories);
                    const subcatSections = subcatNames.map(rawName => {
                        let content = meta.subcategories[rawName] || '';
                        let displayName = rawName;
                        // Handle JSON-encoded custom subcategory values { name, content }
                        if (typeof content === 'string' && content.startsWith('{')) {
                            try {
                                const parsed = JSON.parse(content);
                                content = parsed.content || '';
                                if (parsed.name) displayName = parsed.name;
                            } catch(_) {}
                        }
                        const isCollapsed = collapsedSubcategories['detail:' + rawName];
                        return el('div', { className: 'wiki-subcategory-section' },
                            el('div', {
                                className: 'wiki-subcategory-header',
                                onclick: (e) => {
                                    const p = e.currentTarget.parentElement;
                                    p.classList.toggle('collapsed');
                                    collapsedSubcategories['detail:' + rawName] = p.classList.contains('collapsed');
                                },
                            },
                                el('span', { className: 'wiki-subcategory-arrow' }, '\u25BC'),
                                displayName,
                            ),
                            el('div', { className: 'wiki-subcategory-body', style: isCollapsed ? { display: 'none' } : {} },
                                content ? el('div', { innerHTML: content }) : el('p', { style: { color: 'var(--text-muted)', fontSize: '13px' } }, 'No content.'),
                            ),
                        );
                    });

                    // AI Context Snippet
                    let snippetEl = null;
                    if (meta.ai_context_snippet) {
                        snippetEl = el('div', { style: { marginBottom: '24px' } },
                            el('h4', { style: { margin: '0 0 8px 0', fontSize: '14px', fontWeight: 600, color: 'var(--text-secondary)' } }, 'AI Context Snippet'),
                            el('div', { className: 'wiki-snippet-box' }, meta.ai_context_snippet),
                        );
                    }

                    // Private Notepad
                    let notepadEl = null;
                    if (meta.private_notepad && meta.private_notepad !== '<p></p>') {
                        notepadEl = el('div', { style: { marginBottom: '24px' } },
                            el('h4', { style: { margin: '0 0 8px 0', fontSize: '14px', fontWeight: 600, color: 'var(--text-secondary)' } }, 'Author\u2019s Private Notepad'),
                            el('div', { innerHTML: meta.private_notepad, style: { fontSize: '13px', color: 'var(--text-secondary)', background: 'var(--bg-input)', padding: '12px', borderRadius: '6px', border: '1px solid var(--border-light)' } }),
                        );
                    }

                    const counts = computeWikiEntryCounts(entry);

                    const catPresetsDV = ['Characters', 'Locations', 'Items / Artefacts', 'Factions / Groups', 'Lore / History', 'Religions', 'Power System'];
                    const isCustomCatDV = entry.category && !catPresetsDV.includes(entry.category);

                    const createdDate = entry.created_at
                        ? (() => {
                            const d = new Date(entry.created_at.replace(' ', 'T') + 'Z');
                            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                            const month = months[d.getMonth()];
                            const day = d.getDate();
                            const year = d.getFullYear();
                            let hours = d.getHours();
                            const ampm = hours >= 12 ? 'PM' : 'AM';
                            hours = hours % 12 || 12;
                            const mins = String(d.getMinutes()).padStart(2, '0');
                            return 'Created on ' + month + ' ' + day + ', ' + year + ' at ' + hours + ':' + mins + ' ' + ampm;
                        })()
                        : null;

                    const editedDate = (entry.created_at && entry.updated_at)
                        ? (() => {
                            const created = new Date(entry.created_at.replace(' ', 'T') + 'Z').getTime();
                            const updated = new Date(entry.updated_at.replace(' ', 'T') + 'Z').getTime();
                            // Only show if edited more than 5 seconds after creation
                            if (updated - created <= 5000) return null;
                            const d = new Date(updated);
                            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                            const month = months[d.getMonth()];
                            const day = d.getDate();
                            const year = d.getFullYear();
                            let hours = d.getHours();
                            const ampm = hours >= 12 ? 'PM' : 'AM';
                            hours = hours % 12 || 12;
                            const mins = String(d.getMinutes()).padStart(2, '0');
                            return 'Edited on ' + month + ' ' + day + ', ' + year + ' at ' + hours + ':' + mins + ' ' + ampm;
                        })()
                        : null;

                    return el('div', null,
                        el('div', { className: 'wiki-detail-header' },
                            el('h2', null, entry.name || 'Untitled'),
                            el('span', { className: 'wiki-category-badge' }, entry.category || 'Uncategorized'),
                            isCustomCatDV
                                ? el('button', {
                                    style: { background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '14px', padding: '2px 5px', borderRadius: '3px', marginLeft: '4px' },
                                    title: 'Rename category',
                                    onclick: () => renameWikiCategory(entry.category),
                                }, '\u270E')
                                : null,
                        ),
                        createdDate
                            ? el('p', { style: { fontSize: '12px', color: 'var(--text-muted)', margin: '4px 0 0 0' } }, createdDate)
                            : null,
                        editedDate
                            ? el('p', { style: { fontSize: '12px', color: 'var(--text-muted)', margin: '2px 0 0 0' } }, editedDate)
                            : null,
                        el('p', { id: 'wiki-detail-counts', style: { fontSize: '12px', color: 'var(--text-muted)', marginTop: '12px', marginBottom: '16px' } },
                            'Words: ' + counts.wc.toLocaleString() + ' \u00B7 Tokens: ...'),
                        parentIds.length > 0
                            ? el('p', { className: 'wiki-parent-link' },
                                parentIds.length === 1 ? 'Parent: ' : 'Parents: ',
                                ...parentNames.flatMap((p, i) => {
                                    const isPrimary = i === 0;
                                    const sep = i < parentNames.length - 1 ? el('span', null, ', ') : null;
                                    return [
                                        el('a', {
                                            style: isPrimary ? { fontWeight: 700, color: 'var(--accent-primary)' } : {},
                                            onclick: () => { const e = entries.find(en => en.id === p.id); if (e) viewEntry(e); },
                                        }, (isPrimary ? '\u2605 ' : '') + p.name),
                                        sep,
                                    ];
                                }),
                            )
                            : null,
                        el('div', { className: 'wiki-detail-actions' },
                            el('button', { className: 'btn btn-primary btn-sm', onclick: () => editEntry(entry) }, 'Edit'),
                            el('button', { className: 'btn btn-danger btn-sm', onclick: () => handleDelete(entry.id) }, 'Delete'),
                        ),
                        mainContent,
                        attrEl,
                        ...subcatSections,
                        snippetEl,
                        notepadEl,
                    );
                }

                // --- Render: Editor Form -----------------------------
                function renderForm() {
                    const isNew = !editingEntry;
                    const catPresets = ['Characters', 'Locations', 'Items / Artefacts', 'Factions / Groups', 'Lore / History', 'Religions', 'Power System'];
                    const dropdownCategories = (categories && categories.length > 0) ? categories : catPresets;

                    // Determine subcategory names and attribute names
                    let subcatNames = [];
                    let attrNames = [];
                    if (formCategory && !_showCustomCategory && dropdownCategories.includes(formCategory)) {
                        subcatNames = getEffectiveSubcategories(formCategory);
                        attrNames = getEffectiveAttributes(formCategory);
                    }

                    // Include custom subcategories (deduplicated against preset names)
                    const allSubcatNames = [...subcatNames];
                    for (const sc of customSubcats) {
                        if (!subcatNames.includes(sc.name)) {
                            allSubcatNames.push(sc);
                        }
                    }
                    // Include any subcategory content keys not already in the list
                    if (formMetadata.subcategories) {
                        for (const key of Object.keys(formMetadata.subcategories)) {
                            const alreadyInList = allSubcatNames.some(item => {
                                if (typeof item === 'object') return item.key === key;
                                return item === key;
                            });
                            if (!alreadyInList) {
                                allSubcatNames.push(key);
                            }
                        }
                    }

                    // Build category dropdown options from loaded categories (presets + custom from DB)
                    const catOptions = dropdownCategories.map(c => el('option', { value: c, selected: formCategory === c ? 'selected' : null }, c));
                    catOptions.push(el('option', { value: '__custom__', selected: _showCustomCategory ? 'selected' : null }, '-- Custom --'));

                    // Form elements array
                    const formElements = [];

                    // Error
                    if (formError) {
                        formElements.push(el('p', { className: 'modal-error', style: { marginBottom: '12px' } }, formError));
                    }

                    // Name
                    formElements.push(
                        el('div', { className: 'form-group' },
                            el('label', { htmlFor: 'wiki-form-name' }, 'Name'),
                            el('input', {
                                id: 'wiki-form-name',
                                type: 'text',
                                value: formName,
                                oninput: (e) => { formName = e.target.value; wikiFormDirty = true; },
                            }),
                        ),
                    );

                    // Category dropdown
                    formElements.push(
                        el('div', { className: 'form-group' },
                            el('label', { htmlFor: 'wiki-form-category' }, 'Category'),
                            el('select', {
                                id: 'wiki-form-category',
                                onchange: (e) => {
                                    const val = e.target.value;
                                    wikiFormDirty = true;
                                    if (val === '__custom__') {
                                        _showCustomCategory = true;
                                        formCategory = '';
                                        cleanupWikiEditors();
                                        render();
                                    } else {
                                        _showCustomCategory = false;
                                        onCategoryChange(val);
                                    }
                                },
                            }, ...catOptions),
                            _showCustomCategory
                                ? el('input', {
                                    type: 'text',
                                    value: formCategory,
                                    placeholder: 'Enter custom category name',
                                    style: { marginTop: '6px' },
                                    oninput: (e) => { formCategory = e.target.value; wikiFormDirty = true; },
                                    // no onkeydown — Enter doesn't commit
                                    // no onblur — losing focus doesn't commit
                                })
                                : null,
                        ),
                    );

                    // Multi-parent selector chips with horizontal drag-and-drop reorder
                    const parentChipsContainer = el('div', {
                        style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '8px', minHeight: '28px' },
                        ondragover: function(e) {
                            e.preventDefault();
                            const targetChip = e.target.closest('[data-parent-chip]');
                            if (!targetChip) return;
                            const rect = targetChip.getBoundingClientRect();
                            const midX = rect.left + rect.width / 2;
                            if (e.clientX < midX) {
                                targetChip.style.borderLeft = '2px solid var(--accent-primary)';
                                targetChip.style.borderRight = '';
                            } else {
                                targetChip.style.borderRight = '2px solid var(--accent-primary)';
                                targetChip.style.borderLeft = '';
                            }
                        },
                        ondragleave: function(e) {
                            const targetChip = e.target.closest('[data-parent-chip]');
                            if (targetChip) {
                                targetChip.style.borderLeft = '';
                                targetChip.style.borderRight = '';
                            }
                        },
                        ondrop: function(e) {
                            e.preventDefault();
                            this.querySelectorAll('[data-parent-chip]').forEach(function(c) {
                                c.style.borderLeft = ''; c.style.borderRight = '';
                            });
                            const draggedId = parseInt(e.dataTransfer.getData('text/plain'));
                            const targetChip = e.target.closest('[data-parent-chip]');
                            if (!targetChip || !draggedId) return;
                            const targetId = parseInt(targetChip.getAttribute('data-parent-chip'));
                            if (targetId === draggedId) return;
                            const rect = targetChip.getBoundingClientRect();
                            const insertBefore = e.clientX < rect.left + rect.width / 2;
                            const oldIndex = formParentIds.indexOf(draggedId);
                            const newIndex = formParentIds.indexOf(targetId);
                            if (oldIndex === -1 || newIndex === -1) return;
                            formParentIds.splice(oldIndex, 1);
                            const adjustedNewIndex = insertBefore ? newIndex : newIndex + 1;
                            formParentIds.splice(oldIndex < adjustedNewIndex ? adjustedNewIndex - 1 : adjustedNewIndex, 0, draggedId);
                            wikiFormDirty = true;
                            render();
                        },
                    }, ...formParentIds.map(function(pid, idx) {
                        const entry = entries.find(function(e) { return e.id === pid; });
                        const name = entry ? entry.name : 'Unknown';
                        const isPrimary = idx === 0;
                        return el('span', {
                            'data-parent-chip': String(pid),
                            draggable: 'true',
                            style: {
                                display: 'inline-flex', alignItems: 'center', gap: '4px',
                                background: isPrimary ? 'var(--accent-primary)' : 'var(--accent-primary-soft)',
                                color: isPrimary ? '#1A1A1A' : 'var(--accent-primary)',
                                padding: '3px 8px', borderRadius: '12px', fontSize: '12px',
                                fontWeight: 600, cursor: 'grab',
                                transition: 'border 0.1s',
                            },
                            title: isPrimary ? 'Primary Parent (drag to reorder)' : 'Secondary Parent (drag left to make primary)',
                            ondragstart: function(e) {
                                e.dataTransfer.setData('text/plain', String(pid));
                                e.dataTransfer.effectAllowed = 'move';
                                this.style.opacity = '0.5';
                            },
                            ondragend: function(e) {
                                this.style.opacity = '1';
                            },
                        }, isPrimary ? el('span', { style: { fontSize: '10px', fontWeight: 700, marginRight: '2px' } }, '\u2605') : null,
                            name,
                            el('span', {
                                style: { cursor: 'pointer', marginLeft: '4px', fontWeight: 700, fontSize: '14px' },
                                title: 'Remove parent',
                                onclick: function(e) {
                                    e.stopPropagation();
                                    formParentIds = formParentIds.filter(function(id) { return id !== pid; });
                                    wikiFormDirty = true;
                                    render();
                                },
                            }, '\u00D7'),
                        );
                    }));

                    const availableParents = entries.filter(function(e) { return !formParentIds.includes(e.id) && (!editingEntry || e.id !== editingEntry.id); });

                    formElements.push(
                        el('div', { className: 'form-group' },
                            el('label', null, 'Parents (optional)'),
                            formParentIds.length > 0 ? parentChipsContainer : null,
                            formParentIds.length > 1 ? el('p', { style: { fontSize: '11px', color: 'var(--text-muted)', margin: '0 0 8px 0' } }, '\u2605 = Primary Parent. Drag pills horizontally to reorder.') : null,
                            el('select', {
                                id: 'wiki-form-parent',
                                onchange: function(e) {
                                    const val = parseInt(e.target.value);
                                    if (val && !formParentIds.includes(val)) {
                                        formParentIds.push(val);
                                        wikiFormDirty = true;
                                        render();
                                    }

                                        el('div', { className: 'wiki-editor-toolbar' }),
                                        el('div', {
                                            id: divId,
                                            className: 'wiki-editor',
                                        }),

                        }
                    }

                    // --- Add Custom Subcategory Button ----------------
                    formElements.push(
                        el('button', {
                            className: 'btn btn-secondary btn-sm wiki-add-subcat-btn',
                            onclick: addCustomSubcategory,
                        }, '+ Add Subcategory'),
                    );

                    // --- Preset Attributes ----------------------------
                    if (attrNames.length > 0) {
                        formElements.push(el('h4', { style: { margin: '20px 0 8px 0', fontSize: '14px', fontWeight: 600, color: 'var(--text-secondary)' } }, 'Attributes'));
                        for (const name of attrNames) {
                            const val = (formMetadata.attributes && formMetadata.attributes[name]) || '';
                            formElements.push(
                                el('div', { className: 'wiki-attr-input-group' },
                                    el('label', { htmlFor: 'wiki-attr-' + name.replace(/[^a-zA-Z0-9_-]/g, '_') }, name),
                                    el('input', {
                                        id: 'wiki-attr-' + name.replace(/[^a-zA-Z0-9_-]/g, '_'),
                                        type: 'text',
                                        value: val,
                                        oninput: (e) => {
                                            if (!formMetadata.attributes) formMetadata.attributes = {};
                                            formMetadata.attributes[name] = e.target.value;
                                            wikiFormDirty = true;
                                            scheduleTokenFetch();
                                        },
                                    }),
                                ),
                            );
                        }
                    }

                    // --- AI Context Snippet ---------------------------
                    formElements.push(el('h4', { style: { margin: '20px 0 8px 0', fontSize: '14px', fontWeight: 600, color: 'var(--text-secondary)' } }, 'AI Context Snippet'));
                    const snippetWords = countWords(formMetadata.ai_context_snippet || '');
                    formElements.push(
                        el('div', { className: 'form-group' },
                            el('textarea', {
                                className: 'wiki-snippet-textarea',
                                id: 'wiki-ai-snippet',
                                placeholder: 'A brief summary of this entry for AI context (~150 words max)...',
                                oninput: (e) => {
                                    formMetadata.ai_context_snippet = e.target.value;
                                    wikiFormDirty = true;
                                    const wc = countWords(e.target.value);
                                    const countEl = document.getElementById('wiki-snippet-count');
                                    if (countEl) countEl.textContent = wc + ' / ~150 words' + (wc > 150 ? ' (exceeded)' : '');
                                    scheduleTokenFetch();
                                },
                            }, formMetadata.ai_context_snippet || ''),
                            el('div', { id: 'wiki-snippet-count', className: 'wiki-snippet-count' }, snippetWords + ' / ~150 words' + (snippetWords > 150 ? ' (exceeded)' : '')),
                        ),
                    );

                    // --- Author's Private Notepad ---------------------
                    formElements.push(el('h4', { style: { margin: '20px 0 8px 0', fontSize: '14px', fontWeight: 600, color: 'var(--text-secondary)' } }, 'Author\u2019s Private Notepad'));
                    formElements.push(
                        el('div', { className: 'wiki-editor-toolbar' }),
                    );
                    formElements.push(
                        el('div', { id: 'wiki-private-notepad', className: 'wiki-editor' }),
                    );

                    // --- Live Counts ----------------------------------
                    formElements.push(
                        el('div', { id: 'wiki-live-counts', className: 'wiki-live-counts' },
                            'Words: ' + liveCounts.words + ' \u00B7 Tokens: ' + liveCounts.tokens),
