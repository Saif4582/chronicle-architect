                // --- WebSocket Connection ---

                function connectChatWS() {
                    // Close any existing connection before creating a new one
                    if (chatWS) {
                        try { chatWS.onclose = null; } catch (_) {}
                        try { chatWS.close(); } catch (_) {}
                        chatWS = null;
                    }
                    const token = getToken();
                    if (!token) return;

                    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    chatWS = new WebSocket(protocol + '//' + location.host + '/ws/chat');

                    chatWS.onopen = () => {
                        console.log('[WS Chat] Connected to server, sending auth...');
                        chatWS.send(JSON.stringify({ type: 'auth', token: token }));
                    };

                    chatWS.onmessage = (event) => {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'auth_ok') {
                            console.log('[WS Chat] Authenticated successfully, user_id:', msg.user_id);
                            // Subscribe to channels based on current state
                            const decoded = decodeToken(getToken());
                            const uid = decoded ? parseInt(decoded.sub) : null;
                            if (uid) {
                                chatWS.send(JSON.stringify({ type: 'subscribe', channel: 'dm:' + uid }));
                            }
                            if (chatActiveTab === 'group' && groupActiveGroup) {
                                chatWS.send(JSON.stringify({ type: 'subscribe', channel: 'group:' + groupActiveGroup.id }));
                            }
                            if (chatActiveTab === 'global') {
                                chatWS.send(JSON.stringify({ type: 'subscribe', channel: 'global' }));
                            }
                        } else if (msg.type === 'new_message') {
                            handleWSMessage(msg);
                        } else if (msg.type === 'auth_error') {
                            console.error('[WS Chat] Auth error:', msg.detail);
                        }
                    };

                    chatWS.onclose = (event) => {
                        console.log('[WS Chat] Connection closed — code:', event.code, 'reason:', event.reason || '(none)', 'wasClean:', event.wasClean);
                        chatWS = null;
                        if (chatPanelExpanded) {
                            console.log('[WS Chat] Scheduling reconnect in 5s...');
                            wsReconnectTimer = setTimeout(connectChatWS, 5000);
                        }
                    };

                    chatWS.onerror = (err) => {
                        console.error('[WS Chat] Error:', err);
                    };
                }

                function handleWSMessage(msg) {
                    const decoded = decodeToken(getToken());
                    const currentId = decoded ? parseInt(decoded.sub) : null;
                    if (msg.channel === 'dm') {
                        if (dmActiveContact && msg.msg &&
                            (msg.msg.sender_id === dmActiveContact.user_id || msg.msg.recipient_id === dmActiveContact.user_id ||
                             msg.other_user_id === dmActiveContact.user_id)) {
                            if (msg.msg.sender_id !== currentId) {
                                const existingIds = new Set(dmMessages.map(m => m.id));
                                if (!existingIds.has(msg.msg.id)) {
                                    dmMessages.push(msg.msg);
                                    // Append to DOM directly instead of full panel rebuild
                                    const dmCont = document.getElementById('dm-messages-container');
                                    if (dmCont) {
                                        dmCont.appendChild(renderChatMessageBubble({
                                            role: msg.msg.sender_id === currentId ? 'user' : 'assistant',
                                            senderName: dmActiveContact ? (dmActiveContact.display_name || dmActiveContact.username || 'User') : 'User',
                                            content: msg.msg.content,
                                            created_at: msg.msg.created_at,
                                        }));
                                    }
                                    scrollDMBottom();
                                }
                            }
                        }
                    } else if (msg.channel === 'group') {
                        if (groupActiveGroup && groupActiveGroup.id === msg.group_id) {
                            if (msg.msg.sender_id !== currentId) {
                                const existingIds = new Set(groupMessages.map(m => m.id));
                                if (!existingIds.has(msg.msg.id)) {
                                    groupMessages.push(msg.msg);
                                    const groupCont = document.getElementById('group-messages-container');
                                    if (groupCont) {
                                        groupCont.appendChild(renderChatMessageBubble({
                                            role: msg.msg.sender_id === currentId ? 'user' : 'assistant',
                                            senderName: msg.msg.sender_id === currentId ? null : (msg.msg.sender_display_name || msg.msg.sender_username || 'User'),
                                            content: msg.msg.content,
                                            created_at: msg.msg.created_at,
                                        }));
                                    }
                                    scrollGroupBottom();
                                }
                            }
                        }
                    } else if (msg.channel === 'global') {
                        const existingIds = new Set(globalMessages.map(m => m.id));
                        if (!existingIds.has(msg.msg.id)) {
                            globalMessages.push(msg.msg);
                            const globalCont = document.getElementById('global-messages-container');
                            if (globalCont) {
                                globalCont.appendChild(renderChatMessageBubble({
                                    role: msg.msg.sender_id === currentId ? 'user' : 'assistant',
                                    senderName: msg.msg.sender_id === currentId ? null : (msg.msg.sender_display_name || msg.msg.sender_username || 'User'),
                                    content: msg.msg.content,
                                    created_at: msg.msg.created_at,
                                }));
                            }
                            scrollGlobalBottom();
                        }
                    }
                }

                // --- Chat Panel Toggle ---

                function toggleChatPanel() {
                    if (chatPanelExpanded) return;  // Already expanded — only close button should close
                    chatPanelExpanded = true;
                    setChatTab(chatActiveTab);  // Also triggers data loading for the active tab
                }

                function closeChatPanel() {
                    chatPanelExpanded = false;
                    // Abort any active AI stream
                    if (chatStreamAbortController) {
                        try { chatStreamAbortController.abort(); } catch (_) {}
                        chatStreamAbortController = null;
                        chatStreaming = false;
                        chatStatus = 'ready';
                    }
                    if (chatWS) { try { chatWS.close(); } catch (_) {} chatWS = null; }
                    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
                    if (dmPollTimer) { clearInterval(dmPollTimer); dmPollTimer = null; }
                    if (groupPollTimer) { clearInterval(groupPollTimer); groupPollTimer = null; }
                    if (globalPollTimer) { clearInterval(globalPollTimer); globalPollTimer = null; }
                    updateChatPanel();
                }

                function setChatTab(tab) {
                    chatActiveTab = tab;
                    if (tab !== 'ai') connectChatWS();
                    if (tab === 'ai') {
                        loadAvailableEndpoints();
                        loadChatSessions();
                    }
                    if (tab === 'dm') {
                        dmActiveContact = null; dmMessages = [];
                        loadDMContacts();
                        if (chatWS && chatWS.readyState === WebSocket.OPEN) {
                            const decoded = decodeToken(getToken());
                            const uid = decoded ? parseInt(decoded.sub) : null;
                            if (uid) chatWS.send(JSON.stringify({ type: 'subscribe', channel: 'dm:' + uid }));
                        }
                    }
                    if (tab === 'group') { groupActiveGroup = null; groupMessages = []; loadGroups(); }
                    if (tab === 'global') {
                        globalMessages = [];
                        globalLastMessageId = 0;
                        loadGlobalMessages();
                        if (chatWS && chatWS.readyState === WebSocket.OPEN) {
                            chatWS.send(JSON.stringify({ type: 'subscribe', channel: 'global' }));
                        }
                    }
                    updateChatPanel();
                }

                // Admin WS is connected when the admin panel opens (see openAdminPanel)

                function updateChatPanel() {
                    // CRITICAL: Never rebuild the panel during AI streaming — doing so destroys
                    // the stop button and may break active abort controllers.
                    if (chatStreaming && chatActiveTab === 'ai') return;
                    const container = document.getElementById('chat-panel-container');
                    if (!container) return;
                    container.innerHTML = '';
                    if (chatPanelExpanded) {
                        container.className = 'chat-panel-expanded';
                        container.onclick = null;
                        try {
                            container.appendChild(renderChatPanelContent());
                        } catch (e) {
                            console.error('[Chat] Failed to render chat panel content:', e);
                            container.appendChild(el('div', { className: 'chat-panel-error' },
                                el('p', null, 'Failed to load chat panel. Check console for details.')
                            ));
                        }
                    } else {
                        container.className = 'chat-panel-collapsed';
                        container.onclick = () => toggleChatPanel();
                        container.appendChild(
                            el('span', null, 'CHAT')
                        );
                    }
                }

                function renderChatPanelContent() {
                    return el('div', { style: { display: 'flex', flexDirection: 'column', height: '100%' }, onclick: (e) => e.stopPropagation() },
                        // Header
                        el('div', { className: 'chat-panel-header' },
                            el('h3', null, 'Chat'),
                            el('button', { className: 'chat-panel-close', onclick: () => closeChatPanel() }, '\u00D7'),
                        ),
                        // Tabs
                        el('div', { className: 'chat-tabs' },
                            el('button', { className: 'chat-tab' + (chatActiveTab === 'ai' ? ' active' : ''), onclick: () => setChatTab('ai') }, 'AI'),
                            el('button', { className: 'chat-tab' + (chatActiveTab === 'dm' ? ' active' : ''), onclick: () => setChatTab('dm') }, 'DMs'),
                            el('button', { className: 'chat-tab' + (chatActiveTab === 'group' ? ' active' : ''), onclick: () => setChatTab('group') }, 'Groups'),
                            el('button', { className: 'chat-tab' + (chatActiveTab === 'global' ? ' active' : ''), onclick: () => setChatTab('global') }, 'Global'),
                        ),
                        // Tab content
                        chatActiveTab === 'ai' ? renderAIChatTab() :
                        chatActiveTab === 'dm' ? renderDMTab() :
                        chatActiveTab === 'group' ? renderGroupTab() :
                        renderGlobalTab(),
                    );
                }

                // --- AI Chat Tab ---

                function renderAIChatTab() {
                    return el('div', { style: { display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 } },
                        // Session bar
                        el('div', { className: 'chat-session-bar' },
                            // Session selector row
                            el('div', { className: 'chat-session-row' },
                                el('select', { className: 'chat-select', value: chatCurrentSessionId || '', onmousedown: (e) => e.stopPropagation(), onchange: (e) => {
                                    chatCurrentSessionId = e.target.value ? parseInt(e.target.value) : null;
                                    if (chatCurrentSessionId) loadChatSession(chatCurrentSessionId);
                                    else chatMessages = [];
                                    updateChatPanel();
                                } },
                                    el('option', { value: '' }, 'New Chat'),
                                    ...chatSessions.map(s => el('option', { value: String(s.id) }, s.title || 'Chat ' + s.id)),
                                ),
                                el('button', { className: 'chat-btn-small', onclick: () => {
                                    chatCurrentSessionId = null;
                                    chatMessages = [];
                                    updateChatPanel();
                                } }, '+ New'),
                            ),
                            // Reasoning toggle row
                            el('div', { className: 'chat-session-row', style: { justifyContent: 'flex-start', gap: '6px' } },
                                el('label', { style: { display: 'flex', alignItems: 'center', gap: '4px', fontSize: '12px', cursor: 'pointer' } },
                                    el('input', { type: 'checkbox', checked: chatReasoningEnabled ? 'checked' : null, onchange: (e) => {
                                        chatReasoningEnabled = e.target.checked;
                                        updateChatPanel();
                                    } }),
                                    'Reasoning',
                                ),
                            ),
                            // Configuration selector row (shows config names, not endpoint names)
                            el('div', { className: 'chat-session-row' },
                                el('select', { className: 'chat-select', value: (chatSelectedConfigId ? 'cfg:' + chatSelectedConfigId + ':' + chatSelectedEndpointId : (chatSelectedEndpointId || '')), onmousedown: (e) => e.stopPropagation(), onchange: (e) => {
                                    const val = e.target.value;
                                    if (val === '') {
                                        chatSelectedEndpointId = null;
                                        chatSelectedConfigId = null;
                                        chatSelectedModel = null;
                                    } else if (val.startsWith('cfg:')) {
                                        const parts = val.split(':');
                                        chatSelectedConfigId = parseInt(parts[1]);
                                        chatSelectedEndpointId = parseInt(parts[2]);
                                        chatSelectedModel = null;
                                    } else {
                                        chatSelectedEndpointId = parseInt(val);
                                        chatSelectedConfigId = null;
                                        chatSelectedModel = null;
                                    }
                                    updateChatPanel();
                                } },
                                    el('option', { value: '' }, 'Select Configuration...'),
                                    ...(function() {
                                        if (chatAvailableConfigs.length > 0) {
                                            const groups = {};
                                            const order = [];
                                            chatAvailableConfigs.forEach(cfg => {
                                                const key = cfg.endpoint_source || 'Other';
                                                if (!groups[key]) { groups[key] = []; order.push(key); }
                                                groups[key].push(cfg);
                                            });
                                            const parts = [];
                                            order.forEach(key => {
                                                const cfgs = groups[key];
                                                const optgroupChildren = cfgs.map(cfg =>
                                                    el('option', { value: 'cfg:' + cfg.id + ':' + cfg.endpoint_id },
                                                       cfg.config_name)
                                                );
                                                parts.push(el('optgroup', { label: key }, ...optgroupChildren));
                                            });
                                            return parts;
                                        } else {
                                            return groupEndpoints(chatAvailableEndpoints).map(group =>
                                                el('optgroup', { label: group.label },
                                                    ...group.endpoints.map(ep =>
                                                        el('option', { value: String(ep.id) },
                                                            ep.name)
                                                    )
                                                )
                                            );
                                        }
                                    })(),
                                ),
                            ),
                            // Model selector row
                            chatSelectedEndpointId ? el('div', { className: 'chat-session-row' },
                                el('select', { className: 'chat-select', value: chatSelectedModel || '', onmousedown: (e) => e.stopPropagation(), onchange: (e) => { chatSelectedModel = e.target.value || null; updateChatPanel(); } },
                                    el('option', { value: '' }, 'Select Model...'),
                                    ...(getModelsForEndpoint(chatSelectedEndpointId, chatAvailableEndpoints).map(m =>
                                        el('option', { value: m.model_name }, m.model_name)
                                    )),
                                ),
                            ) : null,
                            // Session actions
                            chatCurrentSessionId ? el('div', { className: 'chat-session-row', style: { justifyContent: 'flex-end' } },
                                el('button', { className: 'chat-btn-small', style: { color: 'var(--error)', borderColor: 'var(--error)' }, onclick: () => {
                                    showConfirmModal('Are you sure you want to delete this chat session? This cannot be undone.', () => {
                                        apiDelete('/api/ai/sessions/' + chatCurrentSessionId)
                                            .then(() => { chatCurrentSessionId = null; chatMessages = []; loadChatSessions(); updateChatPanel(); })
                                            .catch(err => alert(err.message));
                                    });
                                } }, 'Delete'),
                            ) : null,
                        ),
                        // Progress status indicator
                        el('div', { className: 'chat-status-bar', id: 'chat-status-bar' },
                            el('span', { className: 'chat-status-text' },
                                chatStatus === 'ready' ? 'Ready' :
                                chatStatus === 'connecting' ? 'Connecting...' :
                                chatStatus === 'receiving' ? 'Receiving...' :
                                'Ready'
                            ),
                        ),
                        // Context selector
                        el('div', { className: 'chat-context-section' },
                            el('button', { className: 'chat-context-toggle', onclick: () => { chatContextCollapsed = !chatContextCollapsed; updateChatPanel(); } },
                                chatContextCollapsed ? '\u25B6' : '\u25BC', ' Context Selection'
                            ),
                            !chatContextCollapsed ? el('div', { className: 'chat-context-body' },
                                ...renderContextCheckboxes(),
                            ) : null,
                        ),
                        // Messages area
                        el('div', { className: 'chat-messages', id: 'chat-messages-container' },
                            ...chatMessages.map(m => renderChatMessageBubble(m)),
                        ),
                        // Input area
                        el('div', { className: 'chat-input-area' },
                            el('textarea', {
                                className: 'chat-input',
                                id: 'chat-input-field',
                                placeholder: 'Ask the AI...',
                                rows: 1,
                                onkeydown: (e) => {
                                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChatSend(); }
                                },
                            }),
                            chatStreaming
                                ? el('button', { className: 'chat-send-btn stop', id: 'chat-send-btn', style: { background: 'var(--error)', color: '#fff' }, onclick: handleStopStreaming }, '\u23F9 Stop')
                                : el('button', { className: 'chat-send-btn', id: 'chat-send-btn', onclick: () => handleChatSend() }, 'Send'),
                        ),
                        // Usage footer (AI tab only)
                        el('div', { className: 'chat-usage-panel', id: 'chat-usage-panel' },
                            el('span', null, 'Select an endpoint and model to see usage limits.'),
                        ),
                    );
                }

                function groupEndpoints(endpoints) {
                    const grps = {};
                    const order = [];
                    for (const ep of endpoints) {
                        const key = ep.source || 'Other';
                        if (!grps[key]) { grps[key] = []; order.push(key); }
                        grps[key].push(ep);
                    }
                    return order.map(key => ({ label: key, endpoints: grps[key] }));
                }

                function getModelsForEndpoint(endpointId, endpoints) {
                    const ep = endpoints.find(e => e.id === endpointId);
                    return ep && ep.models ? ep.models.filter(m => m.enabled) : [];
                }

                function loadAvailableEndpoints() {
                    apiGet('/api/ai/endpoints/available')
                        .then(data => {
                            const allEps = [];
                            const allConfigs = [];
                            (data.mine || []).forEach(ep => { ep.source = 'My Endpoints'; allEps.push(ep); });
                            (data.server || []).forEach(ep => { ep.source = 'Server'; allEps.push(ep); });
                            (data.shared_by_username || []).forEach(ep => { ep.source = 'Shared by ' + (ep.shared_by || 'User'); allEps.push(ep); });
                            chatAvailableEndpoints = allEps;

                            // Build flat config list: each config includes its parent endpoint info
                            allEps.forEach(ep => {
                                if (ep.configs && ep.configs.length > 0) {
                                    ep.configs.forEach(cfg => {
                                        allConfigs.push({
                                            id: cfg.id,
                                            config_name: cfg.name,
                                            endpoint_id: ep.id,
                                            endpoint_name: ep.name,
                                            endpoint_source: ep.source,
                                            models: ep.models
                                        });
                                    });
                                }
                            });
                            chatAvailableConfigs = allConfigs;

                            updateChatPanel();
                        })
                        .catch(err => { console.error('[Chat] Failed to load available endpoints:', err); });
                }

                function loadChatSessions() {
                    apiGet('/api/ai/sessions')
                        .then(data => {
                            chatSessions = data.sessions || data;
                            // Auto-select most recent session if none is active.
                            // BUT NOT during streaming — that would destroy the stop button.
                            if (!chatCurrentSessionId && chatSessions.length > 0 && !chatStreaming) {
                                chatCurrentSessionId = chatSessions[0].id;
                                loadChatSession(chatSessions[0].id);
                                return;
                            }
                            if (!chatStreaming) updateChatPanel();
                        })
                        .catch(err => { console.error('[Chat] Failed to load chat sessions:', err); });
                }
                function refreshChatSessionList() {
                    apiGet('/api/ai/sessions')
                        .then(data => {
                            chatSessions = data.sessions || data;
                            // Only update the session selector dropdown in-place
                            const sessionBar = document.querySelector('.chat-session-bar');
                            if (sessionBar) {
                                // Re-render just the session bar portion
                                const select = sessionBar.querySelector('select');
                                if (select) {
                                    const currentVal = select.value;
                                    // Clear options safely without causing layout shift
                                    while (select.options.length > 0) {
                                        select.remove(0);
                                    }
                                    select.add(new Option('New Session...', ''));
                                    chatSessions.forEach(s => {
                                        select.add(new Option(s.title || 'Session ' + s.id, String(s.id)));
                                    });
                                    if (currentVal && [...select.options].some(o => o.value === currentVal)) {
                                        select.value = currentVal;
                                    }
                                }
                            }
                        })
                        .catch(err => console.error('[Chat] Failed to refresh session list:', err));
                }

                function loadChatSession(sessionId) {
                    chatLoading = true;
                    updateChatPanel();
                    apiGet('/api/ai/sessions/' + sessionId)
                        .then(data => {
                            chatMessages = data.messages || [];
                            chatSelectedEndpointId = data.endpoint_id;
                            chatSelectedConfigId = data.config_id || null;
                            chatSelectedModel = data.model_name;
                            try { chatContextSelection = JSON.parse(data.context_selection || '{}'); } catch(e) { chatContextSelection = {}; }
                            chatLoading = false;
                            updateChatPanel();
                            scrollChatToBottom();
                        })
                        .catch(err => { chatLoading = false; alert(err.message); updateChatPanel(); });
                }

                function renderChatMessageBubble(msg) {
                    // Compute absolute date/time from created_at
                    let timeStr = '';
                    if (msg.created_at) {
                        try {
                            const d = new Date(msg.created_at);
                            if (!isNaN(d.getTime())) {
                                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                                const month = months[d.getMonth()];
                                const day = d.getDate();
                                const year = d.getFullYear();
                                let hours = d.getHours();
                                const ampm = hours >= 12 ? 'PM' : 'AM';
                                hours = hours % 12 || 12;
                                const mins = String(d.getMinutes()).padStart(2, '0');
                                timeStr = month + ' ' + day + ', ' + year + ' ' + hours + ':' + mins + ' ' + ampm;
                            }
                        } catch (_) {}
                    }
                    let roleLabel;
                    if (msg.role === 'assistant' && msg.senderName) {
                        roleLabel = msg.senderName;
                    } else if (msg.role === 'assistant') {
                        roleLabel = 'AI';
                    } else if (msg.role === 'user') {
                        roleLabel = 'You';
                    } else {
                        roleLabel = 'System';
                    }
                    return el('div', { className: 'chat-message ' + msg.role },
                        el('div', { className: 'chat-message-role' }, roleLabel),
                        el('div', { className: 'chat-message-bubble', innerHTML: simpleMarkdown(msg.content) }),
                        msg.reasoning ? el('details', { style: { marginTop: '4px', fontSize: '11px' } },
                            el('summary', { style: { cursor: 'pointer', color: 'var(--text-muted)' } }, 'Reasoning'),
                            el('pre', { style: { whiteSpace: 'pre-wrap', color: 'var(--text-muted)', margin: '4px 0', padding: '4px 8px', background: 'var(--bg-hover)', borderRadius: '4px' } }, (msg.reasoning || '').replace(/\n{3,}/g, '\n\n').trim()),
                        ) : null,
                        timeStr ? el('div', { className: 'chat-message-time' }, timeStr) : null,
                    );
                }

                function simpleMarkdown(text) {
                    if (!text) return '';
                    let html = text
                        .replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>')
                        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                        .replace(/`([^`]+)`/g, '<code>$1</code>')
                        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                        .replace(/\n/g, '<br>');
                    return html;
                }

                function scrollChatToBottom() {
                    setTimeout(() => {
                        const container = document.getElementById('chat-messages-container');
                        if (container) {
                            // Only auto-scroll if the user is already at or near the bottom
                            const threshold = 100; // pixels from bottom
                            const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
                            if (isNearBottom) {
                                container.scrollTop = container.scrollHeight;
                            }
                        }
                    }, 50);
                }

                function renderContextCheckboxes() {
                    const ctxParts = [];
                    
                    ctxParts.push(el('div', { className: 'context-group-label' }, 'Volumes'));
                    volumes.forEach(vol => {
                        const checked = (chatContextSelection.volume_ids || []).includes(vol.id);
                        ctxParts.push(el('label', null,
                            el('input', { type: 'checkbox', checked: checked ? 'checked' : null, onchange: (e) => {
                                if (e.target.checked) {
                                    if (!chatContextSelection.volume_ids) chatContextSelection.volume_ids = [];
                                    chatContextSelection.volume_ids.push(vol.id);
                                } else {
                                    chatContextSelection.volume_ids = (chatContextSelection.volume_ids || []).filter(id => id !== vol.id);
                                }
                            } }),
                            vol.title || 'Volume ' + vol.id,
                        ));
                    });
                    
                    ctxParts.push(el('div', { className: 'context-group-label' }, 'Chapters'));
                    chapters.forEach(ch => {
                        const checked = (chatContextSelection.chapter_ids || []).includes(ch.id);
                        ctxParts.push(el('label', null,
                            el('input', { type: 'checkbox', checked: checked ? 'checked' : null, onchange: (e) => {
                                if (e.target.checked) {
                                    if (!chatContextSelection.chapter_ids) chatContextSelection.chapter_ids = [];
                                    chatContextSelection.chapter_ids.push(ch.id);
                                } else {
                                    chatContextSelection.chapter_ids = (chatContextSelection.chapter_ids || []).filter(id => id !== ch.id);
                                }
                            } }),
                            ch.title || 'Chapter ' + ch.id,
                        ));
                    });
                    
                    return ctxParts;
                }

                // --- Chat Send (routing) ---

                function handleChatSend() {
                    if (chatActiveTab === 'ai') {
                        handleAIChatSend();
                    } else if (chatActiveTab === 'dm') {
                        handleDMSend();
                    } else if (chatActiveTab === 'group') {
                        handleGroupSend();
                    } else {
                        handleGlobalSend();
                    }
                }

                // --- AI Chat Stream Abort (reusable for both in-place and render-time stop buttons) ---

                function handleStopStreaming() {
                    if (!chatStreamAbortController) return;
                    try {
                        chatStreamAbortController.abort();
                    } catch (_) {}
                    chatStreaming = false;
                    chatStatus = 'stopped';
                    chatStreamAbortController = null;
                    const lastMsg = chatMessages[chatMessages.length - 1];
                    if (lastMsg && lastMsg.role === 'assistant' && !lastMsg.content) {
                        chatMessages.pop();
                    }
                    // Always use fresh DOM references
                    const inputField = document.getElementById('chat-input-field');
                    const sendBtn = document.getElementById('chat-send-btn');
                    if (inputField) inputField.disabled = false;
                    if (sendBtn) {
                        sendBtn.disabled = false;
                        sendBtn.textContent = 'Send';
                        sendBtn.className = 'chat-send-btn';
                        sendBtn.style.cssText = '';
                        sendBtn.onclick = () => handleChatSend();
                    }
                    updateChatPanel();
                }

                // --- AI Chat Send (SSE Streaming) ---

                async function handleAIChatSend() {
                    const inputField = document.getElementById('chat-input-field');
                    const sendBtn = document.getElementById('chat-send-btn');
                    if (!inputField || !sendBtn) return;
                    const message = inputField.value.trim();
                    if (!message) return;
                    if (!chatSelectedEndpointId || !chatSelectedModel) { alert('Please select an endpoint and model.'); return; }
                    
                    inputField.value = '';
                    inputField.disabled = true;
                    sendBtn.disabled = true;
                    
                    chatMessages.push({ role: 'user', content: message, created_at: new Date().toISOString() });
                    chatStreaming = true;
                    chatMessages.push({ role: 'assistant', content: '', created_at: new Date().toISOString() });
                    chatStatus = 'connecting';
                    // Update the send button in-place to show "Stop" without full panel rebuild
                    if (sendBtn) {
                        sendBtn.textContent = '\u23F9 Stop';
                        sendBtn.className = 'chat-send-btn stop';
                        sendBtn.style.cssText = 'background:var(--error);color:#fff';
                        sendBtn.onclick = handleStopStreaming;
                        sendBtn.disabled = false;
                    }
                    // Incremental DOM update instead of full panel rebuild to avoid scroll jump
                    const msgContainer = document.getElementById('chat-messages-container');
                    if (msgContainer) {
                        const userMsgEl = renderChatMessageBubble(chatMessages[chatMessages.length - 2]);
                        const assistantMsgEl = renderChatMessageBubble(chatMessages[chatMessages.length - 1]);
                        msgContainer.appendChild(userMsgEl);
                        msgContainer.appendChild(assistantMsgEl);
                    }
                    // Update status bar in-place
                    const statusBar = document.getElementById('chat-status-bar');
                    if (statusBar) {
                        const statusText = statusBar.querySelector('.chat-status-text');
                        if (statusText) statusText.textContent = 'Connecting...';
                    }
                    scrollChatToBottom();
                    
                    const body = {
                        message: message,
                        endpoint_id: chatSelectedEndpointId,
                        model_name: chatSelectedModel,
                        context_selection: chatContextSelection,
                        reasoning: chatReasoningEnabled,
                    };
                    if (chatSelectedConfigId) body.config_id = chatSelectedConfigId;
                    if (chatCurrentSessionId) body.session_id = chatCurrentSessionId;
                    
                    const token = getToken();
                    
                    try {
                        chatStreamAbortController = new AbortController();
                        const response = await fetch('/api/ai/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                            body: JSON.stringify(body),
                            signal: chatStreamAbortController.signal,
                        });
                        
                        if (!response.ok) {
                            const err = await response.json().catch(() => ({ detail: 'Request failed' }));
                            let errMsg;
                            if (typeof err.detail === 'object' && err.detail !== null) {
                                // Check if it's a limit error with the expected structure
                                if (err.detail.error && err.detail.limit_type) {
                                    const d = err.detail;
                                    if (d.limit_type === 'requests') {
                                        errMsg = `You have reached your request limit. ${Math.round(d.used)} out of ${d.limit === 0 ? 'unlimited' : d.limit} requests used.`;
                                    } else if (d.limit_type === 'tokens') {
                                        errMsg = `You have reached your token limit. ${Math.round(d.used)} out of ${d.limit === 0 ? 'unlimited' : d.limit} tokens used.`;
                                    } else {
                                        errMsg = `You have used all your available requests. Please try again later.`;
                                    }
                                } else if (err.detail.error) {
                                    errMsg = err.detail.error;
                                } else {
                                    errMsg = JSON.stringify(err.detail);
                                }
                            } else {
                                errMsg = typeof err.detail === 'string' ? err.detail : 'Request failed';
                            }
                            throw new Error(errMsg);
                        }
                        
                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';
                        
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            
                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split('\n');
                            buffer = lines.pop() || '';
                            
                            let firstContent = false;
                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    const dataStr = line.slice(6);
                                    if (dataStr === '[DONE]') continue;
                                    try {
                                        const data = JSON.parse(dataStr);
                                        if (data.error) {
                                            const lastMsg = chatMessages[chatMessages.length - 1];
                                            if (lastMsg && lastMsg.role === 'assistant') {
                                                lastMsg.content = 'Error: ' + data.error;
                                            }
                                        } else if (data.choices && data.choices[0]) {
                                            const delta = data.choices[0].delta;
                                            if (delta) {
                                                if (!firstContent) {
                                                    chatStatus = 'receiving';
                                                    firstContent = true;
                                                    // Update status bar in-place without full panel rebuild to avoid scroll jump
                                                    const statusBar = document.getElementById('chat-status-bar');
                                                    if (statusBar) {
                                                        const statusText = statusBar.querySelector('.chat-status-text');
                                                        if (statusText) statusText.textContent = 'Receiving...';
                                                    }
                                                    scrollChatToBottom();
                                                }
                                                if (delta.content) {
                                                    const lastMsg = chatMessages[chatMessages.length - 1];
                                                    if (lastMsg && lastMsg.role === 'assistant') {
                                                        lastMsg.content += delta.content;
                                                    }
                                                }
                                                if (delta.reasoning_content && chatReasoningEnabled) {
                                                    const lastMsg = chatMessages[chatMessages.length - 1];
                                                    if (lastMsg && lastMsg.role === 'assistant') {
                                                        if (!lastMsg.reasoning) lastMsg.reasoning = '';
                                                        let cleaned = delta.reasoning_content
                                                            .replace(/\n{3,}/g, '\n\n')
                                                            .trim();
                                                        // Add space between chunks if needed (API may send chunks without leading spaces)
                                                        if (lastMsg.reasoning && !cleaned.startsWith(' ') && !cleaned.startsWith('\n')) {
                                                            cleaned = ' ' + cleaned;
                                                        }
                                                        lastMsg.reasoning += cleaned;
                                                    }
                                                }
                                            }
                                        }
                                    } catch(e) {}
                                }
                            }
                            // In-place update of last assistant bubble to avoid scroll jump
                            const curMsg = chatMessages[chatMessages.length - 1];
                            const msgCont = document.getElementById('chat-messages-container');
                            if (msgCont && curMsg && curMsg.role === 'assistant') {
                                const bubbles = msgCont.querySelectorAll('.chat-message.assistant:not(.streaming)');
                                const target = bubbles[bubbles.length - 1];
                                if (target) {
                                    const bubbleDiv = target.querySelector('.chat-message-bubble');
                                    if (bubbleDiv) bubbleDiv.innerHTML = simpleMarkdown(curMsg.content);
                                    if (curMsg.reasoning) {
                                        let detailsEl = target.querySelector('details');
                                        if (!detailsEl) {
                                            detailsEl = document.createElement('details');
                                            detailsEl.style.cssText = 'margin-top:4px;font-size:11px';
                                            detailsEl.innerHTML = '<summary style="cursor:pointer;color:var(--text-muted)">Reasoning</summary><pre style="white-space:pre-wrap;color:var(--text-muted);margin:4px 0;padding:4px 8px;background:var(--bg-hover);border-radius:4px"></pre>';
                                            target.appendChild(detailsEl);
                                        }
                                        const preEl = detailsEl.querySelector('pre');
                                        if (preEl) preEl.textContent = (curMsg.reasoning || '').replace(/\n{3,}/g, '\n\n').trim();
                                    }
                                }
                            }
                        }
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            const lastMsg = chatMessages[chatMessages.length - 1];
                            if (lastMsg && lastMsg.role === 'assistant') {
                                lastMsg.content = 'Error: ' + err.message;
                            }
                            // Update error message in-place instead of full panel rebuild
                            const msgCont = document.getElementById('chat-messages-container');
                            if (msgCont && lastMsg) {
                                const bubbles = msgCont.querySelectorAll('.chat-message.assistant:not(.streaming)');
                                const target = bubbles[bubbles.length - 1];
                                if (target) {
                                    const bubbleDiv = target.querySelector('.chat-message-bubble');
                                    if (bubbleDiv) bubbleDiv.innerHTML = simpleMarkdown(lastMsg.content);
                                }
                            }
                        }
                    } finally {
                        chatStatus = 'ready';
                        chatStreaming = false;
                        chatStreamAbortController = null;
                        // Use fresh DOM references in case panel was rebuilt during streaming
                        const finalInputField = document.getElementById('chat-input-field');
                        const finalSendBtn = document.getElementById('chat-send-btn');
                        if (finalInputField) { finalInputField.disabled = false; finalInputField.focus(); }
                        if (finalSendBtn) {
                            finalSendBtn.disabled = false;
                            finalSendBtn.textContent = 'Send';
                            finalSendBtn.className = 'chat-send-btn';
                            finalSendBtn.style.cssText = '';
                            finalSendBtn.onclick = () => handleChatSend();
                        }
                        
                        refreshChatSessionList();
                        // Don't rebuild the panel - it would reset scroll position.
                        // The messages are already updated in-place during streaming.
                        // Just update the session list.
                        setTimeout(() => {
                            // Update status bar only
                            const statusBar = document.getElementById('chat-status-bar');
                            if (statusBar) {
                                const statusText = statusBar.querySelector('.chat-status-text');
                                if (statusText) statusText.textContent = 'Ready';
                            }
                            scrollChatToBottom(); // Ensure scroll is at bottom after response completes
                        }, 500);
                    }
                }

                // --- DM Tab ---

                function renderDMTab() {

                                    role: m.sender_id === parseInt(((decodeToken(getToken()) || {}).sub || '0')) ? 'user' : 'assistant',

                function loadDMContacts() {
                    apiGet('/api/chat/dm/contacts')
                        .then(data => {
                            dmContacts = data.contacts || data;
                            updateChatPanel();
                        })
                        .catch(() => {});
                }

                function selectDMContact(contact) {
                    dmActiveContact = contact;
                    dmMessages = [];
                    dmLastMessageId = 0;
                    loadDMMessages(contact.user_id);
                    // Subscribe to this DM channel via WebSocket
                    if (chatWS && chatWS.readyState === WebSocket.OPEN) {
                        chatWS.send(JSON.stringify({ type: 'subscribe', channel: 'dm:' + contact.user_id }));
                    }
                }

                function loadDMMessages(userId) {
                    dmLoading = true;
                    updateChatPanel();
                    const url = '/api/chat/dm/' + userId + '?limit=50' + (dmLastMessageId ? '&since=' + dmLastMessageId : '');
                    apiGet(url)
                        .then(data => {
                            const msgs = data.messages || data;
                            const existingIds = new Set(dmMessages.map(m => m.id));
                            const newMsgs = msgs.filter(m => !existingIds.has(m.id));
                            dmMessages = [...dmMessages, ...newMsgs];
                            if (msgs.length > 0) dmLastMessageId = Math.max(...msgs.map(m => m.id));
                            dmLoading = false;
                            updateChatPanel();
                            scrollDMBottom();
                        })
                        .catch(err => { console.error('[Chat] Failed to load DM messages:', err); dmLoading = false; updateChatPanel(); });
                }

                function startDMPolling(userId) {
                    if (dmPollTimer) clearInterval(dmPollTimer);
                    dmPollTimer = setInterval(() => {
                        if (dmActiveContact && dmActiveContact.user_id === userId) {
                            loadDMMessages(userId);
                        } else {
                            clearInterval(dmPollTimer);
                            dmPollTimer = null;
                        }
                    }, 3000);
                }

                function scrollDMBottom() {
                    setTimeout(() => {
                        const c = document.getElementById('dm-messages-container');
                        if (c) c.scrollTop = c.scrollHeight;
                    }, 50);
                }

                async function handleDMSend() {
                    const input = document.getElementById('chat-input-field');
                    const btn = document.getElementById('chat-send-btn');
                    if (!input || !btn || !dmActiveContact) return;
                    const msg = input.value.trim();
                    if (!msg) return;
                    input.value = '';
                    input.disabled = true;
                    btn.disabled = true;

                    // Optimistically append to DOM — WS will deliver confirmation
                    const tempMsg = { id: 'temp_' + Date.now(), sender_id: parseInt((decodeToken(getToken()) || {}).sub || '0'), recipient_id: dmActiveContact.user_id, content: msg, created_at: new Date().toISOString() };
                    dmMessages.push(tempMsg);
                    const dmCont = document.getElementById('dm-messages-container');
                    if (dmCont) {
                        const bubble = renderChatMessageBubble({ role: 'user', senderName: 'You', content: msg, created_at: tempMsg.created_at });
                        if (bubble) bubble.id = tempMsg.id;
                        dmCont.appendChild(bubble);
                    }
                    scrollDMBottom();

                    apiPost('/api/chat/dm', { recipient_id: dmActiveContact.user_id, content: msg })
                        .then((savedMsg) => {
                            // Replace temp message with server response
                            const idx = dmMessages.findIndex(m => m.id === tempMsg.id);
                            if (idx !== -1 && savedMsg && savedMsg.id) {
                                dmMessages[idx] = savedMsg;
                                // Update DOM bubble ID to match server data
                                const domBubble = document.getElementById(tempMsg.id);
                                if (domBubble) domBubble.id = savedMsg.id;
                            }
                                input.disabled = false;
                                btn.disabled = false;
                                input.focus();
                            })
                            .catch(err => {
                                alert(err.message);
                                // Remove temp message on failure
                                dmMessages = dmMessages.filter(m => m.id !== tempMsg.id);
                                input.disabled = false;
                                btn.disabled = false;
                            });
                }

                function showNewDMForm() {
                    let allUsers = [];
                    let usersLoading = true;
                    let usersError = '';
                    let selectedUserId = null;
                    let initialMsg = '';
                    let dmFormError = '';
                    function closeDMForm() { closeModal(); }
                    
                    apiGet('/api/admin/users')
                        .then(data => { allUsers = data || []; usersLoading = false; renderDMForm(); })
                        .catch(err => { usersError = err.message; usersLoading = false; renderDMForm(); });
                    
                    function renderDMForm() {
                        const overlay = document.querySelector('.modal-overlay');
                        if (overlay) overlay.remove();
                        
                        const decoded = decodeToken(getToken());
                        const currentUserId = decoded ? parseInt(decoded.sub) : null;
                        const otherUsers = allUsers.filter(u => u.id !== currentUserId);
                        
                        let userSelectContent;
                        if (usersLoading) {
                            userSelectContent = el('p', { style: { color: 'var(--text-muted)' } }, 'Loading users...');
                        } else if (usersError) {
                            userSelectContent = el('p', { style: { color: 'var(--text-muted)', fontSize: '13px' } },
                                'User list unavailable. You can only chat with existing contacts.');
                        } else if (otherUsers.length === 0) {
                            userSelectContent = el('p', { style: { color: 'var(--text-muted)' } }, 'No other users found.');
                        } else {
                            userSelectContent = el('div', { className: 'user-checkbox-list' },
                                ...otherUsers.map(u =>
                                    el('label', { style: { display: 'flex', alignItems: 'center', cursor: 'pointer', padding: '4px 10px', fontSize: '13px' } },
                                        el('span', { style: { flex: '1' } }, (u.display_name || u.username) + (u.role === 'owner' ? ' (Owner)' : u.role === 'admin' ? ' (Admin)' : '')),
                                        el('div', { style: { marginLeft: 'auto' } },
                                            el('input', { type: 'radio', name: 'dm-user', checked: selectedUserId === u.id ? 'checked' : null, onchange: () => { selectedUserId = u.id; renderDMForm(); } }),
                                        ),
                                    )
                                ),
                            );
                        }
                        
                        const content = el('div', { className: 'modal' },
                            el('h2', null, 'New Direct Message'),
                            dmFormError ? el('p', { className: 'modal-error' }, dmFormError) : null,
                            el('div', { className: 'form-group' },
                                el('label', null, 'Select User'),
                                userSelectContent,
                            ),
                            el('div', { className: 'form-group' },
                                el('label', { htmlFor: 'dm-init-msg' }, 'Message'),
                                el('input', { id: 'dm-init-msg', type: 'text', value: initialMsg, oninput: (e) => { initialMsg = e.target.value; }, placeholder: 'Hi! Let\'s chat...' }),
                            ),
                            el('div', { className: 'modal-actions' },
                                el('button', { className: 'btn btn-secondary', onclick: closeDMForm }, 'Cancel'),
                                el('button', { className: 'btn btn-primary', disabled: !selectedUserId ? 'disabled' : null, onclick: () => {
                                    if (!selectedUserId) { dmFormError = 'Select a user.'; renderDMForm(); return; }
                                    apiPost('/api/chat/dm', { recipient_id: selectedUserId, content: initialMsg || 'Hello!' })
                                        .then(() => { closeDMForm(); loadDMContacts(); })
                                        .catch(err => { dmFormError = err.message; renderDMForm(); });
                                } }, 'Start Chat'),
                            ),
                        );
                        showModalOverlay(content);
                    }
                }

                // --- Group Tab ---

                function renderGroupTab() {
                    if (groupActiveGroup) {
                        return renderGroupChat(groupActiveGroup);
                    }
                    
                    return el('div', { style: { display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 } },
                        el('div', { style: { padding: '8px', borderBottom: '1px solid var(--border-light)' } },
                            el('button', { className: 'chat-btn-small', style: { width: '100%' }, onclick: () => showCreateGroupForm() }, '+ Create Group'),
                        ),
                        el('div', { className: 'chat-group-list' },
                            ...groups.map(g => {
                                const decoded = decodeToken(getToken());
                                const currentId = decoded ? parseInt(decoded.sub) : null;
                                const myMember = (g.members || []).find(m => m.user_id === currentId);
                                const myStatus = myMember ? myMember.status : null;
                                const isPending = myStatus === 'pending';
                                return el('div', {
                                    className: 'chat-group-card' + (groupActiveGroup && groupActiveGroup.id === g.id ? ' selected' : ''),
                                    onclick: () => { if (!isPending) selectGroup(g); },
                                },
                                    el('div', { className: 'chat-group-card-header' },
                                        el('div', { className: 'chat-group-card-name' }, g.name),
                                        isPending ? el('span', { className: 'chat-group-card-badge pending' }, 'Invited') : null,
                                    ),
                                    el('div', { className: 'chat-group-card-meta' },
                                        ((g.members || []).length) + ' members \u00B7 ' + (g.last_message || 'No messages yet'),
                                    ),
                                    isPending ? el('div', { style: { padding: '4px 0 0 0', display: 'flex', gap: '8px' } },
                                        el('button', { className: 'chat-btn-small', onclick: (e) => { e.stopPropagation(); acceptGroupInvite(g.id); } }, 'Accept'),
                                        el('button', { className: 'chat-btn-small', style: { color: 'var(--error)' }, onclick: (e) => { e.stopPropagation(); declineGroupInvite(g.id); } }, 'Decline'),
                                    ) : null,
                                );
                            }),
                        ),
                    );
                }

                function showGroupInfo(group) {
                    const members = group.members || [];
                    const content = el('div', { className: 'modal' },
                        el('h2', null, group.name + ' \u2014 Members'),
                        el('div', { style: { maxHeight: '300px', overflowY: 'auto', marginTop: '12px' } },
                            ...members.map(m =>
                                el('div', { style: { padding: '6px 8px', borderBottom: '1px solid var(--border-light)', fontSize: '13px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                                    el('span', null, m.display_name || m.username),
                                    el('span', { style: { color: 'var(--text-muted)', fontSize: '11px' } }, m.status),
                                )
                            ),
                        ),
                        el('div', { className: 'modal-actions' },
                            el('button', { className: 'btn btn-secondary', onclick: closeModal }, 'Close'),
                        ),
                    );
                    showModalOverlay(content);
                }

                function renderGroupChat(group) {
                    return el('div', { style: { display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 } },
                        el('div', { className: 'chat-dm-header' },
                            el('button', { className: 'chat-btn-small', onclick: () => { groupActiveGroup = null; groupMessages = []; updateChatPanel(); } }, '\u2190 Back'),
                            el('span', null, group.name),
                            el('button', { className: 'chat-btn-small', title: 'Group Info', onclick: () => { showGroupInfo(group); }, style: { marginLeft: 'auto' } }, '\u2139'),
                        ),
                        el('div', { className: 'chat-messages', id: 'group-messages-container' },
                            ...groupMessages.map(m => {
                                const decoded = decodeToken(getToken());
                                const currentId = decoded ? parseInt(decoded.sub) : null;
                                return renderChatMessageBubble({
                                    role: m.sender_id === currentId ? 'user' : 'assistant',
                                    senderName: m.sender_id === currentId ? null : (m.sender_display_name || m.sender_username || 'User'),
                                    content: m.content,
                                    created_at: m.created_at,
                                });
                            }),
                        ),
                        el('div', { className: 'chat-input-area' },
                            el('textarea', { className: 'chat-input', id: 'chat-input-field', placeholder: 'Message...', rows: 1,
                                onkeydown: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleGroupSend(); } },
                            }),
                            el('button', { className: 'chat-send-btn', id: 'chat-send-btn', onclick: () => handleGroupSend() }, 'Send'),
                        ),
                    );
                }

                function loadGroups() {
                    apiGet('/api/chat/groups')
                        .then(data => { groups = data.groups || data; updateChatPanel(); })
                        .catch(() => {});
                }

                function selectGroup(group) {
                    // Block pending members from entering
                    const decoded2 = decodeToken(getToken());
                    const currentId2 = decoded2 ? parseInt(decoded2.sub) : null;
                    const myMember2 = (group.members || []).find(m => m.user_id === currentId2);
                    if (myMember2 && myMember2.status === 'pending') {
                        alert('You must accept the invitation before you can enter this group chat.');
                        return;
                    }
                    groupActiveGroup = group;
                    groupMessages = [];
                    groupLastMessageId = 0;
                    loadGroupMessages(group.id);
                    // Subscribe to this group channel via WebSocket
                    if (chatWS && chatWS.readyState === WebSocket.OPEN) {
                        chatWS.send(JSON.stringify({ type: 'subscribe', channel: 'group:' + group.id }));
                    }
                    // Start polling as fallback for consistent live updates
                    startGroupPolling(group.id);
                    updateChatPanel();
                }

                function loadGroupMessages(groupId) {
                    groupLoading = true;
                    const url = '/api/chat/groups/' + groupId + '/messages?limit=50' + (groupLastMessageId ? '&since=' + groupLastMessageId : '');
                    apiGet(url)
                        .then(data => {
                            const msgs = data.messages || data;
                            const existingIds = new Set(groupMessages.map(m => m.id));
                            const newMsgs = msgs.filter(m => !existingIds.has(m.id));
                            groupMessages = [...groupMessages, ...newMsgs];
                            if (msgs.length > 0) groupLastMessageId = Math.max(...msgs.map(m => m.id));
                            groupLoading = false;
                            updateChatPanel();
                            scrollGroupBottom();
                        })
                        .catch(err => { console.error('[Chat] Failed to load group messages:', err); groupLoading = false; });
                }

                function startGroupPolling(groupId) {
                    if (groupPollTimer) clearInterval(groupPollTimer);
                    groupPollTimer = setInterval(() => {
                        if (groupActiveGroup && groupActiveGroup.id === groupId) {
                            loadGroupMessages(groupId);
                        } else {
                            clearInterval(groupPollTimer);
                            groupPollTimer = null;
                        }
                    }, 3000);
                }

                async function handleGroupSend() {
                    const input = document.getElementById('chat-input-field');
                    const btn = document.getElementById('chat-send-btn');
                    if (!input || !btn || !groupActiveGroup) return;
                    const msg = input.value.trim();
                    if (!msg) return;
                    input.value = '';
                    input.disabled = true;
                    btn.disabled = true;

                    // Optimistically append to DOM — WS will deliver confirmation
                    const decoded = decodeToken(getToken());
                    const currentId = decoded ? parseInt(decoded.sub) : null;
                    const tempMsg = { id: 'temp_g_' + Date.now(), sender_id: currentId, group_id: groupActiveGroup.id, content: msg, created_at: new Date().toISOString() };
                    groupMessages.push(tempMsg);
                    const groupCont = document.getElementById('group-messages-container');
                    if (groupCont) {
                        groupCont.appendChild(renderChatMessageBubble({ role: 'user', content: msg, created_at: tempMsg.created_at }));
                    }
                    scrollGroupBottom();

                    apiPost('/api/chat/groups/' + groupActiveGroup.id + '/messages', { content: msg })
                        .then((savedMsg) => {
                            // Replace temp message with server response
                            const idx = groupMessages.findIndex(m => m.id === tempMsg.id);
                            if (idx !== -1 && savedMsg && savedMsg.id) {
                                groupMessages[idx] = savedMsg;
                            }
                            input.disabled = false;
                            btn.disabled = false;
                            input.focus();
                        })
                        .catch(err => {
                            alert(err.message);
                            groupMessages = groupMessages.filter(m => m.id !== tempMsg.id);
                            updateChatPanel();
                            input.disabled = false;
                            btn.disabled = false;
                        });
                }

                function loadGlobalMessages() {
                    globalLoading = true;
                    const url = '/api/chat/global/messages?limit=50' + (globalLastMessageId ? '&since=' + globalLastMessageId : '');
                    apiGet(url)
                        .then(data => {
                            const msgs = data.messages || data;
                            const existingIds = new Set(globalMessages.map(m => m.id));
                            const newMsgs = msgs.filter(m => !existingIds.has(m.id));
                            globalMessages = [...globalMessages, ...newMsgs];
                            if (msgs.length > 0) globalLastMessageId = Math.max(...msgs.map(m => m.id));
                            globalLoading = false;
                            updateChatPanel();
                            scrollGlobalBottom();
                        })
                        .catch(err => { console.error('[Chat] Failed to load global messages:', err); globalLoading = false; });
                    
                    // Global updates now handled via WebSocket — no polling needed
                }

                async function handleGlobalSend() {
                    const input = document.getElementById('chat-input-field');
                    const btn = document.getElementById('chat-send-btn');
                    if (!input || !btn) return;
                    const msg = input.value.trim();
                    if (!msg) return;
                    input.value = '';
                    input.disabled = true;
                    btn.disabled = true;
                    apiPost('/api/chat/global/messages', { content: msg })
                        .then((savedMsg) => {
                            // If WebSocket is connected, it will deliver the message in real-time.
                            // Only reload from HTTP when WebSocket is not available.
                            if (!chatWS || chatWS.readyState !== WebSocket.OPEN) {
                                loadGlobalMessages();
                            } else {
                                // Optimistically append the server response if WS hasn't delivered yet
                                const existingIds = new Set(globalMessages.map(m => m.id));
                                if (savedMsg && savedMsg.id && !existingIds.has(savedMsg.id)) {
                                    globalMessages.push(savedMsg);
                                    if (savedMsg.id > globalLastMessageId) globalLastMessageId = savedMsg.id;
                                    const decoded = decodeToken(getToken());
                                    const currentId = decoded ? parseInt(decoded.sub) : null;
                                    const globalCont = document.getElementById('global-messages-container');
                                    if (globalCont) {
                                        globalCont.appendChild(renderChatMessageBubble({
                                            role: savedMsg.sender_id === currentId ? 'user' : 'assistant',
                                            senderName: savedMsg.sender_id === currentId ? null : (savedMsg.sender_display_name || savedMsg.sender_username || 'User'),
                                            content: savedMsg.content,
                                            created_at: savedMsg.created_at,
                                        }));
                                    }
                                    scrollGlobalBottom();
                                }
                            }
                            input.disabled = false;
                            btn.disabled = false;
                            input.focus();
                        })
                        .catch(err => { alert(err.message); input.disabled = false; btn.disabled = false; });
                }

                function scrollGlobalBottom() {
