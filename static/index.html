                function renderEndpointsList() {
                    if (endpointsLoading) {
                        return el('div', { className: 'account-section' },
                            el('p', { style: { color: 'var(--text-muted)' } }, 'Loading endpoints...'));
                    }
                    if (endpointsError) {
                        return el('div', { className: 'account-section' },
                            el('div', { className: 'error-banner' }, endpointsError));
                    }
                    if (!Array.isArray(endpoints)) {
                        return el('div', { className: 'account-section' },
                            el('div', { className: 'error-banner' }, 'Invalid endpoints data'));
                    }

                    if (endpoints.length === 0) {
                        return el('div', { className: 'account-section' },
                            el('div', { className: 'account-section-header' },
                                el('h3', null, 'My AI Endpoints'),
                                el('button', { className: 'btn btn-primary btn-sm', onclick: showAddEndpointForm }, '+ Add Endpoint'),
                            ),
                            el('div', { className: 'empty-state' },
                                el('div', { className: 'empty-state-icon' }, '\uD83E\uDD16'),
                                el('p', null, 'No AI endpoints yet. Add one to start using AI features.'),
                            ),
                        );
                    }

                    const cards = endpoints.map(ep => {
                        try {
                            const maskedKey = ep.api_key_masked || '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
                            const modelCount = ep.models_count !== undefined ? ep.models_count : (ep.models ? ep.models.length : '?');
                            const userCount = ep.users_count !== undefined ? ep.users_count : (ep.users ? ep.users.length : '?');

                            return el('div', { className: 'endpoint-card', onclick: () => openEndpointDetail(ep) },
                                el('div', { className: 'endpoint-card-header' },
                                    el('div', null,
                                        el('div', { className: 'endpoint-card-name' }, ep.name),
                                        el('div', { className: 'endpoint-card-url' }, ep.base_url),
                                    ),
                                    el('span', { style: { fontSize: '11px', color: 'var(--text-muted)', fontFamily: 'monospace' } }, maskedKey),
                                ),
                                el('div', { className: 'endpoint-card-meta' },
                                    el('span', null, modelCount + ' models'),
                                    el('span', null, 'Shared with ' + userCount + ' users'),
                                    el('span', null, ep.created_at ? 'Created ' + (new Date(ep.created_at)).toLocaleDateString() : ''),
                                ),
                                el('div', { className: 'endpoint-card-actions', onclick: (e) => { e.stopPropagation(); } },
                                    el('button', { className: 'btn btn-secondary btn-sm', onclick: () => openEndpointDetail(ep) }, 'Manage'),
                                    el('button', { className: 'btn btn-danger btn-sm', onclick: () => handleDeleteEndpoint(ep.id, ep.name) }, 'Delete'),
                                ),
                            );
                        } catch (e) {
                            return el('div', { className: 'endpoint-card', style: { color: 'var(--error)', padding: '8px' } }, 'Error rendering endpoint: ' + (ep.name || 'unknown'));
                        }
                    });

                    return el('div', { className: 'account-section' },
                        el('div', { className: 'account-section-header' },
                            el('h3', null, 'My AI Endpoints'),
                            el('button', { className: 'btn btn-primary btn-sm', onclick: showAddEndpointForm }, '+ Add Endpoint'),
                        ),
                        el('div', null, ...cards),
                    );
                }

                function renderEndpointDetailView() {
                    if (!selectedEndpoint) return null;
                    if (typeof selectedEndpoint !== 'object' || !selectedEndpoint.name) return null;

                    const maskedKey = selectedEndpoint.api_key_masked || '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';

                    const tabButtons = el('div', { className: 'endpoint-detail-tabs' },
                        el('button', { className: 'endpoint-detail-tab' + (endpointDetailTab === 'models' ? ' active' : ''), onclick: () => { endpointDetailTab = 'models'; render(); } }, 'Models'),
                        el('button', { className: 'endpoint-detail-tab' + (endpointDetailTab === 'sharing' ? ' active' : ''), onclick: () => { endpointDetailTab = 'sharing'; loadEndpointUsers(); } }, 'Sharing'),
                        el('button', { className: 'endpoint-detail-tab' + (endpointDetailTab === 'usage' ? ' active' : ''), onclick: () => { endpointDetailTab = 'usage'; loadEndpointUsage(); } }, 'Usage'),
                    );

                    let tabBody;
                    if (endpointDetailTab === 'models') tabBody = renderModelsTab();
                    else if (endpointDetailTab === 'sharing') tabBody = renderSharingTab();
                    else tabBody = renderUsageTab();

                    return el('div', { className: 'endpoint-detail', style: { marginTop: '16px' } },
                        el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' } },
                            el('div', null,
                                el('div', { style: { fontSize: '16px', fontWeight: '600', color: 'var(--text-primary)' } }, selectedEndpoint.name),
                                el('div', { style: { fontSize: '12px', color: 'var(--text-muted)', fontFamily: 'monospace' } }, selectedEndpoint.base_url + ' \u00B7 ' + maskedKey),
                            ),
                            el('button', { className: 'btn btn-secondary btn-sm', onclick: () => { selectedEndpoint = null; render(); } }, '\u2190 Back to Endpoints'),
                        ),
                        tabButtons,
                        tabBody,
                    );
                }

                function renderModelsTab() {
                    if (endpointModelsLoading) {
                        return el('p', { style: { color: 'var(--text-muted)' } }, 'Loading models...');
                    }
                    if (endpointModelsError) {
                        return el('div', null,
                            el('div', { className: 'error-banner' }, endpointModelsError),
                            el('button', { className: 'btn btn-secondary btn-sm', onclick: handleFetchModels, disabled: fetchingModels ? 'disabled' : null }, fetchingModels ? 'Fetching...' : 'Fetch Models'),
                        );
                    }

                    return el('div', null,
                        el('div', { style: { marginBottom: '12px' } },
                            el('button', { className: 'btn btn-secondary btn-sm', onclick: handleFetchModels, disabled: fetchingModels ? 'disabled' : null }, fetchingModels ? 'Fetching...' : 'Fetch Models from API'),
                        ),
                        endpointModels.length === 0
                            ? el('div', { className: 'empty-state' },
                                el('p', null, 'No models found. Click "Fetch Models" to discover available models from the API.'),

                            : el('table', { className: 'admin-users-table' },
                                el('thead', null,
                                    el('tr', null,

                                        el('th', null, 'Enabled'),

                                        el('th', null, 'Max Context Tokens'),
                                        el('th', null, 'Save'),

                                        el('td', null,

                                        ),
                                        el('td', null,
                                            el('input', { type: 'number', min: '0', value: maxCtx, style: { width: '90px', background: 'var(--bg-input)', border: '1px solid var(--border-medium)', borderRadius: '4px', color: 'var(--text-primary)', padding: '4px 8px', fontSize: '12px', fontFamily: 'inherit' }, oninput: (e) => { maxCtx = e.target.value; } }),

                                            el('button', { className: 'btn btn-secondary btn-sm', onclick: saveModel }, 'Save'),

                            ),
                    );

                function renderSharingTab() {

                        return el('p', { style: { color: 'var(--text-muted)' } }, 'Loading shared users...');
                    }
                    if (endpointUsersError) {
                        return el('div', { className: 'error-banner' }, endpointUsersError);
                    }

                        el('div', { style: { marginBottom: '12px' } },
                            el('button', { className: 'btn btn-primary btn-sm', onclick: showShareUserForm }, '+ Share with User'),

                        endpointUsers.length === 0
                            ? el('div', { className: 'empty-state' },
                                el('p', null, 'Not shared with anyone yet.'),

                                el('thead', null,

                                        el('th', null, 'Username'),
                                        el('th', null, 'Request Limit'),
                                        el('th', null, 'Token Limit'),
                                        el('th', null, 'Schedule'),
                                        el('th', null, 'Pool Mode'),

            function recordApiError(err) {
                const msg = (err && err.message) ? err.message : String(err || '');
                const status = (err && err.status) ? err.status : 0;
                // Suppress expected client errors (HTTP 4xx) from the status bar,
                // but always log to console for debugging
                if (status >= 400 && status < 500) {
                    console.error('[API 4xx]', status, msg, err);
                    return;

                console.error('[API Error]', status, msg, err);
                lastErrorMsg = msg;

            function formatRelativeTime(ms) {
                if (ms < 3000) return 'just now';
                const sec = Math.floor(ms / 1000);
                if (sec < 60) return sec + 's ago';
                const min = Math.floor(sec / 60);
                if (min < 60) return min + 'm ago';
                return Math.floor(min / 60) + 'h ago';
            }

            function formatProjectDate(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const month = months[d.getMonth()];
                const day = d.getDate();
                const year = d.getFullYear();
                let hours = d.getHours();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const mins = String(d.getMinutes()).padStart(2, '0');
                return month + ' ' + day + ', ' + year + ' at ' + hours + ':' + mins + ' ' + ampm;
            }

            function formatLocalDateTime(isoStr) {
                if (!isoStr) return '\u2014';
                const d = new Date(isoStr);
                if (isNaN(d.getTime())) return isoStr;
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                let hours = d.getHours();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const mins = String(d.getMinutes()).padStart(2, '0');
                const ss = String(d.getSeconds()).padStart(2, '0');
                return yyyy + '-' + mm + '-' + dd + ' ' + hours + ':' + mins + ':' + ss + ' ' + ampm;
            }

            // --- GitHub Update Check ----------------------------------
            function compareVersions(a, b) {
                const pa = a.split('.').map(Number);
                const pb = b.split('.').map(Number);
                for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
                    const na = pa[i] || 0;
                    const nb = pb[i] || 0;
                    if (na > nb) return 1;
                    if (na < nb) return -1;
                }
                return 0;
            }

            async function checkForUpdates(force) {
                if (updateCheckInProgress) return;
                const lastCheck = localStorage.getItem('ca_last_update_check');
                if (!force && lastCheck) {
                    const elapsed = Date.now() - parseInt(lastCheck);
                    if (elapsed < 24 * 60 * 60 * 1000) return;
                }
                updateCheckInProgress = true;
                try {
                    const res = await fetch('https://api.github.com/repos/Saif4582/chronicle-architect/releases/latest');
                    if (!res.ok) { updateCheckInProgress = false; return; }
                    const data = await res.json();
                    const remoteVersion = (data.tag_name || '').replace(/^v/, '');
                    const localVersion = appVersion || '0.0.0';
                    if (compareVersions(remoteVersion, localVersion) > 0) {
                        updateAvailableVersion = remoteVersion;
                        renderStatusBarContent();
                    }
                    localStorage.setItem('ca_last_update_check', String(Date.now()));
                } catch (_) {
                    // Silently fail — GitHub API might be rate-limited
                } finally {
                    updateCheckInProgress = false;
                }
            }

            // --- Token Counter (server-side via API) ----------------
            function countWords(text) {
                const trimmed = (text || '').trim();
                if (!trimmed) return 0;
                return trimmed.split(/\s+/).length;
            }

            function naturalSortChapters(chapters) {
                return [...chapters].sort((a, b) => {
                    const aTitle = a.title || '';
                    const bTitle = b.title || '';
                    // Extract leading number if present
                    const aMatch = aTitle.match(/^(\d+)/);
                    const bMatch = bTitle.match(/^(\d+)/);
                    if (aMatch && bMatch) {
                        const diff = parseInt(aMatch[1]) - parseInt(bMatch[1]);
                        if (diff !== 0) return diff;
                    } else if (aMatch) {
                        return -1;
                    } else if (bMatch) {
                        return 1;
                    }
                    // Fallback: case-insensitive alphabetical
                    return aTitle.localeCompare(bTitle, undefined, { sensitivity: 'base', numeric: true });
                });
            }

            let _tokenCache = new Map(); // debounce token fetches

            async function fetchTokenCount(text) {
                // Simple hash for cache key
                let hash = 0;
                for (let i = 0; i < text.length; i++) {
                    const chr = text.charCodeAt(i);
                    hash = ((hash << 5) - hash) + chr;
                    hash |= 0; // Convert to 32bit integer
                }
                const key = String(hash);
                if (_tokenCache.has(key)) return _tokenCache.get(key);
                try {
                    const data = await apiPost('/api/tokenize', { text: text });
                    const count = data.tokens;
                    // Keep cache small
                    if (_tokenCache.size > 50) _tokenCache.clear();
                    _tokenCache.set(key, count);
                    return count;
                } catch (_) {
                    // Fallback: approximate as words * 1.3
                    return Math.round(countWords(text) * 1.3);
                }
            }

            function scanWikiRefs(projectId, text) {
                const entries = wikiEntriesCache[projectId];
                if (!entries || entries.length === 0) return [];
                const sorted = [...entries].sort((a, b) => b.name.length - a.name.length);
                const found = [];
                const lowerText = text.toLowerCase();
                for (const entry of sorted) {
                    if (entry.name && entry.name.length > 0 && lowerText.includes(entry.name.toLowerCase())) {
                        // Avoid duplicates
                        if (!found.some(f => f.id === entry.id)) {
                            found.push(entry);
                        }
                    }
                }
                return found;
            }

                        renderProjectsPage();

                    return;

                // Default: projects
                window.location.hash = '#/projects';
                renderProjectsPage();
            }

            function connectAdminWS() {
                // Close any existing connection before creating a new one
                if (adminWS) {
                    try { adminWS.onclose = null; } catch (_) {}
                    try { adminWS.close(); } catch (_) {}
                    adminWS = null;
                }
                const token = getToken();
                if (!token) return;

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                adminWS = new WebSocket(protocol + '//' + location.host + '/ws/admin');

                adminWS.onopen = () => {
                    console.log('[WS Admin] Connected to server, sending auth...');
                    adminWS.send(JSON.stringify({ type: 'auth', token: token }));
                };

                adminWS.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'auth_ok') {
                        console.log('[WS Admin] Authenticated successfully, user_id:', msg.user_id, 'role:', msg.role);
                        adminWS.send(JSON.stringify({ type: 'subscribe', channel: 'users' }));
                        adminWS.send(JSON.stringify({ type: 'subscribe', channel: 'logs' }));
                        adminWS.send(JSON.stringify({ type: 'subscribe', channel: 'tokens' }));
                    } else if (msg.type === 'data_changed') {
                        console.log('[WS Admin] data_changed received:', msg.channel);
                        if (msg.channel === 'users' && _adminUsersLoader) {
                            console.log('[WS Admin] Calling _adminUsersLoader');
                            _adminUsersLoader();
                        }
                        else if (msg.channel === 'logs' && _adminLogsLoader) _adminLogsLoader();
                        else if (msg.channel === 'tokens' && _adminTokensLoader) _adminTokensLoader();
                    } else if (msg.type === 'update_log') {
                        if (typeof updateLogs !== 'undefined') {
                            updateLogs.push({ line: msg.line, stream: msg.stream });
                            if (updateLogs.length > 500) updateLogs.shift();
                            renderModal();
                        }
                    }
                };

                adminWS.onclose = (event) => {
                    console.log('[WS Admin] Connection closed — code:', event.code, 'reason:', event.reason || '(none)', 'wasClean:', event.wasClean);
                    adminWS = null;
                    // If an update was applying, the server likely restarted
                    if (typeof updateApplying !== 'undefined' && updateApplying) {
                        updateLogs.push({ line: 'Connection lost — server is restarting. Reconnecting in 5s...', stream: 'system' });
                        renderModal();
                    }
                    // Reconnect after 5s if admin panel is still open
                    if (document.querySelector('.admin-modal')) {
                        console.log('[WS Admin] Admin panel open — scheduling reconnect in 5s...');
                        wsAdminReconnectTimer = setTimeout(connectAdminWS, 5000);
                    }
                };
                adminWS.onerror = (err) => { console.error('[WS Admin] Error:', err); };
            }

                let dmContacts = [];
                let dmActiveContact = null;

                let dmLoading = false;

                // Cleanup function for this page
                currentCleanup = function() {
                    _editorInitLock = false;

                    if (_tokenThrottle) clearTimeout(_tokenThrottle);
                    if (tiptapEditor) {
                        try { tiptapEditor.destroy(); } catch (_) {}

                    }

                        try { chatStreamAbortController.abort(); } catch (_) {}

                    if (chatWS) { try { chatWS.close(); } catch (_) {} chatWS = null; }
                    if (adminWS) { try { adminWS.close(); } catch (_) {} adminWS = null; }

                    if (wsAdminReconnectTimer) { clearTimeout(wsAdminReconnectTimer); wsAdminReconnectTimer = null; }
                    debounceTimer = null;
                    stateTimer = null;
                    _tokenThrottle = null;
                };

                function getSaveLabel() {
                    switch (saveState) {
                        case 'typing': return 'Saving...';
                        case 'waiting': return 'Waiting...';
                        case 'saving': return 'Saving...';
                        case 'saved': return 'Saved';
                        case 'error': return 'Error saving';
                        default: return '';
                    }
                }

                function getSaveStateClass() {
                    return 'state-' + saveState;
                }

                function setSaveState(newState) {
                    saveState = newState;
                    updateIndicator();
                }

                let _tokenThrottle = null;

                async function updateTokenCountDisplay(text) {
                    const wordCountEl = document.getElementById('word-count');
                    if (!wordCountEl) return;
                    const wc = countWords(text);
                    const cc = text.length;
                    wordCountEl.textContent = 'Words: ' + wc + ' \u00B7 Characters: ' + cc + ' \u00B7 Tokens: ...';
                    const tokens = await fetchTokenCount(text);
                    const wc2 = countWords(text);
                    const cc2 = text.length;
                    wordCountEl.textContent = 'Words: ' + wc2 + ' \u00B7 Characters: ' + cc2 + ' \u00B7 Tokens: ' + tokens;
                }

                function updateIndicator() {
                    const indicator = document.getElementById('save-indicator');
                    const wordCountEl = document.getElementById('word-count');

                    if (indicator) {
                        indicator.textContent = getSaveLabel();
                        indicator.className = 'save-indicator ' + getSaveStateClass();
                    }

                    // Use TipTap if available
                    const plainText = tiptapEditor ? tiptapEditor.getText() : '';
                    if (wordCountEl && plainText) {
                        const wc = countWords(plainText);
                        const cc = plainText.length;
                        wordCountEl.textContent = 'Words: ' + wc + ' \u00B7 Characters: ' + cc + ' \u00B7 Tokens: ...';
                        if (_tokenThrottle) clearTimeout(_tokenThrottle);
                        _tokenThrottle = setTimeout(() => {
                            _tokenThrottle = null;
                            updateTokenCountDisplay(plainText);
                        }, 300);
                    }
                }

                function triggerDebouncedSave() {
                    if (debounceTimer) clearTimeout(debounceTimer);
                    setSaveState('waiting');
                    debounceTimer = setTimeout(() => {
                        debounceTimer = null;
                        performSave();
                    }, 2000);
                }

                async function performSave() {
                    const content = currentContent;
                    setSaveState('saving');
                    try {
                        await apiPut('/api/chapters/' + chapterId, { content: content });
                        setSaveState('saved');
                        lastSaveTime = Date.now();
                        updateStatusBar({ lastSave: lastSaveTime });
                        if (stateTimer) clearTimeout(stateTimer);
                        stateTimer = setTimeout(() => {
                            if (saveState === 'saved') {
                                setSaveState('idle');
                            }
                            stateTimer = null;
                        }, 2000);

                        // Scan wiki refs after successful save (use plain text)
                        const plainText = tiptapEditor ? tiptapEditor.getText() : content;
                        scanAndShowWikiRefs(projectId, plainText);
                    } catch (err) {
                        setSaveState('error');
                        recordApiError(err);
                        updateStatusBar({ errorMsg: err.message });
                        if (stateTimer) clearTimeout(stateTimer);
                        stateTimer = setTimeout(() => {
                            if (saveState === 'error') {
                                setSaveState('idle');
                            }
                            stateTimer = null;
                        }, 3000);
                    }
                }

                // TipTap input handler
                function handleTipTapInput(editor) {
                    currentContent = editor.getHTML();
                    if (stateTimer) {
                        clearTimeout(stateTimer);
                        stateTimer = null;
                    }
                    if (debounceTimer) {
                        clearTimeout(debounceTimer);
                        debounceTimer = null;
                    }
                    setSaveState('typing');
                    triggerDebouncedSave();

                    // Update word count immediately
                    const plainText = editor.getText();
                    const wordCountEl = document.getElementById('word-count');
                    if (wordCountEl) {
                        const wc = countWords(plainText);
                        const cc = plainText.length;
                        wordCountEl.textContent = 'Words: ' + wc + ' \u00B7 Characters: ' + cc + ' \u00B7 Tokens: ...';
                    }

                    // Throttle token count
                    if (_tokenThrottle) clearTimeout(_tokenThrottle);
                    _tokenThrottle = setTimeout(() => {
                        _tokenThrottle = null;
                        updateTokenCountDisplay(plainText);
                    }, 300);
                }

                    toolbar.appendChild(btn('\u201C', 'Blockquote', (ed) => { ed.chain().focus().toggleBlockquote().run(); }));

                    toolbar.appendChild(el('span', { className: 'toolbar-sep' }));
                    toolbar.appendChild(btn('L', 'Align Left', (ed) => { ed.chain().focus().setTextAlign('left').run(); }));
                    toolbar.appendChild(btn('C', 'Align Center', (ed) => { ed.chain().focus().setTextAlign('center').run(); }));
                    toolbar.appendChild(btn('R', 'Align Right', (ed) => { ed.chain().focus().setTextAlign('right').run(); }));
                    toolbar.appendChild(btn('J', 'Justify', (ed) => { ed.chain().focus().setTextAlign('justify').run(); }));

                    toolbar.appendChild(el('span', { className: 'toolbar-sep' }));

                    // Font family dropdown
                    const fontOptions = [

                        { label: 'Sans-serif', value: "'Arial', 'Helvetica', sans-serif" },
                        { label: 'Monospace', value: "'Courier New', 'Consolas', monospace" },
                        { label: 'Literata', value: "'Literata', serif" },
                        { label: 'Atkinson Hyperlegible', value: "'Atkinson Hyperlegible', sans-serif" },
                    ];
                    const fontSelect = el('select', {
                        id: 'font-family-select',
                        onchange: (e) => {
                            const ed = tiptapEditor;
                            if (ed && e.target.value) {
                                const val = e.target.value;
                                // Persist FIRST so onUpdate reads the new value
                                const paper = document.querySelector('.editor-paper');
                                if (paper) paper.setAttribute('data-font', val);
                                chapterFontFamily = val;
                                // Focus the editor, select all, apply font
                                ed.chain().focus().selectAll().setFontFamily(val).run();
                                // Ensure new text typed at cursor also uses this font
                                ed.commands.setFontFamily(val);
                                updateToolbarState();
                            }
                        },
                    });
                    for (const opt of fontOptions) {
                        fontSelect.appendChild(el('option', { value: opt.value }, opt.label));
                    }
                    toolbar.appendChild(fontSelect);

                    // Color picker (6 presets)
                    const colors = ['#E6F1FF', '#00BFAE', '#EF5350', '#FFA726', '#66BB6A', '#4FC3F7'];
                    const colorSelect = el('select', {
                        onchange: (e) => {
                            const ed = tiptapEditor;
                            if (ed && e.target.value) {
                                ed.chain().focus().setColor(e.target.value).run();
                            } else if (ed) {
                                ed.chain().focus().unsetColor().run();
                            }
                        },
                    });
                    colorSelect.appendChild(el('option', { value: '' }, 'A\u25BC'));
                    for (const c of colors) {
                        colorSelect.appendChild(el('option', { value: c, style: { backgroundColor: c, color: '#000' } }, c));
                    }
                    toolbar.appendChild(colorSelect);

                    function updateToolbarState() {
                        if (!tiptapEditor) return;
                        const buttons = toolbar.querySelectorAll('button');
                        const states = [
                            tiptapEditor.isActive('bold'),
                            tiptapEditor.isActive('italic'),
                            tiptapEditor.isActive('underline'),
                            tiptapEditor.isActive('strike'),
                            tiptapEditor.isActive('heading', { level: 1 }),
                            tiptapEditor.isActive('heading', { level: 2 }),
                            tiptapEditor.isActive('heading', { level: 3 }),
                            tiptapEditor.isActive('bulletList'),
                            tiptapEditor.isActive('orderedList'),
                            tiptapEditor.isActive('blockquote'),
                            tiptapEditor.isActive({ textAlign: 'left' }),
                            tiptapEditor.isActive({ textAlign: 'center' }),
                            tiptapEditor.isActive({ textAlign: 'right' }),
                            tiptapEditor.isActive({ textAlign: 'justify' }),
                        ];
                        for (let i = 0; i < buttons.length && i < states.length; i++) {
                            buttons[i].classList.toggle('active', states[i]);
                        }
                        // Update font dropdown to reflect current font
                        const fontSel = toolbar.querySelector('#font-family-select');
                        if (fontSel && tiptapEditor) {
                            const paperEl = document.querySelector('.editor-paper');
                            const savedFont = paperEl ? paperEl.getAttribute('data-font') : null;
                            // Primary source: data-font attribute, fallback: chapterFontFamily variable
                            const activeFont = savedFont || chapterFontFamily;
                            for (const option of fontSel.options) {
                                if (option.value === activeFont) {
                                    fontSel.value = activeFont;
                                    break;
                                }
                            }
                        }
                    }

                    // Expose update for external calls
                    toolbar._updateState = updateToolbarState;
                    return toolbar;
                }

                async function loadAll() {
                    loading = true;
                    loadError = '';
                    render();
                    try {
                        const [proj, chs, vols] = await Promise.all([
                            apiGet('/api/projects/' + projectId),
                            apiGet('/api/projects/' + projectId + '/chapters'),
                            apiGet('/api/projects/' + projectId + '/volumes'),
                        ]);
                        project = proj;
                        chapters = chs;
                        volumes = vols;

                        // Find current chapter
                        chapter = chapters.find(c => c.id == chapterId);
                        if (!chapter) {
                            // Chapter might have been deleted; try loading directly
                            try {
                                chapter = await apiGet('/api/chapters/' + chapterId);
                                chapters.push(chapter);
                            } catch (e) {
                                loadError = 'Chapter not found.';
                                loading = false;
                                render();
                                return;
                            }
                        }
                        // Remember last chapter for wiki back navigation
                        if (chapter) {
                            lastEditorChapterId[projectId] = chapter.id;
                        }
                        currentContent = chapter.content || '';

                        // Load wiki cache for ref scanning
                        loadWikiCache(projectId).catch(() => {});

                        // Update last_accessed
                        apiPut('/api/projects/' + projectId + '/touch').catch(() => {});

                        loading = false;
                        setSaveState('idle');
                        render();

                        // Initialize TipTap editor after render
                        setTimeout(() => initTipTapEditor(), 50);

                        if (currentContent) {
                            const plainText = stripHtml(currentContent);
                            wikiRefs = scanWikiRefs(projectId, plainText);

                        loadError = err.message;
                        recordApiError(err);
                        render();
                    }
                }

                function stripHtml(html) {
                    const tmp = document.createElement('div');
                    tmp.innerHTML = html || '';
                    return tmp.textContent || tmp.innerText || '';
                }

                async function initTipTapEditor() {
                    // Prevent concurrent initializations
                    if (_editorInitLock) return;
                    _editorInitLock = true;

                    // Fully destroy any prior editor
                    if (tiptapEditor) {
                        try { tiptapEditor.destroy(); } catch (_) {}
                        tiptapEditor = null;
                    }

                    const editorDiv = document.getElementById('editor-tiptap');
                    if (!editorDiv) { _editorInitLock = false; return; }

                    // Clear any leftover content (safety)
                    editorDiv.innerHTML = '';

                    // Wait for TipTap module to be ready (up to 5 seconds)
                    let attempts = 0;
                    while (typeof window.__tiptapCreate !== 'function' && attempts < 50) {
                        await new Promise(r => setTimeout(r, 100));
                        attempts++;
                    }
                    if (typeof window.__tiptapCreate !== 'function') {
                        _editorInitLock = false;
                        return;
                    }

                    tiptapEditor = window.__tiptapCreate({
                        element: editorDiv,
                        content: currentContent || '',
                        onUpdate: (editor) => {
                            handleTipTapInput(editor);
                            const toolbar = document.querySelector('.editor-toolbar-inner');
                            if (toolbar && toolbar._updateState) toolbar._updateState();
                        },
                    });

                    // Apply saved font family to entire document
                    const paper = document.querySelector('.editor-paper');
                    let savedFont = paper ? paper.getAttribute('data-font') : null;
                    if (!savedFont) savedFont = chapterFontFamily; // default
                    if (tiptapEditor) {
                        tiptapEditor.chain().focus().selectAll().setFontFamily(savedFont).run();
                        // Also ensure new text uses this font
                        tiptapEditor.commands.setFontFamily(savedFont);
                    }

                    _editorInitLock = false;
                }

                async function switchChapter(newChapterId) {

                        if (debounceTimer) {
                            clearTimeout(debounceTimer);

                async function handleAddChapter(title, volumeId) {
                    if (!title || !title.trim()) {
                        newChapterError = 'Title is required.';
                        renderSidebar();
                        return;
                    }
                    try {
                        const body = { title: title.trim() };
                        if (volumeId) body.volume_id = volumeId;
                        const newCh = await apiPost('/api/projects/' + projectId + '/chapters', body);

                        chapters = await apiGet('/api/projects/' + projectId + '/chapters');

                        renderSidebar();
                        switchChapter(newCh.id);

                        newChapterError = err.message;
                        if (!err.status || err.status >= 500) {
                            recordApiError(err);
                        }
                        renderSidebar();
                    }
                }

                async function renameChapter(chId, newTitle) {
                    if (!newTitle || !newTitle.trim()) return;
                    try {
                        await apiPut('/api/chapters/' + chId, { title: newTitle.trim() });
                        chapters = await apiGet('/api/projects/' + projectId + '/chapters');
                        inlineEditError = '';
                        renderSidebar();
                    } catch (err) {
                        inlineEditError = err.message;
                        if (!err.status || err.status >= 500) {
                            recordApiError(err);
                        }
                        throw err; // re-throw so startInlineEdit can keep the input visible
                    }
                }

                async function deleteChapter(chId, chTitle, chContent) {
                    const hasContent = chContent && chContent.replace(/<[^>]*>/g, '').trim().length > 0;
                    if (!hasContent) {
                        // Delete immediately without confirmation
                        try {
                            await apiDelete('/api/chapters/' + chId);
                            chapters = await apiGet('/api/projects/' + projectId + '/chapters');
                            if (chId == chapterId) {
                                if (chapters.length > 0) {
                                    switchChapter(chapters[0].id);
                                } else {
                                    const newCh = await apiPost('/api/projects/' + projectId + '/chapters', { title: 'Chapter 1' });
                                    chapters = await apiGet('/api/projects/' + projectId + '/chapters');
                                    switchChapter(newCh.id);
                                }
                                return;
                            }
                            renderSidebar();
                        } catch (err) {
                            recordApiError(err);
                        }
                        return;
                    }
                    showConfirmModal('Delete chapter "' + (chTitle || 'Untitled') + '"?', async () => {
                        try {
                            await apiDelete('/api/chapters/' + chId);
                            chapters = await apiGet('/api/projects/' + projectId + '/chapters');
                            // If the deleted chapter was the current one, switch to the first available
                            if (chId == chapterId) {
                                if (chapters.length > 0) {
                                    switchChapter(chapters[0].id);
                                } else {
                                    // No chapters left — auto-create one
                                    const newCh = await apiPost('/api/projects/' + projectId + '/chapters', { title: 'Chapter 1' });
                                    chapters = await apiGet('/api/projects/' + projectId + '/chapters');
                                    switchChapter(newCh.id);
                                }
                                return;
                            }
                            renderSidebar();
                        } catch (err) {
                            alert('Failed to delete chapter: ' + err.message);
                            recordApiError(err);
                        }
                    });
                }

                function startInlineEdit(chId, currentTitle, itemEl, titleSpan) {
                    inlineEditError = '';
                    // Replace the title span with an input
                    const input = el('input', {
                        className: 'chapter-edit-input',
                        type: 'text',
                        value: currentTitle,
                    });

                    const clearErrorEl = () => {
                        const existingErr = itemEl.querySelector('.inline-edit-error');
                        if (existingErr) existingErr.remove();
                    };

                    const showErrorEl = () => {
                        clearErrorEl();
                        if (inlineEditError) {
                            const errEl = el('span', {
                                className: 'inline-edit-error',
                                style: { color: 'var(--error)', fontSize: '11px', display: 'block', marginTop: '2px' },
                            }, inlineEditError);
                            input.insertAdjacentElement('afterend', errEl);
                        }
                    };

                    titleSpan.replaceWith(input);
                    input.focus();
                    input.select();
                    showErrorEl();

                    const finish = async () => {
                        const newTitle = input.value.trim();
                        if (newTitle && newTitle !== currentTitle) {
                            try {
                                await renameChapter(chId, newTitle);
                                // Success — replace input with span
                                const newSpan = el('span', { className: 'chapter-title-text' }, newTitle || currentTitle);
                                input.replaceWith(newSpan);
                                clearErrorEl();
                            } catch (err) {
                                // Error — keep input visible, show error
                                showErrorEl();
                                input.focus();
                                return;
                            }
                        } else {
                            const newSpan = el('span', { className: 'chapter-title-text' }, newTitle || currentTitle);
                            input.replaceWith(newSpan);
                            clearErrorEl();
                        }
                    };

                    input.addEventListener('blur', finish);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            input.blur();
                        } else if (e.key === 'Escape') {
                            const newSpan = el('span', { className: 'chapter-title-text' }, currentTitle);
                            input.replaceWith(newSpan);
                            clearErrorEl();
                            inlineEditError = '';
                        }
                    });
                }

                function startProjectTitleEdit(currentTitle) {

                    if (!span) return;
                    const input = el('input', {
                        className: 'chapter-edit-input',

                        value: currentTitle,

                    span.replaceWith(input);

                        input.replaceWith(newSpan);
                        if (newTitle && newTitle !== currentTitle) {

                                project.title = updated.title;
                                renderSidebar();

                                alert('Failed to rename project: ' + err.message);
                                recordApiError(err);
                            }
                        }
                    };

                    input.addEventListener('blur', finish);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            input.blur();
                        } else if (e.key === 'Escape') {
                            const newSpan = el('span', { className: 'project-title-text' }, currentTitle);
                            input.replaceWith(newSpan);
                        }
                    });
                }

                    if (moveMenuChapterId === chapterId) {
                        moveMenuChapterId = null;
                        return;
                    }
                    moveMenuChapterId = chapterId;

                    // Build a quick popup menu for volume assignment

                        className: 'modal volume-move-popup',

                            position: 'fixed',
                            left: (x + 5) + 'px',
                            top: (y + 5) + 'px',

                            maxWidth: '200px',
                            padding: '8px 0',
                            minWidth: '160px',

                    // "No Volume" option
                    popup.appendChild(el('div', {

                        onclick: () => { popup.remove(); moveMenuChapterId = null; assignChapterToVolume(chapterId, null); },
                        onmouseenter: (e) => { e.target.style.background = 'var(--bg-hover)'; e.target.style.color = 'var(--text-primary)'; },
                        onmouseleave: (e) => { e.target.style.background = ''; e.target.style.color = ''; },
                    }, '\u2014 No Volume \u2014'));

                    const closeHandler = (e) => {

                // --- Render Sidebar (Volume Tree) ---------------------
                function renderSidebar() {
                    const sidebarInner = document.getElementById('sidebar-inner');
                    if (!sidebarInner) return;

                    sidebarInner.innerHTML = '';

                    // Project title is now rendered in #sidebar-header above
                    // Structure header
                    sidebarInner.appendChild(el('div', { className: 'sidebar-section-header' }, 'Structure'));

                    // Group chapters by volume_id
                    const uncategorized = [];
                    const byVolume = {};
                    for (const ch of chapters) {
                        if (ch.volume_id) {
                            if (!byVolume[ch.volume_id]) byVolume[ch.volume_id] = [];
                            byVolume[ch.volume_id].push(ch);
                        } else {
                            uncategorized.push(ch);
                        }
                    }

                    // Volumes are already sorted by the backend
                    const sortedVolumes = volumes;

                    // Render volume tree
                    for (const vol of sortedVolumes) {
                        const volChapters = byVolume[vol.id] || [];
                        const isCollapsed = collapsedVolumes[vol.id];

                        const volumeSection = el('div', { className: 'sidebar-volume-section' });

                        // Volume totals
                        const volTotalWords = volChapters.reduce((sum, c) => sum + (c.word_count || 0), 0);
                        const volTotalTokens = volChapters.reduce((sum, c) => sum + (c.token_count || 0), 0);
                        const volStats = el('span', {
                            style: { color: 'var(--text-muted)', fontSize: '11px', marginLeft: 'auto', flexShrink: 0 }
                        }, volTotalWords + 'w ' + volTotalTokens + 't');

                        // Volume header
                        const arrowEl = el('span', {
                            className: 'volume-arrow',
                            style: { transform: isCollapsed ? 'rotate(-90deg)' : '' },
                        }, isCollapsed ? '\u25B6' : '\u25BC');

                        let volumeTitleEl;
                        if (editingVolumeId === vol.id) {
                            volumeTitleEl = el('input', {
                                className: 'chapter-edit-input',
                                type: 'text',
                                value: vol.title || '',
                                onblur: (e) => {
                                    const newT = e.target.value.trim();
                                    if (newT && newT !== vol.title) {
                                        renameVolume(vol.id, newT);
                                    } else {
                                        editingVolumeId = null;
