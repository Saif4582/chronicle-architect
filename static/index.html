                        }, '\uD83D\uDDD1');

                        const item = el('div', {
                            className: 'chapter-item' + (ch.id == chapterId ? ' active' : ''),
                            onclick: () => switchChapter(ch.id),
                        }, titleSpan, editBtn, delBtn);

                        list.appendChild(item);
                    }
                    sidebarInner.appendChild(list);

                    // Actions
                    const actions = el('div', { className: 'sidebar-actions' },
                        el('button', { className: 'btn btn-primary btn-sm', onclick: addChapter, style: { width: '100%' } }, '+ Add Chapter'),
                        el('span', { className: 'sidebar-link', onclick: goToWiki }, '\uD83D\uDCDA Wiki'),
                        el('span', { className: 'sidebar-link', onclick: goBack }, '\u2190 Back to Projects'),
                    );
                    sidebarInner.appendChild(actions);
                }

                function render() {
                    if (loading) {
                        renderApp(
                            el('div', { className: 'editor-page' },
                                el('div', { className: 'editor-topbar' },
                                    el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                                    el('h2', { className: 'project-title' }, 'Loading...'),
                                ),
                                el('div', { className: 'editor-loading' }, 'Loading project...'),
                            )
                        );
                        return;
                    }

                    if (loadError) {
                        renderApp(
                            el('div', { className: 'editor-page' },
                                el('div', { className: 'editor-topbar' },
                                    el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                                    el('h2', { className: 'project-title' }, 'Error'),
                                ),
                                el('div', { className: 'editor-error' },
                                    el('p', null, loadError),
                                    el('button', { className: 'btn btn-primary', onclick: goBack }, 'Back to Projects'),
                                ),
                            )
                        );
                        return;
                    }

                    if (!project) return;

                    const saveIndicator = el('span', {
                        id: 'save-indicator',
                        className: 'save-indicator ' + getSaveStateClass(),
                    }, getSaveLabel());

                    const wordCountEl = el('span', {
                        id: 'word-count',
                        className: 'word-count',
                    }, 'Words: ' + countWords(currentContent) + ' \u00B7 Tokens: ...');

                    const textarea = el('textarea', {
                        id: 'editor-textarea',
                    }, currentContent);

                    // Wiki refs panel
                    const wikiRefsPanel = el('div', {
                        id: 'wiki-refs-panel',
                        className: 'wiki-refs-panel' + (wikiRefs.length === 0 ? ' hidden' : ''),
                    },
                        el('p', {
                            className: 'wiki-refs-header',
                            onclick: () => {
                                wikiRefsCollapsed = !wikiRefsCollapsed;
                                const list = document.querySelector('.wiki-refs-list');
                                if (list) list.style.display = wikiRefsCollapsed ? 'none' : 'flex';
                            },
                        }, 'Wiki References (' + wikiRefs.length + ')'),
                        el('div', { className: 'wiki-refs-list', style: { display: wikiRefsCollapsed ? 'none' : 'flex' } }),
                    );

                    const page = el('div', { className: 'editor-page' },
                        el('div', { className: 'editor-topbar' },
                            el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                            el('h2', { className: 'project-title' }, project.title || 'Untitled'),
                            saveIndicator,
                            wordCountEl,
                        ),
                        el('div', { className: 'editor-layout' },
                            el('div', { id: 'editor-sidebar', className: 'sidebar' + (sidebarCollapsed ? ' collapsed' : '') },
                                el('button', { className: 'sidebar-toggle', onclick: toggleSidebar, title: 'Toggle sidebar' }, '\u2630'),
                                el('div', { id: 'sidebar-inner', className: 'sidebar-inner' }),
                            ),
                            el('div', { className: 'editor-main' },
                                el('div', { className: 'editor-textarea-wrapper' },
                                    textarea,
                                ),
                                wikiRefsPanel,
                            ),
                        ),
                    );

                    renderApp(page);

                    // Render sidebar content
                    renderSidebar();

                    // Attach input handler
                    const ta = document.getElementById('editor-textarea');
                    if (ta) {
                        if (ta._inputHandler) {
                            ta.removeEventListener('input', ta._inputHandler);
                        }
                        ta._inputHandler = handleInput;
                        ta.addEventListener('input', ta._inputHandler);
                    }
                }

                loadAll();
            }

            // ─── Wiki Page ───────────────────────────────────────────
            function renderWikiPage(projectId) {
                showStatusBar();
                renderStatusBarContent();
                updateStatusBar({ lastSave: lastSaveTime });
                checkHealth();

                let project = null;
                let entries = [];
                let categories = [];
                let loading = true;
                let loadError = '';
                let editingEntry = null; // null = new entry, object = editing
                let formName = '';
                let formCategory = '';
                let formParentId = '';
                let formContent = '';
                let formError = '';

                currentCleanup = function() {
                    // No timers to clean up for wiki page
                };

                function goBack() {
                    window.location.hash = '#/editor/' + projectId;
                    router();
                }

                function goToProjects() {
                    window.location.hash = '#/projects';
                    router();
                }

                async function loadAll() {
                    loading = true;
                    loadError = '';
                    render();
                    try {
                        const [proj, ents, cats] = await Promise.all([
                            apiGet('/api/projects/' + projectId),
                            apiGet('/api/projects/' + projectId + '/wiki'),
                            apiGet('/api/projects/' + projectId + '/wiki/categories'),
                        ]);
                        project = proj;
                        entries = ents;
                        categories = cats;
                        // Update wiki cache
                        wikiEntriesCache[projectId] = ents;
                        loading = false;
                        render();
                    } catch (err) {
                        loading = false;
                        loadError = err.message;
                        recordApiError(err.message);
                        render();
                    }
                }

                function resetForm() {
                    editingEntry = null;
                    formName = '';
                    formCategory = '';
                    formParentId = '';
                    formContent = '';
                    formError = '';
                    render();
                }

                function editEntry(entry) {
                    editingEntry = entry;
                    formName = entry.name || '';
                    formCategory = entry.category || '';
                    formParentId = entry.parent_id != null ? String(entry.parent_id) : '';
                    formContent = entry.content || '';
                    formError = '';
                    render();
                    // Scroll to form
                    const formEl = document.getElementById('wiki-form-section');
                    if (formEl) formEl.scrollIntoView({ behavior: 'smooth' });
                }

                async function handleSave() {
                    formError = '';
                    if (!formName.trim()) {
                        formError = 'Name is required.';
                        render();
                        return;
                    }

                    const body = {
                        name: formName.trim(),
                        category: formCategory.trim(),
                        parent_id: formParentId ? parseInt(formParentId) : null,
                        content: formContent,
                    };

                    try {
                        if (editingEntry) {
                            await apiPut('/api/wiki/' + editingEntry.id, body);
                        } else {
                            await apiPost('/api/projects/' + projectId + '/wiki', body);
                        }
                        clearWikiCache(projectId);
                        resetForm();
                        loadAll();
                    } catch (err) {
                        formError = err.message;
                        recordApiError(err.message);
                        render();
                    }
                }

                async function handleDelete(entryId) {
                    if (!confirm('Delete this wiki entry? This cannot be undone.')) return;
                    try {
                        await apiDelete('/api/wiki/' + entryId);
                        clearWikiCache(projectId);
                        closeModal();
                        loadAll();
                    } catch (err) {
                        alert('Failed to delete: ' + err.message);
                        recordApiError(err.message);
                    }
                }

                function showEntryDetailModal(entry) {
                    let parentName = '\u2014';
                    if (entry.parent_id) {
                        const parentEntry = entries.find(e => e.id === entry.parent_id);
                        if (parentEntry) parentName = parentEntry.name;
                    }

                    const modalContent = el('div', { className: 'modal modal-wide' },
                        el('h2', null, entry.name || 'Untitled'),
                        el('p', { className: 'modal-detail' }, el('strong', null, 'Category: '), entry.category || '\u2014'),
                        el('p', { className: 'modal-detail' }, el('strong', null, 'Parent: '), parentName),
                        entry.content
                            ? el('div', { className: 'modal-content-block' }, entry.content)
                            : el('p', { style: { color: 'var(--text-muted)', fontSize: '13px' } }, 'No content.'),
                        el('div', { className: 'modal-actions' },
                            el('button', {
                                className: 'btn btn-danger btn-sm',
                                onclick: () => handleDelete(entry.id),
                            }, 'Delete'),

                                className: 'btn btn-secondary btn-sm',
                                onclick: () => { closeModal(); },
                            }, 'Cancel'),
                            el('button', {
                                className: 'btn btn-primary btn-sm',
                                onclick: () => { closeModal(); editEntry(entry); },
                            }, 'Edit'),
                        ),
                    );

                    showWikiModal(modalContent);
                }

                function showWikiModal(content) {
                    const overlay = el('div', { className: 'modal-overlay', onclick: (e) => {
                        if (e.target === e.currentTarget) closeModal();
                    } }, content);
                    document.body.appendChild(overlay);
                }

                function closeModal() {
                    const overlays = document.querySelectorAll('.modal-overlay');
                    overlays.forEach(o => o.remove());
                }

                function renderCategorySections() {
                    // Group by category
                    const grouped = {};
                    for (const entry of entries) {
                        const cat = entry.category || 'Uncategorized';
                        if (!grouped[cat]) grouped[cat] = [];
                        grouped[cat].push(entry);
                    }

                    const catNames = Object.keys(grouped).sort();
                    if (catNames.length === 0) {
                        return el('p', { className: 'wiki-empty' }, 'No wiki entries yet. Create one below.');
                    }

                    const sections = catNames.map(catName => {
                        const entryList = grouped[catName];
                        const catDiv = el('div', { className: 'wiki-category' },
                            el('div', {
                                className: 'wiki-category-header',
                                onclick: (e) => {
                                    const parent = e.currentTarget.parentElement;
                                    parent.classList.toggle('collapsed');
                                },
                            },
                                el('span', { className: 'wiki-category-arrow' }, '\u25BC'),
                                catName,
                                el('span', { style: { color: 'var(--text-muted)', fontSize: '12px', marginLeft: 'auto' } }, entryList.length + ' entries'),
                            ),
                            el('div', { className: 'wiki-category-body' },
                                ...entryList.map(entry => el('div', {
                                    className: 'wiki-entry-item',
                                    onclick: () => showEntryDetailModal(entry),
                                }, entry.name || 'Untitled')),
                            ),
                        );
                        return catDiv;
                    });

                    return el('div', null, ...sections);
                }

                        renderApp(
                            el('div', { className: 'wiki-page' },
                                el('div', { className: 'wiki-topbar' },
                                    el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                                    el('h1', null, 'Wiki'),
                                    el('span', { className: 'project-title-sm' }, 'Loading...'),
                                ),
                                el('div', { style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)' } },
                                    'Loading wiki...'),

                        );
                        return;

                    if (loadError) {
                        renderApp(
                            el('div', { className: 'wiki-page' },
                                el('div', { className: 'wiki-topbar' },
                                    el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                                    el('h1', null, 'Wiki'),
                                    el('span', { className: 'project-title-sm' }, project ? project.title : ''),
                                ),
                                el('div', { className: 'editor-error', style: { padding: '40px 24px' } },
                                    el('p', null, loadError),
                                    el('button', { className: 'btn btn-primary', onclick: goBack }, 'Back to Editor'),

                        return;

                    if (!project) return;

                    // Build parent options for form

                    const page = el('div', { className: 'wiki-page' },
                        el('div', { className: 'wiki-topbar' },
                            el('button', { className: 'back-btn', onclick: goBack }, '\u2190'),
                            el('h1', null, 'Wiki'),
                            el('span', { className: 'project-title-sm' }, project.title || 'Untitled'),
                            el('button', { className: 'btn btn-secondary btn-sm', onclick: goToProjects }, 'All Projects'),
                        ),
                        el('div', { className: 'wiki-content' },
                            el('div', { className: 'wiki-section' },
                                el('h2', null, 'Entries by Category'),
                                renderCategorySections(),
                            ),
                            el('div', { id: 'wiki-form-section', className: 'wiki-section' },
                                el('div', { className: 'wiki-form' },
                                    el('h3', null, editingEntry ? 'Edit Entry: ' + (editingEntry.name || 'Untitled') : 'Add New Entry'),
                                    formError ? el('p', { className: 'modal-error' }, formError) : null,
                                    el('div', { className: 'form-group' },
                                        el('label', { htmlFor: 'wiki-form-name' }, 'Name'),
                                        el('input', {
                                            id: 'wiki-form-name',
                                            type: 'text',
                                            value: formName,
                                            oninput: (e) => { formName = e.target.value; },
                                        }),
                                    ),
                                    el('div', { className: 'form-group' },
                                        el('label', { htmlFor: 'wiki-form-category' }, 'Category'),
                                        el('input', {
                                            id: 'wiki-form-category',
                                            type: 'text',
                                            list: 'wiki-category-list',
                                            value: formCategory,
                                            oninput: (e) => { formCategory = e.target.value; },
                                        }),
                                        el('datalist', { id: 'wiki-category-list' },
                                            ...categories.map(c => el('option', { value: c })),
                                        ),
                                    ),
                                    el('div', { className: 'form-group' },
                                        el('label', { htmlFor: 'wiki-form-parent' }, 'Parent (optional)'),
                                        el('select', {
                                            id: 'wiki-form-parent',
                                            onchange: (e) => { formParentId = e.target.value; },
                                        },
                                            el('option', { value: '', selected: formParentId === '' ? 'selected' : null }, '\u2014 None \u2014'),
                                            ...parentOptions.map(opt => {
                                                if (String(opt.getAttribute('value')) === formParentId) {
                                                    opt.setAttribute('selected', 'selected');
                                                }
                                                return opt;
                                            }),
                                        ),
                                    ),
                                    el('div', { className: 'form-group' },
                                        el('label', { htmlFor: 'wiki-form-content' }, 'Content'),
                                        el('textarea', {
                                            id: 'wiki-form-content',
                                            style: { minHeight: '120px' },
                                            oninput: (e) => { formContent = e.target.value; },
                                        }, formContent),
                                    ),
                                    el('div', { className: 'modal-actions' },
                                        editingEntry
                                            ? el('button', { className: 'btn btn-secondary btn-sm', onclick: resetForm }, 'Cancel')
                                            : null,
                                        el('button', { className: 'btn btn-primary', onclick: handleSave }, 'Save'),
                                    ),
                                ),
                            ),
                        ),
                    );

                    renderApp(page);

                    // Set form values after render for textarea
                    const contentTa = document.getElementById('wiki-form-content');
                    if (contentTa) contentTa.value = formContent;

                    // Set parent select value
                    const parentSel = document.getElementById('wiki-form-parent');
                    if (parentSel) parentSel.value = formParentId;
                }

                loadAll();
            }

            // ─── Bootstrap ───────────────────────────────────────────
            function init() {
                window.addEventListener('hashchange', router);
                router();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
